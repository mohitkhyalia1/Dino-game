    ctx.beginPath();ctx.ellipse(kneeX,kneeY,isBack?4.5:6,isBack?3.8:5,-0.3,0,Math.PI*2);ctx.fill();
    // Shin
    this._bone(kneeX,kneeY,footX,footY,sw0,sw1,isBack?C.bodyD:C.body,C.bodyD,C.bodyD);
    // Ankle joint
    const ag=ctx.createRadialGradient(footX,footY,0,footX,footY,isBack?3.5:4.5);
    ag.addColorStop(0,C.bodyD);ag.addColorStop(1,C.bodyD+'cc');
    ctx.fillStyle=ag;
    ctx.beginPath();ctx.arc(footX,footY,isBack?3.2:4.2,0,Math.PI*2);ctx.fill();
    // foot
    this._foot(footX,footY,C,isBack);
    ctx.restore();
  }

  // ── DRAW ────────────────────────────────────────────────────────
  draw(){
    const ctx=this.ctx,night=this.isNight;
    const C={
      body:  night?'#3a8abf':'#2e6838',
      bodyL: night?'#6ac8ef':'#4e9858',
      bodyD: night?'#1a5080':'#1a3a20',
      belly: night?'#82ceff':'#78b848',
      scale: night?'#2a78b0':'#246228',
      claw:  night?'#0e3060':'#121c10',
      eye:   night?'#061828':'#06120a',
      iris:  night?'#1080ff':'#186828',
      rimL:  night?'rgba(60,190,255,0.55)':'rgba(140,240,100,0.55)',
    };

    const bx=this.x, by=this.y;
    const bw=this.W, bh=this.H;
    const air=!this.onGround;
    const cx=bx+bw/2;

    // ── CONTACT SHADOW ──
    const alt=air?clamp(1-(GY-by-bh)/180,0,1):1;
    const cW=(air?0.30*alt:0.52)*bw;
    const csg=ctx.createRadialGradient(cx,GY+2,0,cx,GY+2,cW+10);
    csg.addColorStop(0,night?`rgba(5,15,50,${0.22*alt})`:`rgba(0,0,0,${0.20*alt})`);
    csg.addColorStop(0.5,night?`rgba(5,15,50,${0.08*alt})`:`rgba(0,0,0,${0.07*alt})`);
    csg.addColorStop(1,'transparent');
    ctx.fillStyle=csg;
    ctx.beginPath();ctx.ellipse(cx,GY+2,cW+10,air?3*alt+1:5.5,0,0,Math.PI*2);ctx.fill();

    // ── DIRECTIONAL CAST SHADOW ──
    const sal=G_SHADOW_ALPHA*(air?alt*0.45:1);
    if(sal>0.012 && !night){
      ctx.save();
      const sdx=G_SHADOW_DX;
      const castG=ctx.createLinearGradient(cx,GY,cx+sdx*1.3,GY+9);
      castG.addColorStop(0,`rgba(0,0,0,${Math.min(sal*2.8,0.45)})`);
      castG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=castG;
      ctx.beginPath();
      ctx.moveTo(cx-12,GY);
      ctx.lineTo(cx+12,GY);
      ctx.lineTo(cx+sdx*1.5+7,GY+10);
      ctx.lineTo(cx+sdx*1.5-10,GY+10);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }
    // moon shadow (night)
    if(night){
      ctx.save();ctx.globalAlpha=0.06*(air?alt*0.5:1);
      ctx.fillStyle='rgba(20,60,140,1)';
      ctx.beginPath();
      ctx.moveTo(cx-10,GY);ctx.lineTo(cx+10,GY);
      ctx.lineTo(cx-42+8,GY+8);ctx.lineTo(cx-42-6,GY+8);
      ctx.closePath();ctx.fill();ctx.restore();
    }

    // ── RIM FLASH ──
    if(this.rimFlash>0){
      ctx.save();ctx.globalAlpha=this.rimFlash*0.35;
      const rg=ctx.createRadialGradient(cx,by+bh/2,0,cx,by+bh/2,bw*0.9);
      rg.addColorStop(0,'transparent');rg.addColorStop(0.7,'transparent');rg.addColorStop(1,C.rimL);
      ctx.fillStyle=rg;ctx.fillRect(bx-10,by-10,bw+20,bh+20);ctx.restore();
    }

    // ── GHOST TRAIL ──
    for(const f of this.trail){
      ctx.save();ctx.globalAlpha=f.a*0.42;
      ctx.translate(bx+DINO_W/2,by+DINO_H*0.65);
      ctx.scale(f.sx||1,f.s||1);
      ctx.translate(-(bx+DINO_W/2),-(by+DINO_H*0.65));
      ctx.fillStyle=night?'rgba(40,140,220,0.45)':'rgba(50,110,50,0.38)';
      ctx.beginPath();
      ctx.ellipse(f.x+bw*0.44,f.y+bh*0.42,bw*0.30,bh*0.36,0,0,Math.PI*2);
      ctx.fill();ctx.restore();
    }

    ctx.save();
    if(this.isDuck) this._drawDuck(C);
    else            this._drawRun(C);
    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════════════
  //  RUNNING POSE — T-Rex redesign
  // ═══════════════════════════════════════════════════════════════
  _drawRun(C){
    const ctx=this.ctx;
    const x=this.x, t=this.cycle;
    const air=!this.onGround;

    // Body pivot (hip joint)
    const hipX=x+31;
    const hipY=this.y+DINO_H-26+this.bob;

    // ── TAIL (behind body, squash-stretched) ──
    ctx.save();
    ctx.translate(hipX,hipY);ctx.scale(this.stX,this.sqY);ctx.translate(-hipX,-hipY);
    this._drawTail(x,hipY,C);
    ctx.restore();

    // ── BACK LEG (IK) ──
    {
      const bHipX=x+24, bHipY=hipY;
      const ft=this._footTarget(bHipX,bHipY,(t+0.5)%1);
      const ik=this._solveIK(bHipX,bHipY,ft.x,ft.y,22,19);
      this._legIK(bHipX,bHipY,ik.kneeX,ik.kneeY,ik.footX,ik.footY,C,true);
    }

    // ── BODY / NECK / HEAD (squash-stretched) ──
    ctx.save();
    ctx.translate(hipX,hipY);ctx.scale(this.stX,this.sqY);ctx.translate(-hipX,-hipY);

    this._drawTorso(x,this.y,C);

    // T-Rex back arm (vestigial — tiny, tucked to chest)
    const armX=x+34, armY=hipY-28;
    this._drawForearm(armX,armY,Math.sin(((t+0.5)%1)*Math.PI*2)*14,C,true);

    // Nod: head pitch — more expressive T-Rex motion
    const nod=air?(this.vy<0?-18:11):Math.sin(t*Math.PI*4)*3.5-this.bob*0.6;
    this._drawNeckHead(x,this.y,nod,C);

    // T-Rex front arm (vestigial — tiny, tucked to chest)
    this._drawForearm(armX,armY,Math.sin(t*Math.PI*2)*14,C,false);

    ctx.restore();

    // ── FRONT LEG (IK, on top) ──
    {
      const fHipX=x+36, fHipY=hipY;
      const ft=this._footTarget(fHipX,fHipY,t);
      const ik=this._solveIK(fHipX,fHipY,ft.x,ft.y,22,19);
      this._legIK(fHipX,fHipY,ik.kneeX,ik.kneeY,ik.footX,ik.footY,C,false);
    }
  }

  // ── TAIL (T-Rex — long, thick at root, physics-driven) ────────
  _drawTail(x,hipY,C){
    const ctx=this.ctx;
    // Root attaches to rump — thick as the body itself at the base
    const b0x=x+10, b0y=hipY-6;
    // 5 segments tapering to a point, S-curve counterbalance
    const b1x=b0x-13, b1y=b0y+this._tailBase*0.22+1;
    const b2x=b0x-26, b2y=b0y+this._tailMid*0.34+4;
    const b3x=b0x-38, b3y=b0y+this._tailTip*0.44+7;
    const b4x=b0x-50, b4y=b0y+this._tailTip*0.54+11;
    const b5x=b0x-60, b5y=b0y+this._tailTip*0.60+14;

    // Draw tail as thick tapered ribbon — root nearly body-diameter
    // Segment 0→1: massive, trunk-like
    this._bone(b0x,b0y,b1x,b1y,13,10.5,C.body,C.body,C.bodyD);
    // Segment 1→2
    this._bone(b1x,b1y,b2x,b2y,10.5,8,C.body,C.bodyD,C.bodyD);
    // Segment 2→3
    this._bone(b2x,b2y,b3x,b3y,8,5.5,C.bodyD,C.bodyD,C.bodyD);
    // Segment 3→4
    this._bone(b3x,b3y,b4x,b4y,5.5,3,C.bodyD,C.bodyD,C.bodyD);
    // Segment 4→5: tapers to point
    this._bone(b4x,b4y,b5x,b5y,3,0.8,C.bodyD,C.bodyD,C.bodyD);

    // Dorsal ridge spines running the tail length (matches back ridge)
    ctx.fillStyle=C.scale;
    [[b1x+1,b1y-10,7],[b2x+1,b2y-8,5.5],[b3x+1,b3y-6,4],[b4x+1,b4y-4,2.5]].forEach(([sx,sy,sz])=>{
      ctx.beginPath();
      ctx.moveTo(sx-sz*0.45,sy+sz*0.55);
      ctx.bezierCurveTo(sx-sz*0.15,sy-sz*1.05,sx+sz*0.15,sy-sz*1.05,sx+sz*0.45,sy+sz*0.55);
      ctx.closePath();ctx.fill();
    });

    // Ventral tail highlight (lighter underside — T-Rex was counter-shaded)
    ctx.fillStyle=C.belly;ctx.globalAlpha=0.22;
    this._bone(b0x,b0y+4,b2x,b2y+5,6,3.5,C.belly,C.belly,'transparent');
    ctx.globalAlpha=1;
  }

  // ── TORSO (T-Rex barrel chest, deep keel, powerful haunches) ──
  _drawTorso(x,y,C){
    const ctx=this.ctx;
    const breath=Math.sin(this.breathT*0.9)*1.4;
    const cx=x+32, cy=y+38;

    // ── Main body — deep barrel-chested theropod silhouette ──
    const bodyG=ctx.createLinearGradient(x+5,y+13,x+57,y+65);
    bodyG.addColorStop(0,C.bodyL);bodyG.addColorStop(0.30,C.body);
    bodyG.addColorStop(0.68,C.bodyD);bodyG.addColorStop(1,C.bodyD);
    ctx.fillStyle=bodyG;
    ctx.beginPath();
    // Start at neck base (upper-rear shoulder)
    ctx.moveTo(x+30,y+19);
    // Dorsal arch — T-Rex had a pronounced high shoulder/back
    ctx.bezierCurveTo(x+40,y+12,x+51,y+15,x+55,y+28+breath*0.35);
    // Powerful haunches / rump
    ctx.bezierCurveTo(x+58,y+42,x+54,y+56,x+42,y+63);
    // Ventral line — full round belly
    ctx.bezierCurveTo(x+32,y+67,x+19,y+65,x+13,y+59);
    // Deep chest wall — T-Rex thorax was very deep
    ctx.bezierCurveTo(x+6,y+53,x+6,y+41+breath,x+10,y+33);
    // Pectoral / shoulder region
    ctx.bezierCurveTo(x+12,y+27,x+20,y+21,x+30,y+19);
    ctx.closePath();ctx.fill();

    // ── Belly highlight — counter-shaded ventral surface ──
    const belG=ctx.createLinearGradient(cx,y+46,cx,y+68);
    belG.addColorStop(0,C.belly);belG.addColorStop(0.7,'transparent');
    ctx.fillStyle=belG;ctx.globalAlpha=0.44;
    ctx.beginPath();
    ctx.moveTo(x+15,y+52);
    ctx.bezierCurveTo(x+10,y+60,x+22,y+66,x+36,y+66);
    ctx.bezierCurveTo(x+50,y+65,x+56,y+58,x+55,y+50);
    ctx.bezierCurveTo(x+44,y+62,x+22,y+62,x+15,y+52);
    ctx.fill();ctx.globalAlpha=1;

    // ── Dorsal spine ridge (T-Rex signature) ──
    ctx.fillStyle=C.scale;
    [[x+35,y+14,7.5],[x+40,y+11,6.8],[x+45,y+12,6.0],[x+49,y+16,5.2],[x+52,y+22,4.2],[x+54,y+30,3.0]].forEach(([sx,sy,sz])=>{
      ctx.beginPath();
      ctx.moveTo(sx-sz*0.45,sy+sz*0.6);
      ctx.bezierCurveTo(sx-sz*0.12,sy-sz*1.05,sx+sz*0.12,sy-sz*1.05,sx+sz*0.45,sy+sz*0.6);
      ctx.closePath();ctx.fill();
    });

    // ── Shoulder muscle mass overlay ──
    const sG=ctx.createRadialGradient(x+20,y+30,0,x+20,y+32,18);
    sG.addColorStop(0,C.bodyL+'55');sG.addColorStop(1,'transparent');
    ctx.fillStyle=sG;
    ctx.beginPath();ctx.ellipse(x+21,y+31,12,10,-0.3,0,Math.PI*2);ctx.fill();

    // ── Scale texture ──
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.20;
    [[x+40,y+30,4],[x+47,y+37,3.4],[x+42,y+45,3.8],[x+32,y+47,3.2],[x+22,y+44,2.8],[x+16,y+40,2.4]].forEach(([sx,sy,sr])=>{
      ctx.beginPath();ctx.ellipse(sx,sy,sr,sr*0.52,-0.3,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    // ── Subtle rib cage indication ──
    ctx.strokeStyle=C.bodyD;ctx.lineWidth=0.75;ctx.globalAlpha=0.11;
    [0,1,2,3].forEach(r=>{
      const rbx=x+15+r*7;
      ctx.beginPath();
      ctx.moveTo(rbx,y+36);
      ctx.bezierCurveTo(rbx-4,y+44,rbx-3,y+51,rbx+4,y+56);
      ctx.stroke();
    });
    ctx.globalAlpha=1;
  }

  // ── NECK + HEAD (T-Rex skull redesign) ────────────────────────
  _drawNeckHead(x,y,nodDeg,C){
    const ctx=this.ctx;
    const nod=nodDeg*(Math.PI/180);

    // Neck base at upper shoulder
    const nx0=x+29, ny0=y+25;
    const neckLen=25;
    // Neck tip — S-curve forward lean
    const nx1=nx0+Math.sin(nod)*neckLen+5;
    const ny1=ny0-Math.cos(nod)*neckLen;

    // ── Thick muscular neck ──
    this._bone(nx0,ny0,nx1,ny1,12,9,C.bodyL,C.body,C.bodyD);

    // Throat / dewlap highlight on neck ventral surface
    {
      const nMx=(nx0+nx1)*0.5+4, nMy=(ny0+ny1)*0.5+3;
      ctx.fillStyle=C.belly;ctx.globalAlpha=0.26;
      ctx.beginPath();
      ctx.moveTo(nx0+9,ny0+3);
      ctx.bezierCurveTo(nMx+7,nMy+2,nx1+6,ny1+4,nx1+5,ny1+1);
      ctx.bezierCurveTo(nx1+3,ny1+7,nMx+3,nMy+7,nx0+5,ny0+8);
      ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    }

    // Neck dorsal scale ridge
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.50;
    const nSteps=3;
    for(let i=0;i<nSteps;i++){
      const nt=(i+0.5)/nSteps;
      const nsx=nx0+(nx1-nx0)*nt-2, nsy=ny0+(ny1-ny0)*nt;
      ctx.beginPath();
      ctx.moveTo(nsx-2.2,nsy+1.5);
      ctx.bezierCurveTo(nsx-0.8,nsy-4.2,nsx+0.8,nsy-4.2,nsx+2.2,nsy+1.5);
      ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;

    // ── HEAD ──
    ctx.save();
    ctx.translate(nx1,ny1);
    ctx.rotate(nod);

    // ════ T-REX SKULL — full authentic silhouette ════

    // Main skull + upper jaw (premaxilla/maxilla)
    const skG=ctx.createLinearGradient(-13,-32,22,8);
    skG.addColorStop(0,C.bodyL);skG.addColorStop(0.38,C.body);
    skG.addColorStop(0.78,C.bodyD);skG.addColorStop(1,C.bodyD);
    ctx.fillStyle=skG;
    ctx.beginPath();
    ctx.moveTo(-12,-8);             // occipital — neck/skull junction
    ctx.bezierCurveTo(-15,-20,-11,-30,-4,-32);  // posterior cranium dome
    ctx.bezierCurveTo(0,-34,8,-32,14,-27);       // skull crown — wide temporal region
    ctx.bezierCurveTo(18,-24,22,-18,25,-12);      // nasal bones (distinctive ridge)
    ctx.bezierCurveTo(27,-7,26,-1,24,1);          // premaxilla tip (snout end)
    ctx.bezierCurveTo(22,3,18,3.5,13,2.5);        // upper jaw edge
    ctx.bezierCurveTo(7,1.5,1,0,-4,-2);           // dentary junction
    ctx.bezierCurveTo(-8,-4,-11,-6,-12,-8);        // back to occipital
    ctx.closePath();ctx.fill();

    // Lower jaw (mandible / dentary) — slightly open
    const jawG=ctx.createLinearGradient(-9,0,22,10);
    jawG.addColorStop(0,C.body);jawG.addColorStop(0.5,C.bodyD);jawG.addColorStop(1,C.bodyD);
    ctx.fillStyle=jawG;
    ctx.beginPath();
    ctx.moveTo(-9,-1);              // jaw hinge (quadrate/quadratojugal)
    ctx.bezierCurveTo(-3,3,5,5.5,12,5.5);    // lower jaw base
    ctx.bezierCurveTo(18,5,23,2,24,-2);       // jaw tip
    ctx.bezierCurveTo(22,-0.5,20,4.5,16,7);  // outer jaw surface
    ctx.bezierCurveTo(9,9.5,1,9,-4,6);       // chin
    ctx.bezierCurveTo(-7.5,3.5,-10,1,-9,-1); // back to hinge
    ctx.closePath();ctx.fill();

    // Jaw ventral highlight (lighter chin/throat)
    ctx.fillStyle=C.belly;ctx.globalAlpha=0.40;
    ctx.beginPath();
    ctx.moveTo(-5,4);
    ctx.bezierCurveTo(1,7.5,10,8,17,6);
    ctx.bezierCurveTo(12,9.5,3,10,-3,7);
    ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // ── TEETH — serrated carnivore dentition ──
    // Upper teeth (maxillary/premaxillary, hanging downward)
    ctx.fillStyle='rgba(228,224,198,0.94)';
    [[2.5,1.5,5.5,2.0],[6.5,1.5,5.0,1.9],[10.5,1.8,4.4,1.8],[14.5,1.4,3.8,1.7]].forEach(([tx,ty,th,tw])=>{
      ctx.beginPath();
      ctx.moveTo(tx-tw,ty);
      ctx.lineTo(tx,ty+th);
      ctx.lineTo(tx+tw,ty);
      ctx.bezierCurveTo(tx+tw-0.5,ty+0.5,tx-tw+0.5,ty+0.5,tx-tw,ty);
      ctx.closePath();ctx.fill();
      // Tooth highlight
      ctx.fillStyle='rgba(255,255,245,0.30)';
      ctx.beginPath();ctx.moveTo(tx-0.6,ty+0.5);ctx.lineTo(tx,ty+th*0.55);ctx.lineTo(tx+0.4,ty+0.5);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(228,224,198,0.94)';
    });
    // Lower teeth (dentary, pointing upward)
    ctx.fillStyle='rgba(218,214,188,0.90)';
    [[5,5,4.0,1.8],[9,5.5,3.5,1.7],[13,5,2.8,1.6]].forEach(([tx,ty,th,tw])=>{
      ctx.beginPath();
      ctx.moveTo(tx-tw,ty+0.5);
      ctx.lineTo(tx,ty-th);
      ctx.lineTo(tx+tw,ty+0.5);
      ctx.closePath();ctx.fill();
    });

    // ── NASAL bones — prominent T-Rex feature ──
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.38;
    ctx.beginPath();
    ctx.moveTo(4,-32);
    ctx.bezierCurveTo(10,-30,15,-26,19,-21);
    ctx.bezierCurveTo(17,-22,12,-27,6,-30);
    ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // Nasal ridge line
    ctx.strokeStyle=C.bodyD;ctx.lineWidth=1.1;ctx.globalAlpha=0.30;
    ctx.beginPath();ctx.moveTo(4,-31);ctx.bezierCurveTo(10,-28,16,-24,20,-19);ctx.stroke();
    ctx.globalAlpha=1;

    // Nostril opening (near snout tip)
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.82;
    ctx.beginPath();ctx.ellipse(18,-19,2.8,1.9,0.45,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── SUPRAORBITAL RIDGE — brow overhang ──
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.45;
    ctx.beginPath();
    ctx.moveTo(-7,-27);
    ctx.bezierCurveTo(-4,-24,1,-23,5,-25);
    ctx.bezierCurveTo(3,-28,-3,-29,-7,-27);
    ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // ── EYE SOCKET — deep hollow ──
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.65;
    ctx.beginPath();ctx.ellipse(-1,-23,6.5,5.5,-0.1,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── EYE ──
    if(this.eyeOpen){
      // Iris glow
      const eG=ctx.createRadialGradient(-1+this.eyeX,-23,0,-1+this.eyeX,-23,4.8);
      eG.addColorStop(0,C.iris);eG.addColorStop(0.45,C.eye);eG.addColorStop(1,C.eye);
      ctx.fillStyle=eG;
      ctx.beginPath();ctx.ellipse(-1+this.eyeX,-23,4.5,4,-0.05,0,Math.PI*2);ctx.fill();
      // Vertical slit pupil (reptilian)
      ctx.fillStyle='rgba(0,0,0,0.92)';
      ctx.beginPath();ctx.ellipse(-1+this.eyeX,-23,1.4,3.2,0,0,Math.PI*2);ctx.fill();
      // Primary specular
      ctx.fillStyle='rgba(255,255,255,0.65)';
      ctx.beginPath();ctx.ellipse(-0.1+this.eyeX,-24.5,1.4,1.0,-0.4,0,Math.PI*2);ctx.fill();
      // Secondary specular (depth)
      ctx.fillStyle='rgba(255,255,255,0.20)';
      ctx.beginPath();ctx.ellipse(0.5+this.eyeX,-21.5,0.8,0.6,0.5,0,Math.PI*2);ctx.fill();
    } else {
      // Blink — closed lid sweeps downward
      ctx.fillStyle=C.body;ctx.globalAlpha=0.92;
      ctx.beginPath();
      ctx.moveTo(-6,-23);
      ctx.bezierCurveTo(-3,-19,2,-19,4.5,-23);
      ctx.bezierCurveTo(2,-27,-3,-27,-6,-23);
      ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    }

    // ── Cranial detail lines (temporal fenestrae suggestion) ──
    ctx.strokeStyle=C.bodyD;ctx.lineWidth=0.75;ctx.globalAlpha=0.24;
    ctx.beginPath();ctx.moveTo(-11,-10);ctx.bezierCurveTo(-8,-25,-1,-31,7,-26);ctx.stroke();
    // Post-orbital bar
    ctx.beginPath();ctx.moveTo(5,-28);ctx.bezierCurveTo(7,-20,5,-14,2,-8);ctx.stroke();
    ctx.globalAlpha=1;

    ctx.restore();
  }

  // ── T-REX FOREARM (vestigial — absurdly tiny, correct anatomy) ─
  _drawForearm(ax,ay,swingDeg,C,isBack){
    const ctx=this.ctx;
    const sw=swingDeg*(Math.PI/180);

    // T-Rex arms were ~80cm — tiny against their massive body.
    // Two functional fingers. Held palm-inward, slightly raised.
    const uLen=7;  // upper arm
    const fLen=5;  // forearm
    const ux=ax+Math.sin(sw)*uLen*0.3+(isBack?-1.5:1.5);
    const uy=ay+uLen+Math.abs(Math.cos(sw))*2;
    const fx=ux+Math.sin(sw)*fLen*0.4+(isBack?-1:1);
    const fy=uy+fLen;

    ctx.save();
    if(isBack)ctx.globalAlpha=0.48;

    // Upper arm — tiny stub
    this._bone(ax,ay,ux,uy,4,3,C.bodyL,C.body,C.bodyD);
    // Forearm
    this._bone(ux,uy,fx,fy,3,2,C.body,C.bodyD,C.bodyD);

    // Two prominent curved claws (T-Rex had 2–3 functional fingers)
    ctx.fillStyle=C.claw;
    ctx.globalAlpha=(isBack?0.48:1)*0.9;
    // Claw 1
    ctx.beginPath();
    ctx.moveTo(fx-1,fy);
    ctx.bezierCurveTo(fx-1,fy+2,fx+2,fy+4,fx+4,fy+2);
    ctx.bezierCurveTo(fx+3,fy-0.5,fx,fy,fx-1,fy);
    ctx.closePath();ctx.fill();
    // Claw 2
    ctx.beginPath();
    ctx.moveTo(fx+2,fy+1);
    ctx.bezierCurveTo(fx+2,fy+3,fx+5,fy+5,fx+7,fy+3);
    ctx.bezierCurveTo(fx+6,fy,fx+3,fy+1,fx+2,fy+1);
    ctx.closePath();ctx.fill();

    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════════════
  //  DUCK POSE — T-Rex horizontal speed-crouch
  // ═══════════════════════════════════════════════════════════════
  _drawDuck(C){
    const ctx=this.ctx;
    const x=this.x;
    const footY=GY;
    const legH=18;
    const bodyBot=footY-legH;    // 302
    const bodyTop=footY-DUCK_H;  // 276
    const bodyMid=bodyTop+(bodyBot-bodyTop)*0.46;
    const t=this.cycle;

    // ── CAST SHADOW ──
    const sal=G_SHADOW_ALPHA*0.9;
    if(sal>0.01){
      const dcx=x+DUCK_W/2;
      const dcastG=ctx.createLinearGradient(dcx,GY,dcx+G_SHADOW_DX*1.1,GY+8);
      dcastG.addColorStop(0,`rgba(0,0,0,${Math.min(sal*2.5,0.40)})`);
      dcastG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=dcastG;
      ctx.beginPath();
      ctx.moveTo(dcx-14,GY);ctx.lineTo(dcx+14,GY);
      ctx.lineTo(dcx+G_SHADOW_DX*1.4+8,GY+9);ctx.lineTo(dcx+G_SHADOW_DX*1.4-12,GY+9);
      ctx.closePath();ctx.fill();
    }

    // ── TAIL (horizontal, extended backward) ──
    const tb=this._tailBase*0.20;
    const t1x=x+8,   t1y=bodyMid+2;
    const t2x=x-5,   t2y=bodyMid+1+tb;
    const t3x=x-18,  t3y=bodyMid+3+tb*1.5;
    const t4x=x-30,  t4y=bodyMid+5+tb*2;
    const t5x=x-40,  t5y=bodyMid+7+tb*2.4;
    this._bone(t1x,t1y,t2x,t2y, 12,9.5, C.body,C.body,C.bodyD);
    this._bone(t2x,t2y,t3x,t3y, 9.5,7,  C.body,C.bodyD,C.bodyD);
    this._bone(t3x,t3y,t4x,t4y, 7,4.5,  C.bodyD,C.bodyD,C.bodyD);
    this._bone(t4x,t4y,t5x,t5y, 4.5,1,  C.bodyD,C.bodyD,C.bodyD);
    // Tail dorsal spines
    ctx.fillStyle=C.scale;
    [[t2x,t2y-9,6],[t3x,t3y-7,4.5],[t4x,t4y-5,3]].forEach(([sx,sy,sz])=>{
      ctx.beginPath();
      ctx.moveTo(sx-sz*0.45,sy+sz*0.55);
      ctx.bezierCurveTo(sx-sz*0.12,sy-sz,sx+sz*0.12,sy-sz,sx+sz*0.45,sy+sz*0.55);
      ctx.closePath();ctx.fill();
    });

    // ── BACK LEG (deeply bent, crouching) ──
    const bkHipX=x+28, bkHipY=bodyBot;
    const bkFtX=bkHipX-10, bkFtY=GY;
    const bkIK=this._solveIK(bkHipX,bkHipY,bkFtX,bkFtY,15,13);
    this._legIK(bkHipX,bkHipY,bkIK.kneeX,bkIK.kneeY,bkIK.footX,bkIK.footY,C,true);

    // ── BODY (horizontal torpedo — T-Rex crouching aerodynamically) ──
    const bodyG=ctx.createLinearGradient(x+6,bodyTop,x+DUCK_W-4,bodyBot+4);
    bodyG.addColorStop(0,C.bodyL);bodyG.addColorStop(0.35,C.body);bodyG.addColorStop(0.72,C.bodyD);bodyG.addColorStop(1,C.bodyD);
    ctx.fillStyle=bodyG;
    ctx.beginPath();
    ctx.moveTo(x+DUCK_W-22,bodyTop+1);   // neck/shoulder rear
    ctx.bezierCurveTo(x+DUCK_W-10,bodyTop+1,x+DUCK_W-3,bodyMid-5,x+DUCK_W-1,bodyMid);
    ctx.bezierCurveTo(x+DUCK_W+1,bodyMid+9,x+DUCK_W-3,bodyBot,x+DUCK_W-14,bodyBot+2);
    ctx.bezierCurveTo(x+DUCK_W*0.52,bodyBot+5,x+16,bodyBot+3,x+12,bodyBot-1);
    ctx.bezierCurveTo(x+7,bodyBot-8,x+7,bodyMid,x+9,bodyTop+10);
    ctx.bezierCurveTo(x+11,bodyTop+2,x+16,bodyTop-1,x+DUCK_W-22,bodyTop+1);
    ctx.closePath();ctx.fill();

    // Belly highlight
    const belG=ctx.createLinearGradient(x+12,bodyMid,x+DUCK_W-10,bodyBot+4);
    belG.addColorStop(0,C.belly);belG.addColorStop(1,'transparent');
    ctx.fillStyle=belG;ctx.globalAlpha=0.38;
    ctx.beginPath();
    ctx.moveTo(x+14,bodyMid+4);
    ctx.bezierCurveTo(x+10,bodyBot,x+24,bodyBot+5,x+DUCK_W*0.5,bodyBot+5);
    ctx.bezierCurveTo(x+DUCK_W-20,bodyBot+4,x+DUCK_W-8,bodyBot,x+DUCK_W-6,bodyMid+4);
    ctx.bezierCurveTo(x+DUCK_W*0.6,bodyMid+11,x+28,bodyMid+11,x+14,bodyMid+4);
    ctx.fill();ctx.globalAlpha=1;

    // Dorsal spines (running along the spine of the crouching body)
    ctx.fillStyle=C.scale;
    [[x+DUCK_W-22,bodyTop-3,6],[x+DUCK_W-14,bodyTop-1,5],[x+DUCK_W-8,bodyTop+3,4.2],[x+DUCK_W-3,bodyMid-3,3.5]].forEach(([sx,sy,sz])=>{
      ctx.beginPath();
      ctx.moveTo(sx-sz*0.45,sy+sz*0.6);
      ctx.bezierCurveTo(sx-sz*0.12,sy-sz*1.05,sx+sz*0.12,sy-sz*1.05,sx+sz*0.45,sy+sz*0.6);
      ctx.closePath();ctx.fill();
    });

    // Scale texture
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.18;
    [[x+DUCK_W-30,bodyTop+8,3],[x+DUCK_W-20,bodyMid+2,2.5],[x+DUCK_W*0.38,bodyMid,2.5],[x+DUCK_W*0.22,bodyMid+4,2.2]].forEach(([sx,sy,sr])=>{
      ctx.beginPath();ctx.ellipse(sx,sy,sr,sr*0.52,-0.3,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    // ── NECK — horizontal thrust forward ──
    const nkBx=x+DUCK_W-22, nkBy=bodyTop+2;
    const nkEx=x+DUCK_W-6,  nkEy=bodyTop+12;
    this._bone(nkBx,nkBy,nkEx,nkEy,11,8,C.bodyL,C.body,C.bodyD);

    // Neck throat highlight
    ctx.fillStyle=C.belly;ctx.globalAlpha=0.25;
    ctx.beginPath();
    ctx.moveTo(nkBx+7,nkBy+3);
    ctx.bezierCurveTo((nkBx+nkEx)*0.5+6,(nkBy+nkEy)*0.5+3,nkEx+5,nkEy+4,nkEx+4,nkEy+1);
    ctx.bezierCurveTo(nkEx+2,nkEy+6,(nkBx+nkEx)*0.5+2,(nkBy+nkEy)*0.5+7,nkBx+4,nkBy+7);
    ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // ── HEAD (lowered, forward-thrust — duck hunting pose) ──
    ctx.save();
    ctx.translate(nkEx,nkEy);
    ctx.rotate(0.32);  // slight downward tilt when ducking

    // Skull — same T-Rex shape, oriented forward
    const hdG=ctx.createLinearGradient(-12,-26,20,8);
    hdG.addColorStop(0,C.bodyL);hdG.addColorStop(0.4,C.body);hdG.addColorStop(0.82,C.bodyD);
    ctx.fillStyle=hdG;
    ctx.beginPath();
    ctx.moveTo(-12,-7);
    ctx.bezierCurveTo(-14,-18,-10,-27,-4,-29);
    ctx.bezierCurveTo(0,-31,8,-29,14,-24);
    ctx.bezierCurveTo(18,-21,22,-15,24,-9);
    ctx.bezierCurveTo(25,-5,24,0,22,2);
    ctx.bezierCurveTo(20,3.5,16,3.5,11,2);
    ctx.bezierCurveTo(5,0.5,-1,-1,-5,-2);
    ctx.bezierCurveTo(-8,-3,-11,-5,-12,-7);
    ctx.closePath();ctx.fill();

    // Lower jaw (wide open for speed-run crouch)
    const djG=ctx.createLinearGradient(-9,0,22,9);
    djG.addColorStop(0,C.body);djG.addColorStop(1,C.bodyD);
    ctx.fillStyle=djG;
    ctx.beginPath();
    ctx.moveTo(-8,-1);
    ctx.bezierCurveTo(-2,3,6,5,12,5);
    ctx.bezierCurveTo(18,4,22,1,23,-3);
    ctx.bezierCurveTo(21,0,19,4,15,6.5);
    ctx.bezierCurveTo(8,9,0,8,-4,5);
    ctx.bezierCurveTo(-7,3,-9,1,-8,-1);
    ctx.closePath();ctx.fill();

    // Jaw belly
    ctx.fillStyle=C.belly;ctx.globalAlpha=0.38;
    ctx.beginPath();
    ctx.moveTo(-4,4);ctx.bezierCurveTo(2,7.5,10,7.5,17,5.5);
    ctx.bezierCurveTo(12,9,3,9.5,-2,6.5);ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // Upper teeth
    ctx.fillStyle='rgba(228,224,198,0.94)';
    [[2.5,1.5,5,1.9],[6.5,1.5,4.5,1.8],[10.5,1.8,4,1.7],[14.5,1.4,3.4,1.6]].forEach(([tx,ty,th,tw])=>{
      ctx.beginPath();ctx.moveTo(tx-tw,ty);ctx.lineTo(tx,ty+th);ctx.lineTo(tx+tw,ty);ctx.closePath();ctx.fill();
    });
    // Lower teeth
    ctx.fillStyle='rgba(218,214,188,0.88)';
    [[5,5,3.8,1.7],[9,5,3.2,1.6],[13,4.5,2.6,1.5]].forEach(([tx,ty,th,tw])=>{
      ctx.beginPath();ctx.moveTo(tx-tw,ty+0.5);ctx.lineTo(tx,ty-th);ctx.lineTo(tx+tw,ty+0.5);ctx.closePath();ctx.fill();
    });

    // Nostril
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.78;
    ctx.beginPath();ctx.ellipse(17,-17,2.5,1.7,0.42,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    // Nasal ridge
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.35;
    ctx.beginPath();ctx.moveTo(4,-29);ctx.bezierCurveTo(10,-27,15,-22,18,-19);
    ctx.bezierCurveTo(15,-22,10,-26,5,-28);ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // Supraorbital ridge
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.42;
    ctx.beginPath();ctx.moveTo(-7,-25);ctx.bezierCurveTo(-4,-22,1,-21,5,-23);
    ctx.bezierCurveTo(3,-27,-3,-28,-7,-25);ctx.closePath();ctx.fill();ctx.globalAlpha=1;

    // Eye socket
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.62;
    ctx.beginPath();ctx.ellipse(-1,-21,6,5,-0.08,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    // Eye (squinting / alert when ducking)
    if(this.eyeOpen){
      const eG=ctx.createRadialGradient(-1+this.eyeX,-21,0,-1+this.eyeX,-21,4.4);
      eG.addColorStop(0,C.iris);eG.addColorStop(0.45,C.eye);eG.addColorStop(1,C.eye);
      ctx.fillStyle=eG;
      ctx.beginPath();ctx.ellipse(-1+this.eyeX,-21,4.2,3.8,-0.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.90)';
      ctx.beginPath();ctx.ellipse(-1+this.eyeX,-21,1.3,3.0,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.62)';
      ctx.beginPath();ctx.ellipse(-0.1+this.eyeX,-22.4,1.3,1.0,-0.4,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=C.body;ctx.globalAlpha=0.90;
      ctx.beginPath();
      ctx.moveTo(-6,-21);ctx.bezierCurveTo(-3,-17,2,-17,4.5,-21);
      ctx.bezierCurveTo(2,-25,-3,-25,-6,-21);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    }

    ctx.restore();

    // ── FRONT LEG (deeply bent) ──
    const frHipX=x+DUCK_W-28, frHipY=bodyBot+1;
    const frFtX=frHipX+10, frFtY=GY;
    const frIK=this._solveIK(frHipX,frHipY,frFtX,frFtY,15,13);
    this._legIK(frHipX,frHipY,frIK.kneeX,frIK.kneeY,frIK.footX,frIK.footY,C,false);

    // Tiny arm visible even in duck pose
    ctx.save();ctx.globalAlpha=0.70;
    this._bone(nkBx-2,nkBy+8,nkBx+2,nkBy+16,3,2,C.body,C.bodyD,C.bodyD);
    ctx.restore();
  }
}


// ═══════════════════════════════════════════════════════════════
//  CACTUS  — Organic procedural generation, no rectangles
// ═══════════════════════════════════════════════════════════════
class Cactus {
  constructor(x,ctx,variant,isNight){
    this.x=x;this.ctx=ctx;this.dead=false;this.isNight=isNight;
    const configs=[
      {w:28,h:60,arms:0},   // single tall trunk
      {w:52,h:66,arms:1},   // one arm
      {w:74,h:72,arms:2},   // two arms
    ];
    const cfg=configs[Math.min(variant,2)];
    this.width=cfg.w; this.height=cfg.h;
    this.y=GY-this.height;
    // Procedural geometry seed
    this.seed=Math.random()*1000;
    this.armCount=cfg.arms;
    this._buildGeometry();
  }

  _rng(n){return Math.abs(Math.sin(this.seed+n)*43758.5453)%1}

  _buildGeometry(){
    // Main trunk profile points (left and right silhouette with natural variation)
    const h=this.height, w=10+this._rng(0)*4;
    const baseW=w+2+this._rng(1)*3; // slightly wider at base
    const segments=8;
    this.trunkPts={left:[],right:[]};
    for(let i=0;i<=segments;i++){
      const t=i/segments;
      const y=GY-h*(1-t);
      // Width tapers toward top with slight organic wobble
      const halfW=lerp(baseW,w*0.45,t)*(1+this._rng(i+10)*0.12-0.06);
      // Add imperfection bumps
      const bumpL=this._rng(i+20)*2.5*(1-t);
      const bumpR=this._rng(i+30)*2.5*(1-t);
      this.trunkPts.left.push({x:-halfW-bumpL, y:y-GY});
      this.trunkPts.right.push({x:halfW+bumpR, y:y-GY});
    }

    // Ridges (vertical ribs)
    this.ridges=[];
    const ridgeCount=6+Math.floor(this._rng(5)*3);
    for(let r=0;r<ridgeCount;r++){
      const xOff=(r/(ridgeCount-1)-0.5)*(w*2+2);
      this.ridges.push({x:xOff, depth:0.5+this._rng(r+40)*0.5});
    }

    // Arms
    this.arms=[];
    const armSides=this.armCount>=2?[-1,1]:this.armCount===1?[this._rng(8)>0.5?-1:1]:[];
    armSides.forEach((side,ai)=>{
      const attachT=0.35+this._rng(ai+50)*0.25; // 35-60% up the trunk
      const armH=h*(0.22+this._rng(ai+60)*0.18);
      const armW=w*0.62+this._rng(ai+70)*3;
      const bendX=side*(22+this._rng(ai+80)*14); // how far the arm extends
      const elbowT=0.55+this._rng(ai+90)*0.2; // where arm bends
      // Generate arm profile
      const armPts={left:[],right:[]};
      const armSegs=6;
      for(let i=0;i<=armSegs;i++){
        const t=i/armSegs;
        const hw=lerp(armW,armW*0.35,t)*(1+this._rng(ai*10+i+100)*0.1-0.05);
        let ax,ay;
        if(t<=elbowT){
          // going sideways
          ax=side*lerp(0,bendX,t/elbowT);
          ay=-lerp(0,4,t/elbowT); // slight droop then rise
        } else {
          // going up
          const tt=(t-elbowT)/(1-elbowT);
          ax=lerp(side*bendX,side*(bendX-3),tt);
          ay=-lerp(4,-armH,tt);
        }
        armPts.left.push({x:ax-hw,y:ay});
        armPts.right.push({x:ax+hw,y:ay});
      }
      this.arms.push({side,attachT,armPts,armH,armW,bendX,elbowT,ridgeCount:4+Math.floor(this._rng(ai+110)*2)});
    });

    // Spines (clusters at ridges)
    this.spines=[];
    for(let r=0;r<this.ridges.length;r+=2){
      const spineCount=4+Math.floor(this._rng(r+200)*4);
      for(let s=0;s<spineCount;s++){
        const t=(s+0.3)/(spineCount-0.4);
        const y=(GY-h*(1-t))-GY;
        const side=r%4<2?-1:1;
        const halfW=lerp(baseW,w*0.45,t)+this._rng(r+s+300)*1.5;
        this.spines.push({
          x:side*(halfW+1)+this.ridges[r].x*0.3,
          y,
          angle:side*(-(0.3+this._rng(r+s+400)*0.5)),
          length:3.5+this._rng(r+s+500)*5,
        });
      }
    }
  }

  update(dt,speed){this.x-=speed*dt;if(this.x+this.width<-80)this.dead=true}
  get hitbox(){return{x:this.x+6,y:this.y+2,w:this.width-12,h:this.height-2}}

  draw(){
    const ctx=this.ctx, n=this.isNight;
    const cx=this.x+this.width/2; // center X
    const main=n?'#1e5a8a':'#226020';
    const light=n?'#4898c8':'#3e8832';
    const dark=n?'#0c2e4a':'#142e10';
    const highlight=n?'#72b8e0':'#70c450';

    // ── Ground shadow ──
    const shadowW=this.width*0.85+6;
    const sg=ctx.createRadialGradient(cx,GY+2,0,cx,GY+2,shadowW*0.72);
    sg.addColorStop(0,n?'rgba(4,12,40,0.35)':'rgba(0,0,0,0.30)');
    sg.addColorStop(0.65,n?'rgba(4,12,40,0.14)':'rgba(0,0,0,0.12)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(cx,GY+3,shadowW,5.5,0,0,Math.PI*2);ctx.fill();

    // ── Directional cast shadow (follows G_SHADOW_DX sun angle) ──
    if(!n){
      const csal=G_SHADOW_ALPHA*0.95;
      ctx.save();
      const sdx=G_SHADOW_DX;
      const slen=this.height*(0.55+Math.abs(sdx)/90);
      const castG=ctx.createLinearGradient(cx,GY,cx+sdx*slen/this.height,GY+11);
      castG.addColorStop(0,`rgba(0,0,0,${Math.min(csal*3.2,0.42)})`);
      castG.addColorStop(0.6,`rgba(0,0,0,${Math.min(csal*1.0,0.14)})`);
      castG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=castG;
      ctx.beginPath();
      ctx.moveTo(cx-9,GY);ctx.lineTo(cx+9,GY);
      ctx.lineTo(cx+sdx*slen/this.height+7,GY+12);
      ctx.lineTo(cx+sdx*slen/this.height-11,GY+12);
      ctx.closePath();ctx.fill();
      ctx.restore();
    } else {
      // Night: faint moon shadow
      ctx.save();ctx.globalAlpha=0.055;ctx.fillStyle='rgba(20,60,140,1)';
      ctx.beginPath();
      ctx.moveTo(cx-8,GY);ctx.lineTo(cx+8,GY);
      ctx.lineTo(cx-46,GY+10);ctx.lineTo(cx-62,GY+10);
      ctx.closePath();ctx.fill();ctx.restore();
    }

    // ── Soil embed at base ──
    ctx.fillStyle=n?'rgba(8,18,36,0.5)':'rgba(36,20,6,0.42)';
    ctx.beginPath();ctx.ellipse(cx,GY,12,4,0,0,Math.PI*2);ctx.fill();

    // Draw arms (behind trunk)
    this.arms.forEach((arm,ai)=>{
      if(arm.side<0) this._drawArm(ctx,cx,arm,main,light,dark,highlight,n);
    });

    // ── Main trunk ──
    this._drawTrunk(ctx,cx,main,light,dark,highlight,n,this.trunkPts,this.ridges,0,this.height);

    // Draw arms (in front of trunk for right side)
    this.arms.forEach((arm,ai)=>{
      if(arm.side>0) this._drawArm(ctx,cx,arm,main,light,dark,highlight,n);
    });

    // ── Spines ──
    ctx.save();
    ctx.strokeStyle=n?'rgba(180,210,240,0.75)':'rgba(230,240,200,0.8)';
    ctx.lineWidth=0.7;
    this.spines.forEach(sp=>{
      const wx=cx+sp.x, wy=GY+sp.y;
      ctx.save();ctx.translate(wx,wy);ctx.rotate(sp.angle);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sp.length,0);ctx.stroke();
      // spine tip dot
      ctx.fillStyle=n?'rgba(180,210,240,0.5)':'rgba(240,248,210,0.6)';
      ctx.beginPath();ctx.arc(sp.length,0,0.7,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    ctx.restore();

    // ── Top cap (rounded crown) ──
    const topG=ctx.createRadialGradient(cx-2,GY-this.height+4,1,cx,GY-this.height+6,9);
    topG.addColorStop(0,highlight);topG.addColorStop(0.5,light);topG.addColorStop(1,main);
    ctx.fillStyle=topG;
    ctx.beginPath();ctx.ellipse(cx,GY-this.height+5,7,6,0,0,Math.PI*2);ctx.fill();
  }

  _drawTrunk(ctx,cx,main,light,dark,highlight,n,pts,ridges,yOff,h){
    const leftPts=pts.left, rightPts=pts.right;
    // Main body gradient (lit from upper right)
    const bodyG=ctx.createLinearGradient(cx-14,GY-h,cx+14,GY);
    bodyG.addColorStop(0,light);bodyG.addColorStop(0.3,main);bodyG.addColorStop(0.7,main);bodyG.addColorStop(1,dark);
    ctx.fillStyle=bodyG;
    // Build silhouette from profile points
    ctx.beginPath();
    ctx.moveTo(cx+leftPts[0].x, GY+leftPts[0].y+yOff);
    leftPts.forEach((p,i)=>{
      if(i>0){
        const prev=leftPts[i-1];
        const mx=(prev.x+p.x)/2, my=(prev.y+p.y)/2;
        ctx.quadraticCurveTo(cx+prev.x,GY+prev.y+yOff,cx+mx,GY+my+yOff);
      }
    });
    ctx.lineTo(cx+leftPts[leftPts.length-1].x,GY+leftPts[leftPts.length-1].y+yOff);
    // right side reversed
    for(let i=rightPts.length-1;i>=0;i--){
      const p=rightPts[i];
      if(i<rightPts.length-1){
        const next=rightPts[i+1];
        const mx=(next.x+p.x)/2, my=(next.y+p.y)/2;
        ctx.quadraticCurveTo(cx+next.x,GY+next.y+yOff,cx+mx,GY+my+yOff);
      }
    }
    ctx.closePath();ctx.fill();

    // Shadow face (right side darker)
    const shadowG=ctx.createLinearGradient(cx,GY-h,cx+16,GY);
    shadowG.addColorStop(0,'transparent');shadowG.addColorStop(0.5,dark+'88');shadowG.addColorStop(1,dark);
    ctx.fillStyle=shadowG;
    ctx.beginPath();
    const midPts=leftPts.map((p,i)=>({x:(p.x+rightPts[i].x)/2+(rightPts[i].x-p.x)*0.05, y:p.y}));
    ctx.moveTo(cx+midPts[0].x,GY+midPts[0].y+yOff);
    midPts.forEach((p,i)=>{if(i>0) ctx.lineTo(cx+p.x,GY+p.y+yOff);});
    rightPts.slice().reverse().forEach(p=>ctx.lineTo(cx+p.x,GY+p.y+yOff));
    ctx.closePath();ctx.fill();

    // Vertical ridge grooves
    ctx.strokeStyle=dark; ctx.lineWidth=0.6; ctx.globalAlpha=0.25;
    ridges.forEach(r=>{
      const rx=cx+r.x;
      // Clip-style groove from base to near top
      ctx.beginPath();
      ctx.moveTo(rx,GY+yOff);
      ctx.bezierCurveTo(rx+r.depth,GY-h*0.25+yOff,rx-r.depth,GY-h*0.55+yOff,rx,GY-h*0.88+yOff);
      ctx.stroke();
    });
    ctx.globalAlpha=1;

    // Scars/damage patches
    for(let s=0;s<2;s++){
      const sy=GY-(this._rng(s+600)*0.7+0.15)*h+yOff;
      const sx=cx+(this._rng(s+610)-0.5)*14;
      ctx.fillStyle=n?'rgba(8,30,55,0.22)':'rgba(10,28,8,0.18)';
      ctx.beginPath();ctx.ellipse(sx,sy,5+this._rng(s+620)*4,2.5+this._rng(s+630)*2,this._rng(s+640)*0.6-0.3,0,Math.PI*2);ctx.fill();
    }

    // Highlight stripe (lit edge)
    ctx.strokeStyle=highlight; ctx.lineWidth=1.4; ctx.globalAlpha=0.22;
    ctx.beginPath();
    leftPts.forEach((p,i)=>{
      const x2=cx+p.x+3, y2=GY+p.y+yOff;
      if(i===0) ctx.moveTo(x2,y2); else ctx.lineTo(x2,y2);
    });
    ctx.stroke();
    ctx.globalAlpha=1;
  }

  _drawArm(ctx,cx,arm,main,light,dark,highlight,n){
    const aY=GY-(arm.attachT)*this.height;
    const pts=arm.armPts;
    const lp=pts.left, rp=pts.right;

    // Arm body
    const armG=ctx.createLinearGradient(cx+arm.side*arm.bendX*0.3,aY-4,cx+arm.side*arm.bendX,aY-arm.armH);
    armG.addColorStop(0,main);armG.addColorStop(0.4,light);armG.addColorStop(1,main);
    ctx.fillStyle=armG;
    ctx.beginPath();
    ctx.moveTo(cx+lp[0].x,aY+lp[0].y);
    lp.forEach((p,i)=>{if(i>0) ctx.lineTo(cx+p.x,aY+p.y);});
    ctx.lineTo(cx+rp[rp.length-1].x,aY+rp[rp.length-1].y);
    for(let i=rp.length-1;i>=0;i--) ctx.lineTo(cx+rp[i].x,aY+rp[i].y);
    ctx.closePath();ctx.fill();

    // Arm shadow
    const shadG=ctx.createLinearGradient(cx,aY,cx+arm.side*arm.bendX,aY-arm.armH*0.5);
    shadG.addColorStop(0,dark+'60');shadG.addColorStop(1,'transparent');
    ctx.fillStyle=shadG;
    ctx.beginPath();
    const midL=lp.map((p,i)=>({x:(p.x+rp[i].x)/2+rp[i].x*0.08,y:p.y}));
    ctx.moveTo(cx+midL[0].x,aY+midL[0].y);
    midL.forEach((p,i)=>{if(i>0)ctx.lineTo(cx+p.x,aY+p.y);});
    for(let i=rp.length-1;i>=0;i--)ctx.lineTo(cx+rp[i].x,aY+rp[i].y);
    ctx.closePath();ctx.fill();

    // Arm ridges
    ctx.strokeStyle=dark;ctx.lineWidth=0.5;ctx.globalAlpha=0.22;
    for(let r=0;r<arm.ridgeCount;r++){
      const t=(r+0.5)/arm.ridgeCount;
      const ax=cx+lerp(lp[0].x,lp[lp.length-1].x,t);
      const ay=aY+lerp(0,lp[lp.length-1].y,t);
      ctx.beginPath();ctx.moveTo(ax,ay-6);ctx.lineTo(ax,ay+6);ctx.stroke();
    }
    ctx.globalAlpha=1;

    // Arm top cap
    const tipX=cx+lp[lp.length-1].x+(rp[rp.length-1].x-lp[lp.length-1].x)*0.5;
    const tipY=aY+lp[lp.length-1].y;
    const armCapG=ctx.createRadialGradient(tipX-1,tipY-2,0,tipX,tipY,5);
    armCapG.addColorStop(0,highlight);armCapG.addColorStop(1,main);
    ctx.fillStyle=armCapG;
    ctx.beginPath();ctx.ellipse(tipX,tipY,4.5,4,0,0,Math.PI*2);ctx.fill();

    // Arm spines
    ctx.strokeStyle=n?'rgba(180,210,240,0.7)':'rgba(230,240,200,0.75)';ctx.lineWidth=0.65;
    for(let s=0;s<5;s++){
      const t=(s+0.5)/5;
      const ax=cx+lerp(lp[0].x,lp[lp.length-1].x,t);
      const ay=aY+lerp(lp[0].y,lp[lp.length-1].y,t);
      const aw=lerp(lp[0].x-rp[0].x,lp[lp.length-1].x-rp[lp.length-1].x,t)*0.5;
      const sideSign=s%2===0?-1:1;
      ctx.beginPath();ctx.moveTo(ax+aw*0.5*sideSign,ay);ctx.lineTo(ax+aw*0.5*sideSign+sideSign*4.5,ay-2);ctx.stroke();
    }
  }

  _rr(x,y,w,h,r){
    const ctx=this.ctx;r=Math.min(r,w/2,h/2);
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  }
}

// ═══════════════════════════════════════════════════════════════
//  BIRD  — Realistic anatomy: wing-bone structure, primary/secondary feathers
// ═══════════════════════════════════════════════════════════════
class Bird {
  constructor(x,ctx,level,isNight){
    this.x=x;this.ctx=ctx;this.dead=false;this.isNight=isNight;
    this.width=64;this.height=34;
    const hs=[GY-DUCK_H-16,GY-DINO_H-24,GY-DINO_H-94];
    this.y=hs[Math.min(level,2)];
    this.wc=Math.random(); // wing cycle
    this.bodyBob=Math.random()*Math.PI*2;
    this.tailWag=Math.random()*Math.PI*2;
    this.eyeBlink=0;
  }
  update(dt,speed){
    this.x-=speed*dt;if(this.x+this.width<-80)this.dead=true;
    this.wc=(this.wc+3.2*dt)%1;
    this.bodyBob+=dt*2.4;
    this.tailWag+=dt*3.8;
    this.eyeBlink+=dt;
    if(this.eyeBlink>4.2) this.eyeBlink=0;
  }
  get hitbox(){return{x:this.x+8,y:this.y+5,w:this.width-16,h:this.height-10}}

  draw(){
    const ctx=this.ctx, n=this.isNight;
    // Color palette
    const body =n?'#3a6ea0':'#4a3020';
    const bodyL=n?'#6898c8':'#6e5030';
    const bodyD=n?'#1e4070':'#281408';
    const wing =n?'#2e5888':'#3c2416';
    const wingL=n?'#5a88c0':'#584030';
    const beak ='#d8a020';
    const beakD='#a07010';
    const cx=this.x+this.width/2;
    const cy=this.y+this.height/2+3+Math.sin(this.bodyBob)*2.2;

    // Wing flap angle — full sine cycle, maps to anatomically plausible range
    const flapT=this.wc*Math.PI*2;
    const flapAngle=Math.sin(flapT)*0.72; // radians, -0.72 to 0.72

    // ── Ground shadow (contact + directional cast) ──
    const altFactor=clamp(1-(this.y+DINO_H*0.5-GY+120)/200,0,1);
    const bSW=26*(0.5+altFactor*0.5);
    const bsg=ctx.createRadialGradient(cx,GY+3,0,cx,GY+3,bSW+6);
    bsg.addColorStop(0,n?`rgba(4,16,50,${0.18*altFactor})`:`rgba(0,0,0,${0.16*altFactor})`);
    bsg.addColorStop(1,'transparent');
    ctx.fillStyle=bsg;ctx.beginPath();ctx.ellipse(cx,GY+3,bSW+6,3.5,0,0,Math.PI*2);ctx.fill();
    // Directional cast shadow
    if(!n && altFactor>0.05){
      const bsal=G_SHADOW_ALPHA*altFactor*0.8;
      const bsdx=G_SHADOW_DX*altFactor;
      ctx.save();
      const bcG=ctx.createLinearGradient(cx,GY,cx+bsdx*0.8,GY+6);
      bcG.addColorStop(0,`rgba(0,0,0,${Math.min(bsal*2.5,0.32)})`);
      bcG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bcG;
      ctx.beginPath();
      ctx.moveTo(cx-8,GY);ctx.lineTo(cx+8,GY);
      ctx.lineTo(cx+bsdx*0.9+5,GY+7);ctx.lineTo(cx+bsdx*0.9-9,GY+7);
      ctx.closePath();ctx.fill();ctx.restore();
    }

    ctx.save();ctx.translate(cx,cy);

    // ── BACK WING (behind body, slightly smaller, lower alpha) ──
    ctx.save();ctx.globalAlpha=0.62;
    this._drawWing(ctx,flapAngle+0.15,1,wing,wingL,bodyD,n,true);
    ctx.restore();

    // ── BODY ──
    // Torso - egg shaped, wider at chest
    const bodyG=ctx.createLinearGradient(-16,-9,16,9);
    bodyG.addColorStop(0,bodyL);bodyG.addColorStop(0.45,body);bodyG.addColorStop(1,bodyD);
    ctx.fillStyle=bodyG;
    ctx.beginPath();
    ctx.moveTo(-12,0);
    ctx.bezierCurveTo(-14,-9,-4,-12,5,-10);
    ctx.bezierCurveTo(14,-8,17,-2,16,4);
    ctx.bezierCurveTo(15,10,8,12,-2,11);
    ctx.bezierCurveTo(-10,10,-12,6,-12,0);
    ctx.closePath();ctx.fill();
    // Chest highlight
    ctx.fillStyle=bodyL;ctx.globalAlpha=0.32;
    ctx.beginPath();ctx.ellipse(3,-5,7,4.5,0.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Wing shoulder bump
    ctx.fillStyle=bodyD;ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.ellipse(-5,-7,5,3.5,-0.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── TAIL FEATHERS ──
    const tailWagAngle=Math.sin(this.tailWag)*0.12;
    ctx.save();ctx.rotate(tailWagAngle);
    // Primary tail fan
    const tailColors=[bodyD,wing,bodyD,body];
    for(let f=0;f<4;f++){
      const fa=(f-1.5)*0.14;
      const fl=12+f*0.8;
      ctx.save();ctx.rotate(fa);
      const tfG=ctx.createLinearGradient(-14,-2,-14-fl,4+f);
      tfG.addColorStop(0,body);tfG.addColorStop(1,tailColors[f]);
      ctx.fillStyle=tfG;
      ctx.beginPath();
      ctx.moveTo(-12,1);
      ctx.bezierCurveTo(-12-fl*0.4,2-f*0.5,-12-fl*0.8,3+f*0.3,-12-fl,2+f*0.8);
      ctx.bezierCurveTo(-12-fl*0.8,3.5+f,-12-fl*0.4,3,- 12,2);
      ctx.closePath();ctx.fill();
      // Feather shaft
      ctx.strokeStyle=bodyD;ctx.lineWidth=0.5;ctx.globalAlpha=0.35;
      ctx.beginPath();ctx.moveTo(-12,1.5);ctx.lineTo(-12-fl*0.9,2.5+f*0.6);ctx.stroke();
      ctx.globalAlpha=1;
      ctx.restore();
    }
    ctx.restore();

    // ── NECK / HEAD ──
    // Neck
    const neckG=ctx.createLinearGradient(8,-8,18,-18);
    neckG.addColorStop(0,body);neckG.addColorStop(1,bodyL);
    ctx.fillStyle=neckG;
    ctx.beginPath();
    ctx.moveTo(9,-7);
    ctx.bezierCurveTo(10,-12,14,-18,18,-20);
    ctx.bezierCurveTo(22,-22,25,-18,22,-14);
    ctx.bezierCurveTo(20,-10,14,-8,11,-6);
    ctx.closePath();ctx.fill();

    // Skull / head
    const headG=ctx.createRadialGradient(18,-21,0,18,-20,10);
    headG.addColorStop(0,bodyL);headG.addColorStop(0.5,body);headG.addColorStop(1,bodyD);
    ctx.fillStyle=headG;
    ctx.beginPath();
    ctx.moveTo(12,-16);
    ctx.bezierCurveTo(10,-24,18,-28,26,-24);
    ctx.bezierCurveTo(32,-20,30,-14,26,-12);
    ctx.bezierCurveTo(22,-10,14,-12,12,-16);
    ctx.closePath();ctx.fill();
    // Head highlight
    ctx.fillStyle=bodyL;ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.ellipse(19,-22,5.5,3.5,0.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── BEAK ──
    // Upper mandible
    ctx.fillStyle=beak;
    ctx.beginPath();
    ctx.moveTo(25,-16);ctx.bezierCurveTo(30,-16,38,-14,38,-12);
    ctx.bezierCurveTo(38,-10,31,-11,25,-14);ctx.closePath();ctx.fill();
    // Lower mandible
    ctx.fillStyle=beakD;
    ctx.beginPath();
    ctx.moveTo(25,-14);ctx.bezierCurveTo(30,-14,36,-12,37,-11);
    ctx.bezierCurveTo(36,-9,29,-10,25,-12);ctx.closePath();ctx.fill();
    // Beak ridge line
    ctx.strokeStyle=beakD;ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(25,-14);ctx.lineTo(37,-12);ctx.stroke();
    // Mouth crease
    ctx.strokeStyle=bodyD;ctx.lineWidth=0.8;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.moveTo(25,-14);ctx.lineTo(34,-13);ctx.stroke();
    ctx.globalAlpha=1;

    // ── EYE ──
    const eyeOpen=this.eyeBlink<3.8||this.eyeBlink>4.1;
    ctx.fillStyle='rgba(240,235,210,0.95)';
    ctx.beginPath();ctx.ellipse(20,-20,4,3.2,0.1,0,Math.PI*2);ctx.fill();
    if(eyeOpen){
      // Iris
      const eyeG=ctx.createRadialGradient(19.5,-20.5,0,20,-20,3);
      eyeG.addColorStop(0,n?'rgba(30,100,200,0.95)':'rgba(60,30,8,0.95)');
      eyeG.addColorStop(0.6,n?'rgba(10,50,120,1)':'rgba(25,12,4,1)');
      eyeG.addColorStop(1,'rgba(0,0,0,1)');
      ctx.fillStyle=eyeG;ctx.beginPath();ctx.ellipse(20,-20,3,2.5,0.1,0,Math.PI*2);ctx.fill();
      // Pupil
      ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(20.5,-20,1.5,1.8,0.1,0,Math.PI*2);ctx.fill();
      // Specular
      ctx.fillStyle='rgba(255,255,255,0.95)';ctx.beginPath();ctx.arc(21.5,-21.5,1.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(19,-19.5,0.6,0,Math.PI*2);ctx.fill();
    } else {
      ctx.strokeStyle=bodyD;ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(17,-20);ctx.quadraticCurveTo(20,-17.5,23,-20);ctx.stroke();
    }
    // Eye ring
    ctx.strokeStyle=bodyD;ctx.lineWidth=0.8;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.ellipse(20,-20,4,3.2,0.1,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;

    // ── FRONT WING (on top of body) ──
    this._drawWing(ctx,flapAngle,1,wing,wingL,bodyD,n,false);

    // ── FEET ──
    const flapAmt=Math.abs(Math.sin(flapT));
    const footDrop=4+flapAmt*5;
    ctx.strokeStyle=beak;ctx.lineWidth=1.4;
    [[2,8],[10,8]].forEach(([fx,fy])=>{
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx,fy+footDrop);ctx.stroke();
      // Toes
      [[-3,2],[0,3],[3,2]].forEach(([tx,ty])=>{
        ctx.beginPath();ctx.moveTo(fx,fy+footDrop);ctx.lineTo(fx+tx,fy+footDrop+ty);ctx.stroke();
      });
    });

    ctx.restore();
  }

  _drawWing(ctx,angle,dir,wing,wingL,wingD,n,isBack){
    ctx.save();
    ctx.rotate(angle * dir);

    // Humerus line (upper arm bone direction)
    const humerusL=18;
    const radiusL=15;
    const handL=10;

    // Approximate anatomical wing positions
    const hx2=-2+humerusL*Math.cos(-0.35);
    const hy2=-7+humerusL*Math.sin(-0.35);
    const rx2=hx2+radiusL*Math.cos(0.5+angle*0.3);
    const ry2=hy2+radiusL*Math.sin(0.5+angle*0.3);

    // Secondary feathers (arm coverts)
    const secCount=7;
    for(let f=0;f<secCount;f++){
      const t=f/(secCount-1);
      const sx=lerp(-2,hx2,t), sy=lerp(-7,hy2,t);
      const nx=lerp(hx2,rx2,t)-sx, ny=lerp(hy2,ry2,t)-sy;
      const len=Math.sqrt(nx*nx+ny*ny)||1;
      const perpX=-ny/len, perpY=nx/len;
      const fLen=10+Math.sin(t*Math.PI)*4;
      const fAngle=-0.5+angle*0.15;
      const wG=ctx.createLinearGradient(sx,sy,sx+perpX*fLen*0.8,sy+perpY*fLen*0.8);
      wG.addColorStop(0,t<0.5?wingL:wing);wG.addColorStop(1,wingD);
      ctx.fillStyle=wG;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.bezierCurveTo(
        sx+perpX*fLen*0.3-nx/len*2,sy+perpY*fLen*0.3-ny/len*2,
        sx+perpX*fLen*0.8,sy+perpY*fLen*0.8,
        sx+perpX*fLen,sy+perpY*fLen
      );
      ctx.bezierCurveTo(
        sx+perpX*(fLen-2)+nx/len*3,sy+perpY*(fLen-2)+ny/len*3,
        sx+nx/len*3+perpX*2,sy+ny/len*3+perpY*2,
        sx,sy
      );
      ctx.closePath();ctx.fill();
      // Feather quill
      if(!isBack){
        ctx.strokeStyle=wingD;ctx.lineWidth=0.5;ctx.globalAlpha=0.35;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+perpX*fLen*0.85,sy+perpY*fLen*0.85);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    // Primary feathers (hand/manus)
    const primCount=6;
    for(let f=0;f<primCount;f++){
      const t=f/(primCount-1);
      const sx=lerp(hx2,rx2,t*0.6+0.4), sy=lerp(hy2,ry2,t*0.6+0.4);
      const angOff=angle*0.4+t*0.6+0.3;
      const fLen=12+f*1.2;
      const px=Math.cos(angOff)*fLen, py=Math.sin(angOff)*fLen;
      const wG=ctx.createLinearGradient(sx,sy,sx+px,sy+py);
      wG.addColorStop(0,wing);wG.addColorStop(1,wingD);
      ctx.fillStyle=wG;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.bezierCurveTo(sx+px*0.3-py*0.15,sy+py*0.3+px*0.15,sx+px*0.8,sy+py*0.8,sx+px,sy+py);
      ctx.bezierCurveTo(sx+px*0.7+py*0.1,sy+py*0.7-px*0.1,sx+px*0.2+py*0.12,sy+py*0.2-px*0.12,sx,sy);
      ctx.closePath();ctx.fill();
      // Quill
      if(!isBack){
        ctx.strokeStyle=wingD;ctx.lineWidth=0.5;ctx.globalAlpha=0.3;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+px*0.9,sy+py*0.9);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    // Wing covert fill (smooth upper surface)
    const covertG=ctx.createLinearGradient(-2,-7,hx2,hy2);
    covertG.addColorStop(0,wingL);covertG.addColorStop(0.5,wing);covertG.addColorStop(1,wingD);
    ctx.fillStyle=covertG;ctx.globalAlpha=0.5;
    ctx.beginPath();
    ctx.moveTo(-4,-5);ctx.bezierCurveTo(-2,-9,hx2-4,hy2-2,hx2,hy2);
    ctx.bezierCurveTo(hx2+4,hy2+2,-1,-4,-4,-3);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;

    ctx.restore();
  }
}

//  COLLISION
// ═══════════════════════════════════════════════════════════════
function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

// ═══════════════════════════════════════════════════════════════
//  GAME
// ═══════════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);

class Game {
  constructor(){
    this.canvas=$('gc');this.ctx=this.canvas.getContext('2d');
    this._resize();window.addEventListener('resize',()=>this._resize());
    this.audio=new Audio2();this.input=new Input();
    this.bg=new Background(this.ctx);
    this.gd=new GroundDetails(this.ctx);
    this.particles=new Particles(this.ctx);
    this.dino=new Dino(this.ctx);
    this.camera=new Camera();
    this.weather=new Weather();
    this.state='start';this.score=0;
    this.hi=parseInt(localStorage.getItem('dr3hi')||'0',10);
    this.speed=SPD0;this.obs=[];this.nextObs=W+220;
    this.isNight=false;this.lastT=null;this.fid=null;
    this.slt=0;this.muted=false;this.t=0;
    this.deathT=0;this.slowmo=1;
    this.motionBlur=0;

    this.gos=$('gos');this.hud=$('hud');
    this.svEl=$('sv');this.bvEl=$('bv');
    this.finalEl=$('finalScore');this.hiEl=$('hiDisp');
    this.bdEl=$('bestDisp');this.newBR=$('newBest');this.prevBR=$('prevBest');
    this.sfEl=$('sf');this.mbEl=$('mb');
    this.wrap=$('wrap');

    // Intro
    const introCanvas=$('intro-canvas');
    this.introEngine=new IntroEngine(introCanvas);
    this._updBest();

    $('start-btn').addEventListener('click',()=>this.startGame());
    $('restartBtn').addEventListener('click',()=>this.restart());
    this.mbEl.addEventListener('click',()=>this._mute());

    this.input.onStart=()=>{if(this.state==='start')this.startGame()};
    this.input.onJump=()=>{
      if(this.state==='playing'){
        const wasOn=this.dino.onGround;
        this.dino.jump(this.audio);
        if(wasOn){
          this.particles.spawnLandDust(this.dino.x+DINO_W/2,GY,this.isNight?'rgba(100,180,255,0.55)':'rgba(185,155,85,0.6)');
          this.particles.spawnJumpRing(this.dino.x+DINO_W/2,GY,this.isNight);
          this.camera.shake(0.12);
        }
      } else if(this.state==='dead') this.restart();
    };
    this.input.onDuck=()=>{if(this.state==='playing')this.dino.duck(true,this.audio)};
    this.input.onDuckEnd=()=>{if(this.state==='playing')this.dino.duck(false,this.audio)};
    this.input.onRestart=()=>{if(this.state==='dead')this.restart()};

    this._drawIdle();
  }

  _resize(){
    const wr=$('wrap').getBoundingClientRect();
    this.canvas.width=W;this.canvas.height=H;
    const s=Math.min(wr.width/W,wr.height/H);
    this.canvas.style.width=`${W*s}px`;this.canvas.style.height=`${H*s}px`;
    this.canvas.style.left=`${(wr.width-W*s)/2}px`;this.canvas.style.top=`${(wr.height-H*s)/2}px`;
  }
  _showGO(){this.gos.classList.add('on')}
  _hideGO(){this.gos.classList.remove('on')}
  _updBest(){
    const f=String(this.hi).padStart(5,'0');
    this.bvEl.textContent=f;
    const hi=$('intro-hi');
    if(hi&&this.hi>0) hi.textContent=`🏆 Best: ${f}`;
  }
  _mute(){this.muted=this.audio.toggleMute();this.mbEl.textContent=this.muted?'🔇':'🔊'}

  startGame(){
    this.audio.resume();this._hideGO();
    // Cinematic transition
    const intro=$('intro');
    intro.style.transition='opacity 1s ease';
    intro.style.opacity='0';
    setTimeout(()=>intro.style.display='none',1000);
    document.body.classList.add('playing');
    this.hud.style.display='flex';this.state='playing';this._reset();
    this.audio.startAmbience();
    this._loop();
  }
  restart(){
    this.audio.resume();this._hideGO();
    this.hud.style.display='flex';this.state='playing';this._reset();
    if(this.fid)cancelAnimationFrame(this.fid);this._loop();
  }
  _reset(){
    this.score=0;this.speed=SPD0;this.obs=[];this.nextObs=W+300;
    this.isNight=false;this.lastT=null;this.t=0;this.slt=0;
    this.bg.isNight=false;this.slowmo=1;this.deathT=0;this.motionBlur=0;
    this.dino=new Dino(this.ctx);this.dino.isNight=false;
    this.gd.scrollX=0;this.particles.p=[];this.particles.ambientP=[];
    this.camera=new Camera();
    this.svEl.textContent='00000';this._updBest();
  }
  _gameOver(){
    this.state='dead';this.audio.gameOver();
    this.camera.shake(1.0);
    this.slowmo=0.12;
    this.particles.spawnExplosion(this.dino.x+this.dino.W/2,this.dino.y+this.dino.H/2,this.isNight);
    const isNew=this.score>this.hi;
    if(isNew){this.hi=this.score;localStorage.setItem('dr3hi',String(this.hi))}
    const pad=n=>String(Math.floor(n)).padStart(5,'0');
    this.finalEl.textContent=pad(this.score);
    this.hiEl.textContent=pad(this.hi);
    this.bdEl.textContent=pad(this.hi);
    this.newBR.style.display=isNew?'flex':'none';
    this.prevBR.style.display=isNew?'none':'flex';
    setTimeout(()=>this._showGO(),680);
  }
  _spawnObs(){
    const sv=Math.floor(this.score);
    const bc=sv>=BIRD_MIN?Math.min(0.40,(sv-500)/2800):0;
    if(Math.random()<bc) this.obs.push(new Bird(W+70,this.ctx,Math.floor(Math.random()*3),this.isNight));
    else this.obs.push(new Cactus(W+70,this.ctx,Math.floor(Math.random()*3),this.isNight));
    const gf=Math.max(0.48,1-this.score/5000);
    this.nextObs=MINGAP+Math.random()*(MAXGAP-MINGAP)*gf;
  }
  _checkDN(s){
    const n=Math.floor(s/DNI)%2===1;
    if(n!==this.isNight){
      this.isNight=n;this.bg.isNight=n;this.dino.isNight=n;
      this.audio.dayNight();
    }
    updateGlobalShadow(s,n);
  }

  _loop(){
    const tick=ts=>{
      if(this.state!=='playing'&&this.state!=='dead')return;
      if(!this.lastT)this.lastT=ts;
      const rawDt=Math.min((ts-this.lastT)/1000,MAXDT);
      const dt=rawDt*this.slowmo;
      this.lastT=ts;this.t+=rawDt;
      // Restore slowmo
      if(this.state==='dead'&&this.slowmo<1){this.slowmo=lerp(this.slowmo,1,rawDt*1.2);if(this.slowmo>0.98)this.slowmo=1}
      if(this.state==='playing') this._update(dt,rawDt);
      this._draw();
      this.fid=requestAnimationFrame(tick);
    };
    this.fid=requestAnimationFrame(tick);
  }

  _update(dt,rawDt){
    this.speed=Math.min(SPDMAX,this.speed+SPDINC*dt);
    const prev=Math.floor(this.score);
    this.score+=this.speed*dt*0.015;
    const now=Math.floor(this.score);
    if(Math.floor(now/MILESTONE)>Math.floor(prev/MILESTONE)){
      const ms=now-(now%MILESTONE);
      this.sfEl.textContent=ms>=2000?`⚡ SPEED ${ms}`:`✦ ${ms}`;
      this.sfEl.classList.remove('fa');void this.sfEl.offsetWidth;this.sfEl.classList.add('fa');
      this.audio.milestone();
    }
    const pad=String(now).padStart(5,'0');
    if(this.svEl.textContent!==pad){
      this.svEl.textContent=pad;
      if(now%100===0&&now>0){this.svEl.classList.remove('sp');void this.svEl.offsetWidth;this.svEl.classList.add('sp')}
    }
    this._checkDN(now);
    this.bg.update(dt,this.speed);
    this.gd.update(dt,this.speed);
    this.dino.update(dt,this.speed);
    this.camera.update(rawDt);
    this.weather.update(rawDt,this.speed);
    this.audio.setWindSpeed(this.speed);

    // Landing shake
    if(this.dino.landShake>0.8){
      this.camera.shake(0.25);
      this.particles.spawnImpactSpark(this.dino.x+DINO_W/2,GY,this.isNight);
      this.audio.land();
      this.dino.landShake=0;
    }

    // Foot dust + footprints
    const dustCol=this.isNight?'rgba(100,180,255,0.48)':'rgba(192,162,90,0.58)';
    if(this.dino.LF&&!this.dino.prevLF){
      this.particles.spawnFootDust(this.dino.x+22,GY,dustCol);
      this.particles.spawnFootprint(this.dino.x+22,GY,this.isNight,this.speed);
      if(this.speed>400) this.audio.footstep();
    }
    if(this.dino.RF&&!this.dino.prevRF){
      this.particles.spawnFootDust(this.dino.x+38,GY,dustCol);
      this.particles.spawnFootprint(this.dino.x+38,GY,this.isNight,this.speed);
      if(this.speed>400) this.audio.footstep();
    }

    // Speed lines
    if(this.speed>530){
      this.slt-=dt;
      if(this.slt<=0){
        const fr=clamp((this.speed-530)/380,0,1);this.slt=lerp(0.2,0.038,fr);
        const lc=this.isNight?'rgba(100,200,255,0.32)':'rgba(255,225,170,0.32)';
        for(let i=0;i<3;i++) this.particles.spawnSpeedLine(W*0.45+Math.random()*W*0.55,this.dino.y+Math.random()*DINO_H,lc);
      }
    }
    // Speed camera shake
    if(this.speed>900&&Math.random()<0.02) this.camera.shake(0.04);

    // Motion blur intensity
    this.motionBlur=clamp((this.speed-600)/400,0,0.6);

    this.nextObs-=this.speed*dt;
    if(this.nextObs<=0)this._spawnObs();
    for(const o of this.obs)o.update(dt,this.speed);
    this.obs=this.obs.filter(o=>!o.dead);

    const db=this.dino.hitbox;
    for(const o of this.obs){if(hits(db,o.hitbox)){this._gameOver();return}}
    this.particles.update(dt);
    this.particles.updateAmbient(rawDt,this.isNight);
  }

  _draw(){
    const ctx=this.ctx;
    // Motion blur via semi-transparent overlay
    if(this.motionBlur>0&&this.state==='playing'){
      ctx.fillStyle=`rgba(0,0,0,${this.motionBlur*0.18})`;
      ctx.fillRect(0,0,W,H);
    } else {
      ctx.clearRect(0,0,W,H);
    }

    ctx.save();
    this.camera.apply(ctx);

    this.bg.draw(this.t,this.score);
    this.gd.draw(this.isNight);
    this.weather.draw(ctx);
    this.particles.draw();
    for(const o of this.obs)o.draw();
    this.dino.draw();

    // ── SPEED FEEL ──────────────────────────────────────────────
    if(this.speed>520&&this.state==='playing'){
      const fr=clamp((this.speed-520)/480,0,1);
      // Directional streaks approaching the dino
      ctx.save();
      for(let i=0;i<5;i++){
        const ly=this.dino.y+6+i*16;
        const grad=ctx.createLinearGradient(0,ly,DINO_X+10,ly);
        grad.addColorStop(0,'transparent');
        grad.addColorStop(0.6,'transparent');
        grad.addColorStop(1,this.isNight?`rgba(100,200,255,${fr*0.20})`:`rgba(255,228,140,${fr*0.18})`);
        ctx.strokeStyle=grad;ctx.lineWidth=0.7+i*0.15;
        ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(DINO_X+10,ly);ctx.stroke();
      }
      ctx.restore();
      // Edge vignette darkens with speed
      if(fr>0.15){
        const sv=ctx.createRadialGradient(W/2,H/2,H*0.20,W/2,H/2,H*0.72);
        sv.addColorStop(0,'transparent');
        sv.addColorStop(0.72,'transparent');
        sv.addColorStop(1,`rgba(0,0,0,${fr*0.20})`);
        ctx.fillStyle=sv;ctx.fillRect(0,0,W,H);
        // Left edge motion blur strip
        const leftG=ctx.createLinearGradient(0,0,50,0);
        leftG.addColorStop(0,`rgba(0,0,0,${fr*0.14})`);
        leftG.addColorStop(1,'transparent');
        ctx.fillStyle=leftG;ctx.fillRect(0,0,50,H);
      }
    }

    ctx.restore();

    // Cinematic vignette
    const vg=ctx.createRadialGradient(W/2,H*0.5,H*0.22,W/2,H*0.5,H*0.82);
    vg.addColorStop(0,'transparent');
    vg.addColorStop(1,'rgba(0,0,0,0.3)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

    // Top gradient bar (subtle)
    const tg=ctx.createLinearGradient(0,0,0,28);
    tg.addColorStop(0,'rgba(0,0,0,0.2)');
    tg.addColorStop(1,'transparent');
    ctx.fillStyle=tg;ctx.fillRect(0,0,W,28);

    // Ground depth gradient
    const gbot=ctx.createLinearGradient(0,GY+60,0,H);
    gbot.addColorStop(0,'transparent');
    gbot.addColorStop(1,'rgba(0,0,0,0.25)');
    ctx.fillStyle=gbot;ctx.fillRect(0,GY+60,W,H-GY-60);

    // Death flash
    if(this.state==='dead'&&this.slowmo<0.5){
      ctx.fillStyle=`rgba(255,120,0,${(1-this.slowmo*2)*0.12})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  _drawIdle(){
    this.ctx.clearRect(0,0,W,H);
    this.bg.draw(0,0);this.gd.draw(false);this.dino.draw();
    // Vignette
    const vg=this.ctx.createRadialGradient(W/2,H*0.5,H*0.22,W/2,H*0.5,H*0.82);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.3)');
    this.ctx.fillStyle=vg;this.ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════════════════════
//  FULLSCREEN & ORIENTATION LOCK
// ═══════════════════════════════════════════════════════════════
(function(){
  'use strict';

  const ENTER_D = 'M3 8V3h5M12 3h5v5M17 12v5h-5M8 17H3v-5';
  const EXIT_D  = 'M8 3v5H3M17 8h-5V3M12 17v-5h5M3 12h5v5';

  // ─── Feature detection ───────────────────────────────────────
  const fsAPI = (()=>{
    const d = document.documentElement;
    if(d.requestFullscreen)          return{enter:'requestFullscreen',       exit:'exitFullscreen',       el:'fullscreenElement',       evt:'fullscreenchange'};
    if(d.webkitRequestFullscreen)    return{enter:'webkitRequestFullscreen', exit:'webkitExitFullscreen', el:'webkitFullscreenElement', evt:'webkitfullscreenchange'};
    if(d.mozRequestFullScreen)       return{enter:'mozRequestFullScreen',    exit:'mozCancelFullScreen',  el:'mozFullScreenElement',    evt:'mozfullscreenchange'};
    if(d.msRequestFullscreen)        return{enter:'msRequestFullscreen',     exit:'msExitFullscreen',     el:'msFullscreenElement',     evt:'MSFullscreenChange'};
    return null;
  })();

  const oriAPI = (()=>{
    const so = screen.orientation || screen.mozOrientation || screen.msOrientation;
    if(so && so.lock) return{lock:t=>so.lock(t).catch(()=>{}), unlock:()=>{try{so.unlock()}catch(e){}}};
    if(screen.lockOrientation)    return{lock:t=>screen.lockOrientation(t),    unlock:()=>screen.unlockOrientation()};
    if(screen.mozLockOrientation) return{lock:t=>screen.mozLockOrientation(t), unlock:()=>screen.mozUnlockOrientation()};
    if(screen.msLockOrientation)  return{lock:t=>screen.msLockOrientation(t),  unlock:()=>screen.msUnlockOrientation()};
    return null;
  })();

  // ─── State helpers ───────────────────────────────────────────
  function isFS(){ return !!(fsAPI && document[fsAPI.el]); }
  function isPortrait(){ return window.innerHeight > window.innerWidth; }

  function enterFS(){
    if(!fsAPI) return;
    try{ document.documentElement[fsAPI.enter]({navigationUI:'hide'}); }catch(e){}
  }
  function exitFS(){
    if(!fsAPI) return;
    try{ document[fsAPI.exit](); }catch(e){}
  }
  function lockLandscape(){
    if(oriAPI) oriAPI.lock('landscape');
  }
  function unlockOrientation(){
    if(oriAPI) oriAPI.unlock();
  }

  // ─── UI updates ──────────────────────────────────────────────
  function updateBtn(){
    const path = document.getElementById('fs-path');
    const btn  = document.getElementById('fsb');
    if(!path || !btn) return;
    path.setAttribute('d', isFS() ? EXIT_D : ENTER_D);
    btn.title = isFS() ? 'Exit Fullscreen (F)' : 'Fullscreen (F)';
    btn.setAttribute('aria-label', btn.title);
  }

  let pwDismissed = false;
  function updatePortraitWarn(){
    const warn = document.getElementById('portrait-warn');
    if(!warn) return;
    // Show if: portrait orientation AND (in fullscreen OR on a mobile-width device)
    const mobile = window.innerWidth < 900 || ('ontouchstart' in window);
    const show   = isPortrait() && mobile && !pwDismissed;
    warn.classList.toggle('on', show);
  }

  // ─── Fullscreen change handler ───────────────────────────────
  function onFsChange(){
    updateBtn();
    if(!isFS()) unlockOrientation();
    updatePortraitWarn();
    // Delay resize so browser has finished painting
    setTimeout(()=>{ if(window.__g) window.__g._resize(); }, 100);
  }

  // ─── Event wiring (after DOM ready) ─────────────────────────
  document.addEventListener('DOMContentLoaded', ()=>{
    // Fullscreen change events (all browsers)
    const evts = ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'];
    evts.forEach(e=>document.addEventListener(e, onFsChange));

    // Resize / orientation
    window.addEventListener('resize', ()=>{ updatePortraitWarn(); });
    window.addEventListener('orientationchange', ()=>{
      updatePortraitWarn();
      setTimeout(()=>{ if(window.__g) window.__g._resize(); }, 140);
    });

    // Button click
    const btn = document.getElementById('fsb');
    if(btn){
      btn.addEventListener('click', ()=>{
        if(isFS()){
          exitFS();
        } else {
          // On devices without fullscreen API (iOS Safari <16.4),
          // still lock orientation and show the rotate hint if portrait
          enterFS();
          lockLandscape();
        }
        updatePortraitWarn();
      });
    }

    // "Continue anyway" dismiss
    const ok = document.getElementById('pw-ok');
    if(ok){
      ok.addEventListener('click', e=>{
        e.stopPropagation();
        pwDismissed = true;
        const warn = document.getElementById('portrait-warn');
        if(warn) warn.classList.remove('on');
      });
    }

    // Keyboard shortcut: F
    window.addEventListener('keydown', e=>{
      if((e.key==='f'||e.key==='F') && !e.ctrlKey && !e.metaKey && !e.altKey){
        const tag = document.activeElement && document.activeElement.tagName;
        if(tag!=='INPUT' && tag!=='TEXTAREA'){
          if(isFS()) exitFS();
          else { enterFS(); lockLandscape(); }
        }
      }
    });

    // Init
    updateBtn();
    updatePortraitWarn();
    // Reset dismiss flag on orientation to landscape
    if(screen.orientation){
      screen.orientation.addEventListener('change', ()=>{
        if(!isPortrait()) pwDismissed = false;
        updatePortraitWarn();
      });
    }
  });
})();

document.addEventListener('DOMContentLoaded',()=>window.__g=new Game());
</script>
