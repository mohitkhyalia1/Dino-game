<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>DinoRun 🦕</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0a20}
body{font-family:'Nunito',sans-serif}

#wrap{
  position:relative;width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}

/* ── Canvas ── */
#gc{position:absolute;image-rendering:pixelated}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:none;justify-content:flex-end;align-items:center;
  gap:10px;padding:12px 18px;z-index:20;pointer-events:none;
}
#hud>*{pointer-events:all}
.hb{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;padding:4px 14px;
  backdrop-filter:blur(10px);
}
.hl{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-bottom:1px}
.hv{font-size:20px;font-weight:900;letter-spacing:2px;color:#fff;font-family:'Bangers',cursive}
#mb{
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;padding:7px 10px;font-size:15px;cursor:pointer;
  backdrop-filter:blur(10px);color:#fff;transition:transform .1s;
}
#mb:hover{transform:scale(1.1)}

/* ── Score pulse ── */
#sv.sp{animation:spulse .3s ease-out}
@keyframes spulse{0%{transform:scale(1.4);color:#ffd740}100%{transform:scale(1);color:#fff}}

/* ── Speed flash ── */
#sf{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);
  font-family:'Bangers',cursive;font-size:26px;letter-spacing:4px;
  color:#ffd740;pointer-events:none;opacity:0;z-index:25;white-space:nowrap;
  text-shadow:0 0 20px rgba(255,215,64,0.8);
}
#sf.fa{animation:flash 1.4s ease-out forwards}
@keyframes flash{
  0%{opacity:1;transform:translateX(-50%) scale(1.4)}
  50%{opacity:1;transform:translateX(-50%) translateY(-6px) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-22px) scale(0.8)}
}

/* ── Overlays ── */
.ov{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:30;opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.ov.on{opacity:1;pointer-events:all}

.oc{
  background:linear-gradient(145deg,rgba(15,8,35,0.95),rgba(30,15,60,0.95));
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;padding:40px 50px;text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);min-width:340px;
  position:relative;overflow:hidden;
}
.oc::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(100,200,255,0.08) 0%,transparent 70%);
  pointer-events:none;
}

.logo{font-size:58px;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5))}
.gt{
  font-family:'Bangers',cursive;font-size:52px;letter-spacing:6px;
  background:linear-gradient(135deg,#a8ff78,#78ffd6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;text-shadow:none;
}
.gs{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:22px}

.ikb{display:flex;flex-direction:column;gap:6px;margin-bottom:26px}
.ikr{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:13px;color:rgba(255,255,255,0.65);
}
kbd{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;padding:3px 9px;font-family:'Nunito',sans-serif;
  font-size:12px;color:#fff;box-shadow:0 2px 0 rgba(0,0,0,0.4);
}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#a8ff78,#56d988);
  color:#0d2010;border:none;border-radius:14px;
  padding:14px 32px;font-size:15px;font-weight:900;
  letter-spacing:2px;font-family:'Nunito',sans-serif;
  cursor:pointer;
  box-shadow:0 6px 24px rgba(100,220,100,0.4),0 2px 0 rgba(0,0,0,0.3);
  transition:transform .12s,box-shadow .12s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(100,220,100,0.5),0 2px 0 rgba(0,0,0,0.3)}
.btn:active{transform:translateY(1px)}
.btn svg{width:18px;height:18px}

.goico{font-size:50px;margin-bottom:8px}
.got{font-family:'Bangers',cursive;font-size:34px;letter-spacing:5px;color:#ff6060;margin-bottom:18px}

.sb{
  background:rgba(0,0,0,0.3);border-radius:12px;
  padding:14px 20px;margin-bottom:22px;
  border:1px solid rgba(255,255,255,0.06);
}
.sr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.sr:last-child{border:none}
.sr.hi .sl,.sr.hi .sv{color:#ffd740;font-weight:900}
.sl{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.4)}
.sv2{font-size:18px;font-weight:900;letter-spacing:2px;color:#fff;font-family:'Bangers',cursive}

.hisd{font-size:11px;color:rgba(255,255,255,0.3);margin-top:10px;letter-spacing:1px}

/* Day/Night body */
body.night{}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>

  <!-- Start -->
  <div id="ss" class="ov on">
    <div class="oc">
      <div class="logo">🦕</div>
      <h1 class="gt">DinoRun</h1>
      <p class="gs">ENDLESS RUNNER · SKELETAL EDITION</p>
      <div class="ikb">
        <div class="ikr"><kbd>SPACE</kbd><span>/ Tap — Jump</span></div>
        <div class="ikr"><kbd>↑</kbd><span>mid-air — Double Jump</span></div>
        <div class="ikr"><kbd>↓</kbd><span>— Duck under birds</span></div>
      </div>
      <button class="btn" id="startBtn">
        <span>RUN!</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="hisd" id="startHi"></div>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gos" class="ov">
    <div class="oc">
      <div class="goico">💀</div>
      <h2 class="got">GAME OVER</h2>
      <div class="sb">
        <div class="sr"><span class="sl">SCORE</span><span class="sv2" id="finalScore">0</span></div>
        <div class="sr hi" id="newBest" style="display:none"><span class="sl">🏆 NEW BEST!</span><span class="sv2" id="bestDisp">0</span></div>
        <div class="sr" id="prevBest"><span class="sl">BEST</span><span class="sv2" id="hiDisp">0</span></div>
      </div>
      <button class="btn" id="restartBtn">
        <span>TRY AGAIN</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.69"/></svg>
      </button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hb"><span class="hl">Score</span><span class="hv" id="sv">00000</span></div>
    <div class="hb"><span class="hl">Best</span><span class="hv" id="bv">00000</span></div>
    <button id="mb">🔊</button>
  </div>
  <div id="sf"></div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const W=900,H=400,GY=320,GH=80;
const DINO_X=85,DINO_W=58,DINO_H=72,DUCK_W=84,DUCK_H=38;
const GRAV=2000,JVEL=-740;
const SPD0=340,SPDMAX=1150,SPDINC=11;
const MILESTONE=100,BIRD_MIN=500,DNI=700;
const MINGAP=660,MAXGAP=1350,MAXDT=0.05;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const sin2pi=(t,f=1,a=1,o=0)=>Math.sin((t*f+o)*Math.PI*2)*a;

// ═══════════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════════
class Audio2 {
  constructor(){this.ctx=null;this.muted=false;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  resume(){if(this.ctx?.state==='suspended')this.ctx.resume()}
  _t(f,type,dur,g=0.15,d=0){
    if(this.muted||!this.ctx)return;
    try{
      const o=this.ctx.createOscillator(),gn=this.ctx.createGain();
      o.connect(gn);gn.connect(this.ctx.destination);
      o.type=type;o.frequency.value=f;o.detune.value=d;
      const n=this.ctx.currentTime;
      gn.gain.setValueAtTime(g,n);gn.gain.exponentialRampToValueAtTime(0.001,n+dur);
      o.start(n);o.stop(n+dur);
    }catch(e){}
  }
  jump(){this._t(220,'square',.12,.12);this._t(330,'square',.08,.08)}
  dblJump(){this._t(330,'square',.10,.10);this._t(440,'square',.07,.07)}
  duck(){this._t(110,'triangle',.09,.10)}
  milestone(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this._t(f,'square',.12,.14),i*55))}
  gameOver(){[440,330,220,165].forEach((f,i)=>setTimeout(()=>this._t(f,'sawtooth',.14,.16),i*70));setTimeout(()=>this._t(55,'sawtooth',.35,.20),200)}
  dayNight(){[523,659,784].forEach((f,i)=>setTimeout(()=>this._t(f,'sine',.5,.07),i*80))}
  toggleMute(){this.muted=!this.muted;return this.muted}
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
class Input {
  constructor(){
    this.onJump=this.onDuck=this.onDuckEnd=this.onStart=this.onRestart=null;
    const k={};
    window.addEventListener('keydown',e=>{
      if(k[e.code])return;k[e.code]=true;
      if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();this.onJump?.();this.onStart?.()}
      if(e.code==='ArrowDown'){e.preventDefault();this.onDuck?.()}
      if(e.code==='KeyR')this.onRestart?.();
    });
    window.addEventListener('keyup',e=>{k[e.code]=false;if(e.code==='ArrowDown')this.onDuckEnd?.()});
    let sy=0;
    window.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;this.onJump?.();this.onStart?.()},{passive:true});
    window.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-sy>40){this.onDuck?.();setTimeout(()=>this.onDuckEnd?.(),500)}},{passive:true});
  }
}

// ═══════════════════════════════════════════════════════════════
//  BACKGROUND PAINTER  — rich layered parallax scenery
// ═══════════════════════════════════════════════════════════════
class Background {
  constructor(ctx){
    this.ctx=ctx; this.isNight=false;
    this.scroll=[0,0,0,0,0]; // per-layer scroll offsets
    // Generate static mountain shapes
    this.mtnsFar  = this._genMtns(8,  60, 90,  W*2);
    this.mtnsMid  = this._genMtns(12, 30, 55,  W*2);
    this.clouds   = this._genClouds(14);
    this.stars    = Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H*0.75,r:0.6+Math.random()*1.8,tw:2+Math.random()*3,tp:Math.random()*3}));
    this.groundDust = Array.from({length:40},()=>({x:Math.random()*W*3,y:GY+5+Math.random()*18,r:2+Math.random()*5}));
  }
  _genMtns(n,minH,maxH,wrap){
    return Array.from({length:n},(_,i)=>({
      x: (i/n)*wrap + Math.random()*(wrap/n),
      w: 60+Math.random()*80,
      h: minH+Math.random()*(maxH-minH),
      jagged: Array.from({length:6},()=>Math.random()),
    }));
  }
  _genClouds(n){
    return Array.from({length:n},()=>({
      x:Math.random()*W*2, y:20+Math.random()*100,
      w:70+Math.random()*130, h:20+Math.random()*30,
      speed:0.3+Math.random()*0.5,
    }));
  }

  update(dt, speed){
    this.scroll[0]+=speed*0.05*dt;  // very far mountains
    this.scroll[1]+=speed*0.12*dt;  // far mountains
    this.scroll[2]+=speed*0.22*dt;  // clouds
    this.scroll[3]+=speed*0.55*dt;  // mid ground plants
    this.scroll[4]+=speed*1.0*dt;   // near ground
  }

  draw(t){
    const ctx=this.ctx, night=this.isNight;

    // ── Sky gradient ──
    const skyTop    = night ? '#060412' : '#87ceeb';
    const skyHorizon= night ? '#1a1040' : '#ffd9a0';
    const skySunset = night ? '#0a0820' : '#ff9060';
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,skyTop);
    sg.addColorStop(0.6,skyHorizon);
    sg.addColorStop(1,skySunset);
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);

    // ── Sun or Moon ──
    if(!night){
      // Sun with glow
      const sx=W*0.82, sy=60;
      const sunGlow=ctx.createRadialGradient(sx,sy,0,sx,sy,90);
      sunGlow.addColorStop(0,'rgba(255,240,150,0.35)');
      sunGlow.addColorStop(1,'transparent');
      ctx.fillStyle=sunGlow; ctx.beginPath(); ctx.arc(sx,sy,90,0,Math.PI*2); ctx.fill();
      const sunG=ctx.createRadialGradient(sx-6,sy-6,0,sx,sy,28);
      sunG.addColorStop(0,'#fff9e0'); sunG.addColorStop(0.4,'#ffe870'); sunG.addColorStop(1,'#ffb020');
      ctx.fillStyle=sunG; ctx.beginPath(); ctx.arc(sx,sy,28,0,Math.PI*2); ctx.fill();
    } else {
      // Moon
      const mx=W*0.82, my=55;
      const moonG=ctx.createRadialGradient(mx-4,my-4,0,mx,my,22);
      moonG.addColorStop(0,'#f0f4ff'); moonG.addColorStop(0.5,'#c8d8ff'); moonG.addColorStop(1,'#8090c0');
      ctx.fillStyle=moonG; ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2); ctx.fill();
      // Crater
      ctx.fillStyle='rgba(100,120,180,0.25)';
      [[mx-6,my+4,5],[mx+7,my-6,3],[mx+2,my+9,3.5]].forEach(([cx,cy,cr])=>{
        ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
      });
      // Stars
      for(const s of this.stars){
        const blink=0.5+0.5*Math.sin((t/s.tw+s.tp)*Math.PI*2);
        ctx.globalAlpha=0.3+blink*0.7;
        ctx.fillStyle='#ffffff';
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
    }

    // ── Horizon haze ──
    const hazeG=ctx.createLinearGradient(0,GY-50,0,GY);
    hazeG.addColorStop(0,'transparent');
    hazeG.addColorStop(1, night?'rgba(20,10,40,0.6)':'rgba(255,200,120,0.4)');
    ctx.fillStyle=hazeG; ctx.fillRect(0,GY-50,W,50);

    // ── Far mountains ──
    this._drawMtns(this.mtnsFar, this.scroll[0], W*2,
      night?'#1a1440':'#9bb8d4', night?'#120e30':'#7a98b8', 0.7);

    // ── Clouds ──
    for(const c of this.clouds){
      const cx=((c.x - this.scroll[2]*c.speed)%(W*2)+W*2)%(W*2)-100;
      if(cx>W+120||cx<-120) continue;
      this._drawCloud(cx, c.y, c.w, c.h, night);
    }

    // ── Mid mountains ──
    this._drawMtns(this.mtnsMid, this.scroll[1], W*2,
      night?'#2a1e58':'#b8cfde', night?'#1e1440':'#90b0c8', 0.9);

    // ── Distant trees/cacti silhouettes ──
    this._drawDistantVeg(this.scroll[3], night);

    // ── Ground ──
    this._drawGround(night);

    // ── Ground dust spots ──
    ctx.fillStyle=night?'rgba(80,60,140,0.18)':'rgba(0,0,0,0.06)';
    for(const d of this.groundDust){
      const dx=((d.x-this.scroll[4])%(W*3)+W*3)%(W*3)-50;
      if(dx<-10||dx>W+10) continue;
      ctx.beginPath(); ctx.ellipse(dx,d.y,d.r*2,d.r*0.6,0,0,Math.PI*2); ctx.fill();
    }
  }

  _drawMtns(mtns, scroll, wrap, fillCol, shadowCol, alpha){
    const ctx=this.ctx;
    ctx.globalAlpha=alpha;
    for(const m of mtns){
      const mx=((m.x-scroll)%wrap+wrap)%wrap-60;
      if(mx>W+80||mx<-80) continue;
      const px=[mx-m.w/2, mx, mx+m.w/2];
      const py=[GY, GY-m.h, GY];
      // Add jagged peak offsets
      ctx.fillStyle=fillCol;
      ctx.beginPath();
      ctx.moveTo(px[0],py[0]);
      // Left slope with subtle ridges
      for(let i=0;i<3;i++){
        const rx=lerp(px[0],px[1],(i+1)/4);
        const ry=lerp(py[0],py[1],(i+1)/4)-m.jagged[i]*8;
        ctx.lineTo(rx,ry);
      }
      ctx.lineTo(px[1],py[1]);
      for(let i=0;i<3;i++){
        const rx=lerp(px[1],px[2],(i+1)/4);
        const ry=lerp(py[1],py[2],(i+1)/4)-m.jagged[i+3]*6;
        ctx.lineTo(rx,ry);
      }
      ctx.lineTo(px[2],py[2]);
      ctx.closePath(); ctx.fill();
      // Shadow side
      ctx.fillStyle=shadowCol;
      ctx.beginPath();
      ctx.moveTo(px[1],py[1]);
      for(let i=0;i<3;i++){
        const rx=lerp(px[1],px[2],(i+1)/4);
        const ry=lerp(py[1],py[2],(i+1)/4)-m.jagged[i+3]*6;
        ctx.lineTo(rx,ry);
      }
      ctx.lineTo(px[2],py[2]);
      ctx.lineTo(px[1]+m.w*0.1, GY);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  _drawCloud(x, y, w, h, night){
    const ctx=this.ctx;
    const alpha=night?0.12:0.88;
    const col=night?'rgba(140,160,220,':'rgba(255,255,255,';
    ctx.globalAlpha=alpha;
    // Multi-puff cloud
    const puffs=[[x,y+h*0.2,w*0.3,h*0.7],[x+w*0.22,y,w*0.36,h],[x+w*0.55,y+h*0.1,w*0.3,h*0.8],[x+w*0.76,y+h*0.3,w*0.25,h*0.6]];
    // Shadow
    ctx.fillStyle=night?'rgba(80,90,160,0.4)':'rgba(180,180,200,0.5)';
    puffs.forEach(([px,py,pw,ph])=>{ctx.beginPath();ctx.ellipse(px+pw/2,py+ph/2+4,pw/2,ph/2*0.6,0,0,Math.PI*2);ctx.fill()});
    // White puffs
    puffs.forEach(([px,py,pw,ph])=>{
      const g=ctx.createRadialGradient(px+pw/2,py+ph/2-2,0,px+pw/2,py+ph/2,Math.max(pw,ph)/2);
      g.addColorStop(0,night?'rgba(200,210,255,0.9)':'rgba(255,255,255,0.98)');
      g.addColorStop(1,night?'rgba(100,120,200,0.3)':'rgba(230,235,255,0.6)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.ellipse(px+pw/2,py+ph/2,pw/2,ph/2,0,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  _drawDistantVeg(scroll, night){
    const ctx=this.ctx;
    const col=night?'rgba(30,20,60,0.7)':'rgba(50,100,50,0.4)';
    ctx.fillStyle=col;
    // Simple cactus/tree silhouettes at horizon
    for(let i=0;i<20;i++){
      const bx=((i*145+80 - scroll*0.3)%(W*1.5)+W*1.5)%(W*1.5)-30;
      if(bx<-20||bx>W+20) continue;
      const bh=18+((i*7)%22);
      ctx.fillRect(bx-3,GY-bh,6,bh);
      ctx.fillRect(bx-12,GY-bh*0.6,24,6);
      // Cactus arms
      ctx.fillRect(bx-14,GY-bh*0.6-8,4,10);
      ctx.fillRect(bx+10,GY-bh*0.65-6,4,9);
    }
  }

  _drawGround(night){
    const ctx=this.ctx;
    // Base ground
    const gTop   = night?'#1e2838':'#c8a870';
    const gMid   = night?'#171f2e':'#b89860';
    const gFar   = night?'#111820':'#d0b880';
    const gLine  = night?'#2a3a50':'#907040';

    // Ground fill - multi-layer
    const gg=ctx.createLinearGradient(0,GY,0,H);
    gg.addColorStop(0,gTop);
    gg.addColorStop(0.3,gMid);
    gg.addColorStop(1,gFar);
    ctx.fillStyle=gg; ctx.fillRect(0,GY,W,H-GY);

    // Top edge line
    ctx.strokeStyle=gLine; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();

    // Subtle horizontal texture lines
    ctx.globalAlpha=0.25;
    [GY+8,GY+18,GY+32].forEach(ly=>{
      ctx.strokeStyle=gLine; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,ly); ctx.lineTo(W,ly); ctx.stroke();
    });
    ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════════════════════════
//  GROUND DETAILS  (scrolling surface)
// ═══════════════════════════════════════════════════════════════
class GroundDetails {
  constructor(ctx){
    this.ctx=ctx; this.scrollX=0;
    this.details=Array.from({length:100},()=>({
      x:Math.random()*W*3, type:Math.floor(Math.random()*4),
      s:0.8+Math.random()*3, h:1+Math.random()*2,
    }));
    this.rocks=Array.from({length:30},()=>({x:Math.random()*W*3,w:4+Math.random()*12,h:3+Math.random()*6}));
  }
  update(dt,speed){this.scrollX=(this.scrollX+speed*dt)%(W*3)}
  draw(isNight){
    const ctx=this.ctx;
    const col=isNight?'#2a3a50':'#907040';
    ctx.fillStyle=col; ctx.strokeStyle=col;

    for(const d of this.details){
      const wrap=W*3;
      const dx=((d.x-this.scrollX)%wrap+wrap)%wrap-40;
      if(dx<-20||dx>W+20) continue;
      const dy=GY+5;
      ctx.globalAlpha=0.6;
      switch(d.type){
        case 0: // pebble
          ctx.beginPath();ctx.ellipse(dx,dy+d.s,d.s*1.5,d.s*0.7,0,0,Math.PI*2);ctx.fill();
          ctx.fillStyle=isNight?'#3a4a60':'#a08050'; ctx.globalAlpha=0.3;
          ctx.beginPath();ctx.ellipse(dx-1,dy+d.s-1,d.s*0.7,d.s*0.4,0,0,Math.PI*2);ctx.fill();
          ctx.fillStyle=col; break;
        case 1: // crack
          ctx.lineWidth=0.8;
          ctx.beginPath();ctx.moveTo(dx,dy);ctx.lineTo(dx+d.s*3.5,dy+d.h*2.5);ctx.lineTo(dx+d.s*5.5,dy+d.h);ctx.stroke();
          break;
        case 2: // grass tufts
          ctx.lineWidth=1.3;
          for(let i=0;i<4;i++){
            ctx.beginPath();ctx.moveTo(dx+i*4,dy+2);
            ctx.bezierCurveTo(dx+i*4-3,dy-3,dx+i*4-1,dy-7,dx+i*4+1,dy-8);
            ctx.stroke();
          }
          break;
        case 3: // tire tracks
          ctx.lineWidth=1;ctx.globalAlpha=0.3;
          ctx.beginPath();ctx.moveTo(dx,dy+2);ctx.lineTo(dx+d.s*8,dy+2);ctx.stroke();
          break;
      }
      ctx.globalAlpha=1;
    }

    // Rocks with lighting
    for(const r of this.rocks){
      const wrap=W*3;
      const rx=((r.x-this.scrollX*0.8)%wrap+wrap)%wrap-40;
      if(rx<-20||rx>W+20) continue;
      const ry=GY+3;
      const rg=this.ctx.createRadialGradient(rx+r.w*0.3,ry,0,rx+r.w/2,ry+r.h/2,Math.max(r.w,r.h));
      rg.addColorStop(0,isNight?'#3a4a60':'#b0907a');
      rg.addColorStop(1,isNight?'#1a2535':'#806050');
      ctx.fillStyle=rg;
      ctx.beginPath();
      ctx.ellipse(rx+r.w/2,ry+r.h/2,r.w/2,r.h/2,0,0,Math.PI*2); ctx.fill();
      // Rock highlight
      ctx.fillStyle=isNight?'rgba(100,140,200,0.2)':'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(rx+r.w*0.3,ry+r.h*0.25,r.w*0.25,r.h*0.2,0,0,Math.PI*2); ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════
class Particles {
  constructor(ctx){this.ctx=ctx;this.p=[]}

  spawnFootDust(x,y,col){
    for(let i=0;i<5;i++) this.p.push({
      x,y,vx:(Math.random()-0.7)*65,vy:-(Math.random()*50+10),
      life:1,size:2.5+Math.random()*4,col,type:'dust',rot:Math.random()*Math.PI*2
    });
  }
  spawnLandDust(x,y,col){
    for(let i=0;i<14;i++){
      const a=Math.PI+(Math.random()-0.5)*Math.PI;
      const sp=45+Math.random()*120;
      this.p.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp*0.5-20,life:1,size:3+Math.random()*6,col,type:'dust',rot:Math.random()*Math.PI*2});
    }
  }
  spawnSpeedLine(x,y,col){
    this.p.push({x,y,vx:-560-Math.random()*260,vy:(Math.random()-0.5)*8,life:1,size:0.8+Math.random()*1.5,col,type:'speed',len:25+Math.random()*50});
  }
  spawnExplosion(x,y,night){
    for(let i=0;i<32;i++){
      const a=(Math.PI*2*i/32)+Math.random()*0.4;
      const sp=70+Math.random()*260;
      const cols=night?['#40a8f8','#80d4ff','#b0e8ff']:['#ff7030','#ffb040','#fff060','#ff4020'];
      this.p.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,size:2.5+Math.random()*8,col:cols[Math.floor(Math.random()*cols.length)],type:'explode'});
    }
    // Big flash
    this.p.push({x,y,vx:0,vy:0,life:1,size:60,col:night?'rgba(100,200,255,0.5)':'rgba(255,180,50,0.5)',type:'flash'});
  }
  spawnJumpRing(x,y,night){
    this.p.push({x,y,vx:0,vy:0,life:1,size:0,col:night?'rgba(100,200,255,0.6)':'rgba(150,255,150,0.6)',type:'ring'});
  }

  update(dt){
    for(const p of this.p){
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      if(p.type==='dust'||p.type==='explode') p.vy+=460*dt;
      p.life-=dt*(p.type==='speed'?3.2:p.type==='flash'?4:p.type==='ring'?2.5:1.8);
      if(p.type==='ring') p.size=lerp(p.size,50,1-Math.pow(0.001,dt));
    }
    this.p=this.p.filter(p=>p.life>0);
  }

  draw(){
    const ctx=this.ctx;
    for(const p of this.p){
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.life*(p.type==='speed'?0.55:p.type==='ring'?1:0.85));
      switch(p.type){
        case 'dust':
          ctx.translate(p.x,p.y); ctx.rotate(p.rot+(1-p.life)*2);
          ctx.fillStyle=p.col;
          ctx.beginPath();ctx.ellipse(0,0,p.size*p.life+0.5,p.size*p.life*0.55,0,0,Math.PI*2);ctx.fill();
          break;
        case 'speed':
          ctx.strokeStyle=p.col; ctx.lineWidth=p.size;
          ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.len*p.life,p.y);ctx.stroke();
          break;
        case 'explode':
          const eg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*p.life);
          eg.addColorStop(0,p.col); eg.addColorStop(1,'transparent');
          ctx.fillStyle=eg;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
          break;
        case 'flash':
          ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
          break;
        case 'ring':
          ctx.strokeStyle=p.col; ctx.lineWidth=3*(1-p.size/50+0.1);
          ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.stroke();
          break;
      }
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  DINO  — Fully articulated skeleton, richly painted
// ═══════════════════════════════════════════════════════════════
class Dino {
  constructor(ctx){
    this.ctx=ctx; this.isNight=false;
    this.x=DINO_X; this.y=GY-DINO_H;
    this.vy=0; this.onGround=true; this.isDuck=false; this.jumps=0;
    this.cycle=0;         // run cycle 0..1
    this.sqY=1; this.stX=1; // squash/stretch
    this.bob=0;
    this.blinkT=0; this.eyeOpen=true;
    this.prevLF=false; this.prevRF=false; this.LF=false; this.RF=false;
    this.trail=[];
  }
  get W(){return this.isDuck?DUCK_W:DINO_W}
  get H(){return this.isDuck?DUCK_H:DINO_H}
  get hitbox(){const p=9;return{x:this.x+p,y:this.y+p,w:this.W-p*2,h:this.H-p*2}}

  jump(audio){
    if(this.isDuck){this.isDuck=false;return}
    if(this.onGround){this.vy=JVEL;this.onGround=false;this.jumps=1;this.sqY=0.62;this.stX=1.42;audio.jump()}
    else if(this.jumps===1){this.vy=JVEL*0.78;this.jumps=2;this.sqY=0.72;this.stX=1.3;audio.dblJump()}
  }
  duck(on,audio){if(on&&!this.isDuck)audio.duck();this.isDuck=on;if(on&&!this.onGround)this.vy+=400}

  update(dt,speed){
    const wasOn=this.onGround;
    if(!this.onGround){this.vy+=GRAV*dt;this.y+=this.vy*dt}
    const floor=GY-this.H;
    if(this.y>=floor){
      if(!wasOn){this.sqY=1.38;this.stX=0.68}
      this.y=floor;this.vy=0;this.onGround=true;this.jumps=0;
    }
    this.sqY=lerp(this.sqY,1,1-Math.pow(0.00008,dt));
    this.stX=lerp(this.stX,1,1-Math.pow(0.00008,dt));

    const cps=this.isDuck?12:clamp(speed/70,3.5,16);
    if(this.onGround) this.cycle=(this.cycle+cps*dt)%1;
    else this.cycle=lerp(this.cycle,0.25,dt*5);

    this.bob=this.onGround?Math.abs(Math.sin(this.cycle*Math.PI*2))*3.5:0;
    this.blinkT+=dt;
    if(this.blinkT>3.8){this.eyeOpen=false;if(this.blinkT>3.96){this.eyeOpen=true;this.blinkT=0}}

    this.prevLF=this.LF; this.prevRF=this.RF;
    const p=this.cycle;
    this.LF=this.onGround&&p>0.5&&p<1.0;
    this.RF=this.onGround&&p<0.5;

    if(speed>680){
      this.trail.push({x:this.x,y:this.y,a:0.28});
      if(this.trail.length>7)this.trail.shift();
      this.trail.forEach(f=>f.a*=0.82);
    } else this.trail=[];
  }

  draw(){
    const ctx=this.ctx, night=this.isNight;
    // Palette
    const C={
      body   : night?'#4aacde':'#3a7a48',
      bodyL  : night?'#7ccff2':'#5da868',
      bodyD  : night?'#236088':'#235230',
      belly  : night?'#90daf8':'#8ec860',
      scale  : night?'#3898c8':'#2e6838',
      claw   : night?'#1a4870':'#1a3020',
      eye    : night?'#0a2840':'#0a1810',
      iris   : night?'#1a90ff':'#206030',
    };

    // Shadow ellipse
    const sw=this.W*(this.onGround?0.65:0.38);
    const sg=ctx.createRadialGradient(this.x+this.W/2,GY+4,0,this.x+this.W/2,GY+4,sw);
    sg.addColorStop(0,night?'rgba(20,100,200,0.25)':'rgba(0,0,0,0.18)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(this.x+this.W/2,GY+4,sw,6*(this.onGround?1:0.4),0,0,Math.PI*2);ctx.fill();

    // Trail
    for(const f of this.trail){
      ctx.save();ctx.globalAlpha=f.a;
      ctx.fillStyle=C.body;
      this._roundRect(f.x+10,f.y+16,38,38,10);ctx.fill();
      ctx.restore();
    }

    ctx.save();
    if(this.isDuck) this._drawDuck(C);
    else            this._drawRun(C);
    ctx.restore();
  }

  _roundRect(x,y,w,h,r){
    const ctx=this.ctx; r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  }

  _drawRun(C){
    const ctx=this.ctx, x=this.x, t=this.cycle;
    const hipX=x+30, hipY=this.y+DINO_H-28+this.bob;

    // Apply squash/stretch around hip
    ctx.translate(hipX,hipY);
    ctx.scale(this.stX, this.sqY);
    ctx.translate(-hipX,-hipY);

    // Tail
    this._drawTail(x, hipY-6, Math.sin(t*Math.PI*2)*11, C);
    // Body
    this._drawBody(x, this.y, C);
    // Arm (opposite phase)
    this._drawArm(x+40, hipY-22, Math.sin(((t+0.5)%1)*Math.PI*2)*20, C);
    // Head
    this._drawHead(x, this.y, Math.sin(t*Math.PI*4)*2, C);

    ctx.restore(); // undo squash before drawing legs
    ctx.save();
    // Back leg first
    this._drawLeg(x, hipY, (t+0.5)%1, C, true);
    // Front leg
    this._drawLeg(x, hipY, t, C, false);
    ctx.restore();

    // Re-save for after
    ctx.save();
  }

  _drawTail(x,y,swing,C){
    const ctx=this.ctx;
    ctx.save(); ctx.translate(x+2,y); ctx.rotate(swing*Math.PI/180);
    // Tail body - gradient
    const tg=ctx.createLinearGradient(0,0,-28,10);
    tg.addColorStop(0,C.body); tg.addColorStop(1,C.bodyD);
    ctx.fillStyle=tg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-5,7,-16,16,-27,10);
    ctx.bezierCurveTo(-20,4,-6,-3,0,0);
    ctx.closePath(); ctx.fill();
    // Tail highlight
    ctx.fillStyle=C.bodyL; ctx.globalAlpha=0.35;
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-4,5,-12,10,-20,8);ctx.bezierCurveTo(-15,4,-5,-1,0,0);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }

  _drawBody(x,y,C){
    const ctx=this.ctx;
    // Body gradient fill
    const bg=ctx.createLinearGradient(x+8,y+14,x+48,y+54);
    bg.addColorStop(0,C.bodyL); bg.addColorStop(0.5,C.body); bg.addColorStop(1,C.bodyD);
    ctx.fillStyle=bg;
    this._roundRect(x+8,y+16,40,38,11); ctx.fill();

    // Belly highlight
    const bellyG=ctx.createRadialGradient(x+26,y+34,2,x+26,y+34,16);
    bellyG.addColorStop(0,C.belly); bellyG.addColorStop(1,'transparent');
    ctx.fillStyle=bellyG;
    this._roundRect(x+14,y+24,24,22,8); ctx.fill();

    // Dorsal spine ridge
    for(let i=0;i<5;i++){
      const sx=x+14+i*6.5, sy=y+16;
      const sg=ctx.createRadialGradient(sx,sy-3,0,sx,sy,5);
      sg.addColorStop(0,C.bodyL); sg.addColorStop(1,C.bodyD);
      ctx.fillStyle=sg;
      ctx.beginPath();ctx.ellipse(sx,sy,2.8,5.5,-0.2,0,Math.PI*2);ctx.fill();
    }

    // Scale texture - hexagonal-ish
    ctx.fillStyle=C.scale;
    for(let row=0;row<3;row++) for(let col=0;col<3;col++){
      ctx.beginPath();
      ctx.ellipse(x+14+col*9+(row%2)*4,y+27+row*8,3.5,2.5,0.15,0,Math.PI*2);
      ctx.fill();
    }
    // Scale shine
    ctx.fillStyle=C.bodyL; ctx.globalAlpha=0.25;
    for(let row=0;row<3;row++) for(let col=0;col<3;col++){
      ctx.beginPath();
      ctx.ellipse(x+13+col*9+(row%2)*4,y+26+row*8,1.5,1,0.15,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  _drawHead(x,y,nodDeg,C){
    const ctx=this.ctx;
    ctx.save();
    const npx=x+38, npy=y+22;
    ctx.translate(npx,npy); ctx.rotate(nodDeg*Math.PI/180); ctx.translate(-npx,-npy);

    // Neck
    ctx.fillStyle=C.body;
    ctx.beginPath();
    ctx.moveTo(x+28,y+32);ctx.lineTo(x+40,y+32);
    ctx.lineTo(x+46,y+14);ctx.lineTo(x+34,y+14);
    ctx.closePath(); ctx.fill();
    // Neck shading
    const ng=ctx.createLinearGradient(x+28,y+32,x+46,y+14);
    ng.addColorStop(0,C.bodyD); ng.addColorStop(0.5,'transparent');
    ctx.fillStyle=ng;
    ctx.beginPath();ctx.moveTo(x+28,y+32);ctx.lineTo(x+36,y+32);ctx.lineTo(x+40,y+14);ctx.lineTo(x+34,y+14);ctx.closePath();ctx.fill();

    // Head base
    const hg=ctx.createLinearGradient(x+28,y,x+60,y+22);
    hg.addColorStop(0,C.bodyL); hg.addColorStop(0.6,C.body); hg.addColorStop(1,C.bodyD);
    ctx.fillStyle=hg;
    this._roundRect(x+28,y+1,32,22,8); ctx.fill();

    // Snout
    const snG=ctx.createLinearGradient(x+46,y+4,x+64,y+18);
    snG.addColorStop(0,C.body); snG.addColorStop(1,C.bodyD);
    ctx.fillStyle=snG;
    this._roundRect(x+46,y+5,18,14,5); ctx.fill();

    // Head top darker
    ctx.fillStyle=C.bodyD; ctx.globalAlpha=0.45;
    this._roundRect(x+28,y+1,30,8,7); ctx.fill();
    ctx.globalAlpha=1;

    // Snout bottom lighter
    ctx.fillStyle=C.belly; ctx.globalAlpha=0.5;
    this._roundRect(x+46,y+13,18,6,3); ctx.fill();
    ctx.globalAlpha=1;

    // Nostril
    ctx.fillStyle=C.bodyD;
    ctx.beginPath();ctx.ellipse(x+58,y+9,2.2,1.6,0.3,0,Math.PI*2);ctx.fill();

    // Eye socket (outer glow)
    const eyeGlow=ctx.createRadialGradient(x+39,y+10,0,x+39,y+10,10);
    eyeGlow.addColorStop(0,C.eye); eyeGlow.addColorStop(1,'transparent');
    ctx.fillStyle=eyeGlow;
    ctx.beginPath();ctx.arc(x+39,y+10,10,0,Math.PI*2);ctx.fill();

    // Eye socket
    ctx.fillStyle=C.eye;
    ctx.beginPath();ctx.arc(x+39,y+10,7.5,0,Math.PI*2);ctx.fill();

    // Iris
    if(this.eyeOpen){
      const ig=ctx.createRadialGradient(x+38,y+9,0,x+39,y+10,6);
      ig.addColorStop(0,'#88ff80'); ig.addColorStop(0.4,C.iris); ig.addColorStop(1,'#002010');
      ctx.fillStyle=ig;
      ctx.beginPath();ctx.arc(x+39,y+10,5.5,0,Math.PI*2);ctx.fill();
      // Pupil
      ctx.fillStyle='#000a08';
      ctx.beginPath();ctx.arc(x+39.5,y+10,2.8,0,Math.PI*2);ctx.fill();
      // Eye shine primary
      ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.beginPath();ctx.arc(x+41,y+8,1.6,0,Math.PI*2);ctx.fill();
      // Eye shine secondary
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath();ctx.arc(x+38,y+11.5,0.8,0,Math.PI*2);ctx.fill();
    } else {
      // Closed eye lines
      ctx.strokeStyle=C.bodyD; ctx.lineWidth=1.8;
      ctx.beginPath();ctx.moveTo(x+34,y+10);ctx.quadraticCurveTo(x+39,y+14,x+44,y+10);ctx.stroke();
    }

    // Mouth
    ctx.strokeStyle=C.bodyD; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x+46,y+15);ctx.quadraticCurveTo(x+52,y+17,x+62,y+15);ctx.stroke();
    // Tooth
    ctx.fillStyle='rgba(255,255,240,0.8)';
    ctx.beginPath();ctx.moveTo(x+50,y+15);ctx.lineTo(x+48,y+19);ctx.lineTo(x+53,y+15);ctx.closePath();ctx.fill();

    ctx.restore();
  }

  _drawArm(ax,ay,swing,C){
    const ctx=this.ctx;
    ctx.save(); ctx.translate(ax,ay); ctx.rotate(swing*Math.PI/180);
    // Upper arm
    const ag=ctx.createLinearGradient(0,0,0,14);
    ag.addColorStop(0,C.bodyL); ag.addColorStop(1,C.body);
    ctx.fillStyle=ag;
    ctx.beginPath();ctx.ellipse(0,7,4.5,9,0,0,Math.PI*2);ctx.fill();
    // Elbow
    ctx.fillStyle=C.bodyD;
    ctx.beginPath();ctx.arc(0,13,3.5,0,Math.PI*2);ctx.fill();
    // Lower arm
    ctx.translate(0,14);
    ctx.fillStyle=C.bodyL;
    ctx.beginPath();ctx.ellipse(0,6,3.5,8,0,0,Math.PI*2);ctx.fill();
    // Claws
    ctx.fillStyle=C.claw;
    [[0,13,-3,21,4,18],[-4,12,-6,20,0,17]].forEach(([ox,oy,tx,ty,t2x,t2y])=>{
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(tx,ty);ctx.lineTo(t2x,t2y);ctx.closePath();ctx.fill();
    });
    ctx.restore();
  }

  _drawLeg(x,hipY,phase,C,isBack){
    const ctx=this.ctx;
    const hipX=isBack?x+24:x+34;
    const p=phase*Math.PI*2;

    // Thigh: forward/back swing
    const thighA = Math.sin(p)*32;
    // Shin bends most at recovery (back of swing)
    const shinBend= Math.max(0, Math.sin(p+Math.PI*0.62))*42;
    // Foot stays roughly horizontal
    const footA   = -thighA*0.28+shinBend*0.18;
    const tL=24, sL=21, fL=16;

    ctx.save();
    if(isBack){ ctx.globalAlpha=0.65; }

    ctx.translate(hipX,hipY);
    ctx.rotate(thighA*Math.PI/180);

    // Thigh with gradient
    const tg=ctx.createLinearGradient(isBack?-5:-6,0,isBack?5:6,tL);
    tg.addColorStop(0,isBack?C.bodyD:C.bodyL);
    tg.addColorStop(1,isBack?C.bodyD:C.body);
    ctx.fillStyle=tg;
    ctx.beginPath();ctx.ellipse(0,tL/2,isBack?4.5:6,tL/2+1.5,0,0,Math.PI*2);ctx.fill();

    // Knee joint
    const kg=ctx.createRadialGradient(0,tL,0,0,tL,5);
    kg.addColorStop(0,C.bodyL); kg.addColorStop(1,C.bodyD);
    ctx.fillStyle=kg;
    ctx.beginPath();ctx.arc(0,tL,isBack?3.5:4.5,0,Math.PI*2);ctx.fill();

    ctx.translate(0,tL);
    ctx.rotate(shinBend*Math.PI/180);

    // Shin
    const sg=ctx.createLinearGradient(-4,0,4,sL);
    sg.addColorStop(0,isBack?C.bodyD:C.bodyL); sg.addColorStop(1,isBack?C.bodyD:C.body);
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(0,sL/2,isBack?3.5:5,sL/2+1,0,0,Math.PI*2);ctx.fill();

    // Ankle
    ctx.fillStyle=C.bodyD;
    ctx.beginPath();ctx.arc(0,sL,isBack?2.5:3.5,0,Math.PI*2);ctx.fill();

    ctx.translate(0,sL);
    ctx.rotate(footA*Math.PI/180);

    // Foot pad with gradient
    const fg=ctx.createLinearGradient(0,0,fL,6);
    fg.addColorStop(0,C.body); fg.addColorStop(1,C.bodyD);
    ctx.fillStyle=fg;
    ctx.beginPath();ctx.ellipse(fL/2+1,3,fL/2+3,5,0,0,Math.PI*2);ctx.fill();
    // Foot highlight
    ctx.fillStyle=C.bodyL; ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.ellipse(fL*0.3,2,fL*0.3,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=isBack?0.65:1;

    // Three toes with claws
    ctx.fillStyle=C.claw;
    [0,fL*0.44,fL*0.88].forEach(tx=>{
      ctx.beginPath();ctx.moveTo(tx,4);ctx.lineTo(tx-3,12);ctx.lineTo(tx+4,9);ctx.closePath();ctx.fill();
      // Claw highlight
      ctx.fillStyle=C.body; ctx.globalAlpha=0.35;
      ctx.beginPath();ctx.moveTo(tx,4);ctx.lineTo(tx-1,8);ctx.lineTo(tx+1,7);ctx.closePath();ctx.fill();
      ctx.fillStyle=C.claw; ctx.globalAlpha=isBack?0.65:1;
    });

    ctx.restore();
  }

  _drawDuck(C){
    const ctx=this.ctx, x=this.x, y=this.y, t=this.cycle;
    // Body
    const bg=ctx.createLinearGradient(x+4,y+2,x+DUCK_W,y+DUCK_H);
    bg.addColorStop(0,C.bodyL); bg.addColorStop(0.5,C.body); bg.addColorStop(1,C.bodyD);
    ctx.fillStyle=bg; this._roundRect(x+4,y+2,DUCK_W-8,DUCK_H-4,10); ctx.fill();
    // Belly
    const bellyG=ctx.createRadialGradient(x+35,y+DUCK_H/2,2,x+35,y+DUCK_H/2,18);
    bellyG.addColorStop(0,C.belly); bellyG.addColorStop(1,'transparent');
    ctx.fillStyle=bellyG; this._roundRect(x+14,y+6,DUCK_W-32,DUCK_H-12,6); ctx.fill();
    // Scales
    ctx.fillStyle=C.scale;
    for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(x+14+i*10,y+10,3.2,2.2,0.15,0,Math.PI*2);ctx.fill()}
    // Dorsal ridge
    for(let i=0;i<3;i++){ctx.fillStyle=C.bodyD;ctx.beginPath();ctx.ellipse(x+20+i*12,y+2,2.5,4.5,-0.2,0,Math.PI*2);ctx.fill()}

    // Head stretched forward
    const hx=x+DUCK_W-32;
    const hg2=ctx.createLinearGradient(hx,y-4,hx+30,y+16);
    hg2.addColorStop(0,C.bodyL); hg2.addColorStop(1,C.bodyD);
    ctx.fillStyle=hg2; this._roundRect(hx,y-4,28,20,6); ctx.fill();
    this._roundRect(hx+18,y+1,18,12,4); ctx.fill();
    ctx.fillStyle=C.bodyD; ctx.globalAlpha=0.4; this._roundRect(hx,y-4,26,8,6); ctx.fill(); ctx.globalAlpha=1;

    // Nostril
    ctx.fillStyle=C.bodyD;ctx.beginPath();ctx.ellipse(hx+32,y+4,2.2,1.5,0.3,0,Math.PI*2);ctx.fill();
    // Eye
    ctx.fillStyle=C.eye;ctx.beginPath();ctx.arc(hx+10,y+5,7.5,0,Math.PI*2);ctx.fill();
    if(this.eyeOpen){
      const ig=ctx.createRadialGradient(hx+9,y+4,0,hx+10,y+5,6);
      ig.addColorStop(0,'#88ff80');ig.addColorStop(0.4,C.iris);ig.addColorStop(1,'#002010');
      ctx.fillStyle=ig;ctx.beginPath();ctx.arc(hx+10,y+5,5.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000a08';ctx.beginPath();ctx.arc(hx+10.5,y+5,2.8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();ctx.arc(hx+12,y+3,1.6,0,Math.PI*2);ctx.fill();
    }

    // Duck legs
    const dHip=y+DUCK_H-2;
    this._drawLeg(x+14,dHip,(t+0.5)%1,C,true);
    this._drawLeg(x+26,dHip,t,C,false);
  }
}

// ═══════════════════════════════════════════════════════════════
//  CACTUS  — Beautiful detailed rendering
// ═══════════════════════════════════════════════════════════════
class Cactus {
  constructor(x,ctx,variant,isNight){
    this.x=x; this.ctx=ctx; this.dead=false; this.isNight=isNight;
    const s=[{w:30,h:58,t:1},{w:56,h:64,t:2},{w:78,h:70,t:3}][Math.min(variant,2)];
    this.width=s.w; this.height=s.h; this.trunks=s.t;
    this.y=GY-this.height;
  }
  update(dt,speed){this.x-=speed*dt;if(this.x+this.width<-80)this.dead=true}
  get hitbox(){return{x:this.x+5,y:this.y+3,w:this.width-10,h:this.height-3}}

  draw(){
    const ctx=this.ctx, n=this.isNight;
    const main=n?'#2a6090':'#2e7028';
    const light=n?'#50a0d0':'#50a840';
    const dark =n?'#103050':'#1a3e18';
    const tw=15, sp=(this.width-tw*this.trunks)/(this.trunks+1);

    for(let i=0;i<this.trunks;i++){
      const tx=this.x+sp*(i+1)+tw*i;
      const trunkH=this.height-tx*0;

      // Shadow side right
      ctx.fillStyle=dark;
      this._rr(tx+tw*0.5,this.y+10,tw*0.5,this.height-10,3);ctx.fill();
      // Main trunk gradient
      const tg=ctx.createLinearGradient(tx,this.y,tx+tw*0.55,this.y+this.height);
      tg.addColorStop(0,light); tg.addColorStop(0.3,main); tg.addColorStop(1,dark);
      ctx.fillStyle=tg; this._rr(tx,this.y+10,tw*0.62,this.height-10,4); ctx.fill();
      // Light edge highlight strip
      ctx.fillStyle=light; ctx.globalAlpha=0.6;
      ctx.fillRect(tx+2,this.y+15,2.5,this.height-26);
      ctx.globalAlpha=1;

      // Rib lines (cactus texture)
      ctx.strokeStyle=dark; ctx.lineWidth=0.7; ctx.globalAlpha=0.4;
      for(let r=0;r<5;r++){
        ctx.beginPath();ctx.moveTo(tx+2,this.y+18+r*9);ctx.lineTo(tx+tw*0.55-2,this.y+18+r*9);ctx.stroke();
      }
      ctx.globalAlpha=1;

      // Left arm
      if(i===0){
        const ax=tx-13, ay=this.y+this.height*0.36;
        const ag=ctx.createLinearGradient(ax,this.y+8,ax+13,ay);
        ag.addColorStop(0,light); ag.addColorStop(1,dark);
        ctx.fillStyle=ag;
        ctx.fillRect(ax,ay-2,15,10);
        this._rr(ax,this.y+10,11,ay-this.y-2,3); ctx.fill();
        // Arm highlight
        ctx.fillStyle=light; ctx.globalAlpha=0.5;
        ctx.fillRect(ax+1,this.y+12,2,ay-this.y-6); ctx.globalAlpha=1;
        // Tip spike
        ctx.fillStyle=main;
        ctx.beginPath();ctx.moveTo(ax+4,this.y+10);ctx.lineTo(ax-4,this.y+4);ctx.lineTo(ax+10,this.y+4);ctx.closePath();ctx.fill();
        ctx.fillStyle=light; ctx.globalAlpha=0.5;
        ctx.beginPath();ctx.moveTo(ax+5,this.y+10);ctx.lineTo(ax+3,this.y+6);ctx.lineTo(ax+9,this.y+6);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
      }
      // Right arm
      if(i===this.trunks-1){
        const ax=tx+tw-2, ay=this.y+this.height*0.40;
        const ag=ctx.createLinearGradient(ax,this.y+12,ax+14,ay);
        ag.addColorStop(0,light); ag.addColorStop(1,dark);
        ctx.fillStyle=ag;
        ctx.fillRect(ax,ay-2,15,10);
        this._rr(ax,this.y+12,11,ay-this.y-4,3); ctx.fill();
        ctx.fillStyle=light; ctx.globalAlpha=0.5;
        ctx.fillRect(ax+8,this.y+14,2,ay-this.y-8); ctx.globalAlpha=1;
        ctx.fillStyle=main;
        ctx.beginPath();ctx.moveTo(ax+7,this.y+12);ctx.lineTo(ax+14,this.y+6);ctx.lineTo(ax+2,this.y+6);ctx.closePath();ctx.fill();
        ctx.fillStyle=light; ctx.globalAlpha=0.5;
        ctx.beginPath();ctx.moveTo(ax+7,this.y+12);ctx.lineTo(ax+12,this.y+8);ctx.lineTo(ax+4,this.y+8);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
      }

      // Top spike
      const tsg=ctx.createLinearGradient(tx+tw*0.4,this.y,tx+tw*0.6,this.y+14);
      tsg.addColorStop(0,light); tsg.addColorStop(1,main);
      ctx.fillStyle=tsg;
      ctx.beginPath();ctx.moveTo(tx+tw/2,this.y);ctx.lineTo(tx-2,this.y+14);ctx.lineTo(tx+tw+2,this.y+14);ctx.closePath();ctx.fill();
    }
  }
  _rr(x,y,w,h,r){
    const ctx=this.ctx; r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }
}

// ═══════════════════════════════════════════════════════════════
//  BIRD
// ═══════════════════════════════════════════════════════════════
class Bird {
  constructor(x,ctx,level,isNight){
    this.x=x;this.ctx=ctx;this.dead=false;this.isNight=isNight;
    this.width=60;this.height=32;
    const hs=[GY-DUCK_H-16,GY-DINO_H-24,GY-DINO_H-94];
    this.y=hs[Math.min(level,2)];
    this.wc=0;
  }
  update(dt,speed){this.x-=speed*dt;if(this.x+this.width<-80)this.dead=true;this.wc=(this.wc+3.8*dt)%1}
  get hitbox(){return{x:this.x+7,y:this.y+4,w:this.width-14,h:this.height-8}}

  draw(){
    const ctx=this.ctx, n=this.isNight;
    const bc=n?'#5090c0':'#6a4828';
    const bL=n?'#80b8e0':'#8a6040';
    const bD=n?'#2a5880':'#3a2010';

    const cx=this.x+this.width/2, cy=this.y+this.height/2+4;
    const wa=Math.sin(this.wc*Math.PI*2)*30;

    ctx.save(); ctx.translate(cx,cy);

    // Wings
    [-1,1].forEach((dir,idx)=>{
      ctx.save();
      if(idx===1){ctx.globalAlpha=0.5;ctx.rotate(-wa*Math.PI/180*0.65)}
      else ctx.rotate(-wa*Math.PI/180);
      // Wing shape with gradient
      const wg=ctx.createLinearGradient(0,0,dir*-24,12);
      wg.addColorStop(0,bL); wg.addColorStop(0.5,bc); wg.addColorStop(1,bD);
      ctx.fillStyle=wg;
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.bezierCurveTo(dir*-6,-3,dir*-24,4,dir*-22,14);
      ctx.bezierCurveTo(dir*-14,18,dir*-4,10,0,4);
      ctx.closePath(); ctx.fill();
      // Feather quills
      ctx.strokeStyle=bD; ctx.lineWidth=0.7; ctx.globalAlpha=idx===0?0.5:0.3;
      for(let f=0;f<5;f++){ctx.beginPath();ctx.moveTo(0,f*1.4);ctx.lineTo(dir*-(7+f*4),3+f*3);ctx.stroke()}
      ctx.globalAlpha=1;
      ctx.restore();
    });

    // Body gradient
    const bog=ctx.createLinearGradient(-16,-9,16,9);
    bog.addColorStop(0,bL); bog.addColorStop(0.5,bc); bog.addColorStop(1,bD);
    ctx.fillStyle=bog;
    ctx.beginPath();ctx.ellipse(0,0,16,8,-0.15,0,Math.PI*2);ctx.fill();
    // Belly
    ctx.fillStyle=bL; ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.ellipse(2,1,9,5,0.1,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Tail feathers
    ctx.fillStyle=bD;
    ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-24,-2);ctx.lineTo(-22,6);ctx.lineTo(-12,6);ctx.closePath();ctx.fill();
    ctx.fillStyle=bc;
    ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-22,1);ctx.lineTo(-20,6);ctx.closePath();ctx.fill();

    // Head
    const hg=ctx.createRadialGradient(10,-7,0,12,-5,9);
    hg.addColorStop(0,bL); hg.addColorStop(1,bD);
    ctx.fillStyle=hg;
    ctx.beginPath();ctx.arc(12,-5,8,0,Math.PI*2);ctx.fill();

    // Beak top
    ctx.fillStyle='#e8b020';
    ctx.beginPath();ctx.moveTo(18,-6);ctx.lineTo(28,-4);ctx.lineTo(18,-2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c09010';
    ctx.beginPath();ctx.moveTo(18,-2);ctx.lineTo(27,-1);ctx.lineTo(18,0);ctx.closePath();ctx.fill();
    // Beak line
    ctx.strokeStyle='#a07808'; ctx.lineWidth=0.7;
    ctx.beginPath();ctx.moveTo(18,-2);ctx.lineTo(27,-2.5);ctx.stroke();

    // Eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(15,-7,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=n?'#0040a0':'#101010';ctx.beginPath();ctx.arc(15.5,-7,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(16.5,-8,0.8,0,Math.PI*2);ctx.fill();

    // Feet dangling
    const fd=3+Math.abs(Math.sin(this.wc*Math.PI*2))*3.5;
    ctx.strokeStyle='#c09010'; ctx.lineWidth=1.5;
    [[1,8],[7,8]].forEach(([fx,fy])=>{
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx,fy+fd);ctx.stroke();
      // Toe
      ctx.beginPath();ctx.moveTo(fx,fy+fd);ctx.lineTo(fx-3,fy+fd+2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(fx,fy+fd);ctx.lineTo(fx+3,fy+fd+2);ctx.stroke();
    });

    ctx.restore();
  }
}

function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

// ═══════════════════════════════════════════════════════════════
//  GAME
// ═══════════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);

class Game {
  constructor(){
    this.canvas=$('gc'); this.ctx=this.canvas.getContext('2d');
    this._resize(); window.addEventListener('resize',()=>this._resize());

    this.audio=new Audio2(); this.input=new Input();
    this.bg=new Background(this.ctx);
    this.gd=new GroundDetails(this.ctx);
    this.particles=new Particles(this.ctx);
    this.dino=new Dino(this.ctx);

    this.state='start'; this.score=0;
    this.hi=parseInt(localStorage.getItem('dr3hi')||'0',10);
    this.speed=SPD0; this.obs=[]; this.nextObs=W+220;
    this.isNight=false; this.lastT=null; this.fid=null;
    this.slt=0; this.muted=false; this.t=0;

    // DOM
    this.ss=$('ss'); this.gos=$('gos'); this.hud=$('hud');
    this.svEl=$('sv'); this.bvEl=$('bv');
    this.finalEl=$('finalScore'); this.hiEl=$('hiDisp');
    this.bdEl=$('bestDisp'); this.newBR=$('newBest'); this.prevBR=$('prevBest');
    this.sfEl=$('sf'); this.startHiEl=$('startHi'); this.mbEl=$('mb');
    this.wrap=$('wrap');

    $('startBtn').addEventListener('click',()=>this.startGame());
    $('restartBtn').addEventListener('click',()=>this.restart());
    this.mbEl.addEventListener('click',()=>this._mute());

    this.input.onStart=()=>{if(this.state==='start')this.startGame()};
    this.input.onJump=()=>{
      if(this.state==='playing'){
        const wasOn=this.dino.onGround;
        this.dino.jump(this.audio);
        if(wasOn){
          this.particles.spawnLandDust(this.dino.x+DINO_W/2,GY,this.isNight?'rgba(100,180,255,0.5)':'rgba(180,150,80,0.55)');
          this.particles.spawnJumpRing(this.dino.x+DINO_W/2,GY,this.isNight);
        }
      } else if(this.state==='dead') this.restart();
    };
    this.input.onDuck=()=>{if(this.state==='playing')this.dino.duck(true,this.audio)};
    this.input.onDuckEnd=()=>{if(this.state==='playing')this.dino.duck(false,this.audio)};
    this.input.onRestart=()=>{if(this.state==='dead')this.restart()};

    this._updBest(); this._drawIdle();
  }

  _resize(){
    const wr=$('wrap').getBoundingClientRect();
    this.canvas.width=W; this.canvas.height=H;
    const s=Math.min(wr.width/W,wr.height/H);
    this.canvas.style.width=`${W*s}px`; this.canvas.style.height=`${H*s}px`;
    this.canvas.style.left=`${(wr.width-W*s)/2}px`; this.canvas.style.top=`${(wr.height-H*s)/2}px`;
  }
  _show(name){
    this.ss.classList.remove('on'); this.gos.classList.remove('on');
    if(name==='start')this.ss.classList.add('on');
    if(name==='gameover')this.gos.classList.add('on');
  }
  _updBest(){
    const f=String(this.hi).padStart(5,'0');
    this.bvEl.textContent=f;
    if(this.hi>0)this.startHiEl.textContent=`🏆 BEST: ${f}`;
  }
  _mute(){this.muted=this.audio.toggleMute();this.mbEl.textContent=this.muted?'🔇':'🔊'}

  startGame(){
    this.audio.resume();this._show(null);
    this.hud.style.display='flex';this.state='playing';this._reset();this._loop();
  }
  restart(){
    this.audio.resume();this._show(null);
    this.hud.style.display='flex';this.state='playing';this._reset();
    if(this.fid)cancelAnimationFrame(this.fid);this._loop();
  }
  _reset(){
    this.score=0;this.speed=SPD0;this.obs=[];this.nextObs=W+300;
    this.isNight=false;this.lastT=null;this.t=0;this.slt=0;
    this.bg.isNight=false;
    this.dino=new Dino(this.ctx); this.dino.isNight=false;
    this.gd.scrollX=0; this.particles.p=[];
    this.svEl.textContent='00000'; this._updBest();
  }
  _gameOver(){
    this.state='dead'; this.audio.gameOver();
    this.particles.spawnExplosion(this.dino.x+this.dino.W/2,this.dino.y+this.dino.H/2,this.isNight);
    const isNew=this.score>this.hi;
    if(isNew){this.hi=this.score;localStorage.setItem('dr3hi',String(this.hi))}
    const pad=n=>String(Math.floor(n)).padStart(5,'0');
    this.finalEl.textContent=pad(this.score);
    this.hiEl.textContent=pad(this.hi);
    this.bdEl.textContent=pad(this.hi);
    this.newBR.style.display=isNew?'flex':'none';
    this.prevBR.style.display=isNew?'none':'flex';
    setTimeout(()=>this._show('gameover'),420);
  }
  _spawnObs(){
    const sv=Math.floor(this.score);
    const bc=sv>=BIRD_MIN?Math.min(0.40,(sv-500)/2800):0;
    if(Math.random()<bc) this.obs.push(new Bird(W+70,this.ctx,Math.floor(Math.random()*3),this.isNight));
    else this.obs.push(new Cactus(W+70,this.ctx,Math.floor(Math.random()*3),this.isNight));
    const gf=Math.max(0.48,1-this.score/5000);
    this.nextObs=MINGAP+Math.random()*(MAXGAP-MINGAP)*gf;
  }
  _checkDN(s){
    const n=Math.floor(s/DNI)%2===1;
    if(n!==this.isNight){
      this.isNight=n; this.bg.isNight=n; this.dino.isNight=n;
      this.audio.dayNight();
    }
  }

  _loop(){
    const tick=ts=>{
      if(this.state!=='playing')return;
      if(!this.lastT)this.lastT=ts;
      const dt=Math.min((ts-this.lastT)/1000,MAXDT);
      this.lastT=ts; this.t+=dt;
      this._update(dt); this._draw();
      this.fid=requestAnimationFrame(tick);
    };
    this.fid=requestAnimationFrame(tick);
  }

  _update(dt){
    this.speed=Math.min(SPDMAX,this.speed+SPDINC*dt);
    const prev=Math.floor(this.score);
    this.score+=this.speed*dt*0.015;
    const now=Math.floor(this.score);

    if(Math.floor(now/MILESTONE)>Math.floor(prev/MILESTONE)){
      const ms=now-(now%MILESTONE);
      this.sfEl.textContent=ms>=2000?`⚡ SPEED ${ms}`:`🎯 ${ms}`;
      this.sfEl.classList.remove('fa'); void this.sfEl.offsetWidth; this.sfEl.classList.add('fa');
      this.audio.milestone();
    }
    const pad=String(now).padStart(5,'0');
    if(this.svEl.textContent!==pad){
      this.svEl.textContent=pad;
      if(now%100===0&&now>0){this.svEl.classList.remove('sp');void this.svEl.offsetWidth;this.svEl.classList.add('sp')}
    }

    this._checkDN(now);
    this.bg.update(dt,this.speed);
    this.gd.update(dt,this.speed);
    this.dino.update(dt,this.speed);

    // Foot dust
    const dustCol=this.isNight?'rgba(100,180,255,0.45)':'rgba(190,160,90,0.55)';
    if(this.dino.LF&&!this.dino.prevLF) this.particles.spawnFootDust(this.dino.x+22,GY,dustCol);
    if(this.dino.RF&&!this.dino.prevRF) this.particles.spawnFootDust(this.dino.x+38,GY,dustCol);

    // Speed lines
    if(this.speed>530){
      this.slt-=dt;
      if(this.slt<=0){
        const fr=clamp((this.speed-530)/380,0,1); this.slt=lerp(0.2,0.042,fr);
        const lc=this.isNight?'rgba(100,200,255,0.35)':'rgba(255,230,180,0.35)';
        for(let i=0;i<2;i++) this.particles.spawnSpeedLine(W*0.45+Math.random()*W*0.55,this.dino.y+Math.random()*DINO_H,lc);
      }
    }

    this.nextObs-=this.speed*dt;
    if(this.nextObs<=0) this._spawnObs();
    for(const o of this.obs) o.update(dt,this.speed);
    this.obs=this.obs.filter(o=>!o.dead);

    const db=this.dino.hitbox;
    for(const o of this.obs){if(hits(db,o.hitbox)){this._gameOver();return}}
    this.particles.update(dt);
  }

  _draw(){
    const ctx=this.ctx;
    ctx.clearRect(0,0,W,H);
    this.bg.draw(this.t);
    this.gd.draw(this.isNight);
    this.particles.draw();
    for(const o of this.obs) o.draw();
    this.dino.draw();
    // Vignette overlay
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
    vg.addColorStop(0,'transparent');
    vg.addColorStop(1,'rgba(0,0,0,0.22)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  _drawIdle(){
    this.ctx.clearRect(0,0,W,H);
    this.bg.draw(0); this.gd.draw(false); this.dino.draw();
  }
}

document.addEventListener('DOMContentLoaded',()=>window.__g=new Game());
</script>
