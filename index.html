<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>DinoRun — Cinematic Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'Rajdhani',sans-serif}

#wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}

/* Canvas */
#gc{position:absolute;image-rendering:crisp-edges}

/* ── CINEMATIC INTRO ── */
#intro{
  position:absolute;inset:0;z-index:100;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
#intro-canvas{position:absolute;inset:0;width:100%;height:100%}
#intro-content{position:relative;z-index:10;text-align:center;pointer-events:none}
#intro-logo{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(42px,8vw,96px);
  font-weight:900;letter-spacing:0.12em;
  background:linear-gradient(135deg,#f0e060 0%,#ffa500 35%,#ff5500 60%,#ffec40 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:0;transform:scale(0.6) translateY(30px);
  filter:drop-shadow(0 0 40px rgba(255,160,0,0.8));
  transition:none;
}
#intro-sub{
  font-size:clamp(11px,1.8vw,16px);letter-spacing:0.45em;
  color:rgba(255,220,120,0.75);margin-top:14px;
  opacity:0;transform:translateY(20px);
  text-transform:uppercase;
}
#intro-keys{
  margin-top:36px;display:flex;flex-direction:column;gap:10px;
  opacity:0;transform:translateY(16px);
}
.ik-row{display:flex;align-items:center;justify-content:center;gap:12px;font-size:14px;color:rgba(255,255,255,0.55);letter-spacing:0.08em}
.ik-key{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,200,80,0.3);
  border-radius:6px;padding:4px 12px;font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:600;color:rgba(255,220,120,0.9);
  box-shadow:0 2px 0 rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);
}
#start-btn{
  margin-top:44px;position:relative;display:inline-flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(255,160,0,0.15),rgba(255,80,0,0.1));
  border:1px solid rgba(255,160,0,0.5);border-radius:4px;
  padding:16px 44px;font-size:17px;font-weight:700;letter-spacing:0.25em;
  font-family:'Rajdhani',sans-serif;text-transform:uppercase;
  color:#ffd060;cursor:pointer;opacity:0;
  box-shadow:0 0 30px rgba(255,120,0,0.15),inset 0 1px 0 rgba(255,220,100,0.1);
  transition:box-shadow .2s,border-color .2s,transform .1s;overflow:hidden;
}
#start-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,200,80,0.12),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
#start-btn:hover{border-color:rgba(255,180,50,0.9);box-shadow:0 0 50px rgba(255,130,0,0.35),inset 0 1px 0 rgba(255,220,100,0.15);transform:translateY(-2px)}
#start-btn:hover::before{transform:translateX(100%)}
#start-btn:active{transform:translateY(1px)}
#intro-hi{font-size:12px;letter-spacing:0.2em;color:rgba(255,200,80,0.4);margin-top:18px;opacity:0}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:none;justify-content:flex-end;align-items:center;
  gap:10px;padding:14px 20px;z-index:20;pointer-events:none;
}
#hud>*{pointer-events:all}
.hb{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,200,80,0.15);
  border-radius:6px;padding:5px 16px;
  backdrop-filter:blur(12px);
}
.hl{font-size:8px;letter-spacing:3px;color:rgba(255,200,80,0.45);text-transform:uppercase;margin-bottom:2px}
.hv{font-size:22px;font-weight:700;letter-spacing:3px;color:#fff;font-family:'Rajdhani',sans-serif}
#mb{
  background:rgba(0,0,0,0.35);border:1px solid rgba(255,200,80,0.15);
  border-radius:6px;padding:8px 11px;font-size:15px;cursor:pointer;
  backdrop-filter:blur(12px);color:#fff;transition:transform .1s,border-color .2s;
}
#mb:hover{transform:scale(1.1);border-color:rgba(255,200,80,0.5)}

/* Score pulse */
#sv.sp{animation:spulse .3s ease-out}
@keyframes spulse{0%{transform:scale(1.5);color:#ffd740}100%{transform:scale(1);color:#fff}}

/* Speed flash */
#sf{
  position:absolute;top:64px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel Decorative',cursive;font-size:22px;letter-spacing:5px;
  color:#ffd740;pointer-events:none;opacity:0;z-index:25;white-space:nowrap;
  text-shadow:0 0 30px rgba(255,180,0,1),0 0 60px rgba(255,100,0,0.6);
}
#sf.fa{animation:flash 1.6s ease-out forwards}
@keyframes flash{
  0%{opacity:1;transform:translateX(-50%) scale(1.4)}
  60%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-28px) scale(0.75)}
}

/* ── Game Over ── */
#gos{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:30;opacity:0;pointer-events:none;transition:opacity .5s ease;
}
#gos.on{opacity:1;pointer-events:all}
.go-card{
  background:linear-gradient(160deg,rgba(8,4,18,0.97),rgba(20,10,40,0.97));
  border:1px solid rgba(255,200,80,0.12);
  border-radius:6px;padding:44px 56px;text-align:center;
  box-shadow:0 0 80px rgba(0,0,0,0.8),0 0 30px rgba(255,100,0,0.04),inset 0 1px 0 rgba(255,220,100,0.06);
  backdrop-filter:blur(24px);min-width:360px;
  position:relative;overflow:hidden;
}
.go-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,120,0,0.06) 0%,transparent 65%);
  pointer-events:none;
}
.go-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,80,0.5),transparent);margin:0 auto 22px}
.go-title{
  font-family:'Cinzel Decorative',cursive;font-size:38px;font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,#ff6040,#ff3010);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
  text-shadow:none;filter:drop-shadow(0 0 20px rgba(255,60,0,0.5));
}
.go-sub{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.25);margin-bottom:28px;text-transform:uppercase}
.sb{
  background:rgba(0,0,0,0.35);border-radius:4px;
  padding:16px 22px;margin-bottom:26px;
  border:1px solid rgba(255,255,255,0.04);
}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sr:last-child{border:none}
.sr.hi .sl,.sr.hi .sv2{color:#ffd740}
.sl{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase}
.sv2{font-size:22px;font-weight:700;letter-spacing:3px;color:#fff;font-family:'Rajdhani',sans-serif}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(255,160,0,0.12),rgba(255,80,0,0.08));
  color:#ffd060;border:1px solid rgba(255,160,0,0.4);border-radius:4px;
  padding:14px 34px;font-size:14px;font-weight:700;
  letter-spacing:0.25em;font-family:'Rajdhani',sans-serif;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,120,0,0.1);
  transition:transform .12s,box-shadow .12s,border-color .2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(255,130,0,0.25);border-color:rgba(255,180,50,0.7)}
.btn:active{transform:translateY(1px)}
.btn svg{width:17px;height:17px}

/* Cinematic bars */
#cinema-top,#cinema-bot{
  position:absolute;left:0;right:0;height:60px;z-index:50;
  background:#000;pointer-events:none;transition:height .8s cubic-bezier(0.77,0,0.175,1);
}
#cinema-top{top:0}
#cinema-bot{bottom:0}
body.playing #cinema-top,body.playing #cinema-bot{height:0}

/* Vignette overlay */
#vignette{
  position:absolute;inset:0;z-index:15;pointer-events:none;
  background:radial-gradient(ellipse at 50% 60%,transparent 30%,rgba(0,0,0,0.55) 100%);
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="vignette"></div>

  <!-- Cinematic bars -->
  <div id="cinema-top"></div>
  <div id="cinema-bot"></div>

  <!-- Cinematic Intro -->
  <div id="intro">
    <canvas id="intro-canvas"></canvas>
    <div id="intro-content">
      <div id="intro-logo">DinoRun</div>
      <div id="intro-sub">Cinematic Edition</div>
      <div id="intro-keys">
        <div class="ik-row"><span class="ik-key">SPACE</span><span>/ Tap — Jump</span></div>
        <div class="ik-row"><span class="ik-key">↑</span><span>mid-air — Double Jump</span></div>
        <div class="ik-row"><span class="ik-key">↓</span><span>— Duck under birds</span></div>
      </div>
      <button id="start-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><polygon points="4,2 18,10 4,18"/></svg>
        Begin Run
      </button>
      <div id="intro-hi"></div>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gos">
    <div class="go-card">
      <div class="go-line"></div>
      <h2 class="go-title">GAME OVER</h2>
      <div class="go-sub">Your journey ends here</div>
      <div class="sb">
        <div class="sr"><span class="sl">Score</span><span class="sv2" id="finalScore">0</span></div>
        <div class="sr hi" id="newBest" style="display:none"><span class="sl">🏆 New Best</span><span class="sv2" id="bestDisp">0</span></div>
        <div class="sr" id="prevBest"><span class="sl">Best</span><span class="sv2" id="hiDisp">0</span></div>
      </div>
      <button class="btn" id="restartBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.69"/></svg>
        Try Again
      </button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hb"><span class="hl">Score</span><span class="hv" id="sv">00000</span></div>
    <div class="hb"><span class="hl">Best</span><span class="hv" id="bv">00000</span></div>
    <button id="mb">🔊</button>
  </div>
  <div id="sf"></div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const W=900,H=400,GY=320,GH=80;
const DINO_X=85,DINO_W=58,DINO_H=72,DUCK_W=84,DUCK_H=38;
const GRAV=2000,JVEL=-740;
const SPD0=340,SPDMAX=1150,SPDINC=11;
const MILESTONE=100,BIRD_MIN=500,DNI=700;
const MINGAP=660,MAXGAP=1350,MAXDT=0.05;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const sin2pi=(t,f=1,a=1,o=0)=>Math.sin((t*f+o)*Math.PI*2)*a;

// ═══════════════════════════════════════════════════════════════
//  CINEMATIC INTRO ENGINE
// ═══════════════════════════════════════════════════════════════
class IntroEngine {
  constructor(canvas){
    this.canvas=canvas;
    this.ctx=canvas.getContext('2d');
    this.t=0; this.running=true;
    this.particles=[];
    this.stars=[];
    this.nebula=[];
    this._resize();
    window.addEventListener('resize',()=>this._resize());
    this._genStars();
    this._genNebula();
    this._loop();
    this._sequence();
  }
  _resize(){
    this.canvas.width=this.canvas.offsetWidth||window.innerWidth;
    this.canvas.height=this.canvas.offsetHeight||window.innerHeight;
    this.W=this.canvas.width; this.H=this.canvas.height;
  }
  _genStars(){
    this.stars=Array.from({length:200},()=>({
      x:Math.random(),y:Math.random(),
      r:0.3+Math.random()*1.4,
      tw:2+Math.random()*4,tp:Math.random()*4,
      col:`hsl(${200+Math.random()*60},60%,${70+Math.random()*30}%)`
    }));
  }
  _genNebula(){
    this.nebula=Array.from({length:6},()=>({
      x:0.1+Math.random()*0.8,y:0.1+Math.random()*0.8,
      rx:0.08+Math.random()*0.18,ry:0.04+Math.random()*0.1,
      angle:Math.random()*Math.PI,
      col:`hsla(${20+Math.random()*60},80%,${40+Math.random()*20}%,`,
      alpha:0.03+Math.random()*0.06,
      pulse:0.5+Math.random()*1
    }));
  }
  _spawnFirework(x,y){
    const cols=['#ff8800','#ffcc00','#ff4400','#ffee80','#ffffff'];
    for(let i=0;i<40;i++){
      const a=Math.random()*Math.PI*2, sp=50+Math.random()*200;
      this.particles.push({
        x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-80,
        life:1,size:1.5+Math.random()*3,
        col:cols[Math.floor(Math.random()*cols.length)],
        trail:[], grav:120
      });
    }
  }
  _spawnAmbient(){
    const W=this.W, H=this.H;
    for(let i=0;i<3;i++){
      this.particles.push({
        x:Math.random()*W, y:H*0.4+Math.random()*H*0.5,
        vx:(Math.random()-0.5)*20, vy:-15-Math.random()*30,
        life:1, size:1+Math.random()*2.5,
        col:`rgba(255,${120+Math.floor(Math.random()*80)},20,`,
        type:'ember', grav:0
      });
    }
  }
  _sequence(){
    const logo=document.getElementById('intro-logo');
    const sub=document.getElementById('intro-sub');
    const keys=document.getElementById('intro-keys');
    const btn=document.getElementById('start-btn');
    const hi=document.getElementById('intro-hi');

    // Phase 1: Logo reveal after 0.8s
    setTimeout(()=>{
      logo.style.transition='opacity 1.2s cubic-bezier(0.16,1,0.3,1),transform 1.2s cubic-bezier(0.16,1,0.3,1),filter 1.2s ease';
      logo.style.opacity='1';
      logo.style.transform='scale(1) translateY(0)';
      logo.style.filter='drop-shadow(0 0 60px rgba(255,160,0,1)) drop-shadow(0 0 120px rgba(255,80,0,0.5))';
      this._spawnFirework(this.W/2, this.H*0.38);
    },800);

    // Phase 2: Sub-title
    setTimeout(()=>{
      sub.style.transition='opacity .9s ease,transform .9s ease';
      sub.style.opacity='1';
      sub.style.transform='translateY(0)';
    },1800);

    // Phase 3: Keys
    setTimeout(()=>{
      keys.style.transition='opacity .8s ease,transform .8s ease';
      keys.style.opacity='1';
      keys.style.transform='translateY(0)';
    },2400);

    // Phase 4: Button
    setTimeout(()=>{
      btn.style.transition='opacity .7s ease';
      btn.style.opacity='1';
      hi.style.transition='opacity .7s ease';
      hi.style.opacity='1';
    },3000);

    // Ambient fireworks
    setTimeout(()=>this._spawnFirework(this.W*0.2,this.H*0.5),2000);
    setTimeout(()=>this._spawnFirework(this.W*0.8,this.H*0.45),2600);
    setTimeout(()=>this._spawnFirework(this.W*0.5,this.H*0.55),3200);
  }

  _loop(){
    if(!this.running)return;
    const now=performance.now()/1000;
    const dt=Math.min(now-this.t, 0.05); this.t=now;

    // Spawn ambient
    if(Math.random()<0.15) this._spawnAmbient();

    // Update particles
    for(const p of this.particles){
      if(p.trail){ p.trail.push({x:p.x,y:p.y}); if(p.trail.length>8)p.trail.shift(); }
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.vy+=p.grav*dt;
      p.vx*=0.98; p.vy*=0.98;
      p.life-=dt*(p.type==='ember'?0.8:0.9);
    }
    this.particles=this.particles.filter(p=>p.life>0);

    this._draw();
    requestAnimationFrame(()=>this._loop());
  }

  _draw(){
    const ctx=this.ctx, W=this.W, H=this.H, t=this.t;
    // Sky
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#010008');
    sky.addColorStop(0.4,'#050218');
    sky.addColorStop(0.8,'#0e0820');
    sky.addColorStop(1,'#1a0e10');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Nebula wisps
    for(const n of this.nebula){
      const pulse=0.6+0.4*Math.sin(t*n.pulse);
      ctx.save();
      ctx.translate(n.x*W,n.y*H);
      ctx.rotate(n.angle+t*0.05);
      const ng=ctx.createRadialGradient(0,0,0,0,0,n.rx*W);
      ng.addColorStop(0,n.col+(n.alpha*pulse)+')');
      ng.addColorStop(1,n.col+'0)');
      ctx.fillStyle=ng;
      ctx.scale(1,n.ry/n.rx);
      ctx.beginPath();ctx.arc(0,0,n.rx*W,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // Stars
    for(const s of this.stars){
      const blink=0.4+0.6*Math.sin((t/s.tw+s.tp)*Math.PI*2);
      ctx.globalAlpha=0.2+blink*0.8;
      ctx.fillStyle=s.col;
      ctx.beginPath();ctx.arc(s.x*W,s.y*H*0.8,s.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // Horizon atmospheric glow
    const hg=ctx.createLinearGradient(0,H*0.55,0,H);
    hg.addColorStop(0,'transparent');
    hg.addColorStop(0.6,`rgba(80,20,10,0.3)`);
    hg.addColorStop(1,`rgba(140,40,10,0.5)`);
    ctx.fillStyle=hg; ctx.fillRect(0,H*0.55,W,H*0.45);

    // Distant mountains silhouette
    ctx.fillStyle='rgba(8,4,20,0.9)';
    ctx.beginPath();
    ctx.moveTo(0,H);
    const mpts=[[0,0.75],[0.08,0.62],[0.15,0.7],[0.22,0.55],[0.3,0.65],[0.38,0.48],[0.45,0.6],[0.52,0.5],[0.6,0.63],[0.67,0.42],[0.75,0.58],[0.82,0.46],[0.9,0.6],[1,0.68],[1,1]];
    for(const [mx,my] of mpts) ctx.lineTo(mx*W,my*H);
    ctx.closePath();ctx.fill();

    // Ground fog
    const fg=ctx.createLinearGradient(0,H*0.72,0,H);
    fg.addColorStop(0,'transparent');
    fg.addColorStop(1,'rgba(40,15,5,0.7)');
    ctx.fillStyle=fg; ctx.fillRect(0,H*0.72,W,H*0.28);

    // Floating ember particles
    for(const p of this.particles){
      ctx.save();
      if(p.trail){
        // Firework with trail
        for(let i=0;i<p.trail.length;i++){
          const ta=(i/p.trail.length)*p.life*0.5;
          ctx.globalAlpha=ta;
          ctx.fillStyle=p.col;
          const ts=p.size*(i/p.trail.length)*p.life;
          const g=ctx.createRadialGradient(p.trail[i].x,p.trail[i].y,0,p.trail[i].x,p.trail[i].y,ts);
          g.addColorStop(0,p.col); g.addColorStop(1,'transparent');
          ctx.fillStyle=g;
          ctx.beginPath();ctx.arc(p.trail[i].x,p.trail[i].y,ts,0,Math.PI*2);ctx.fill();
        }
        ctx.globalAlpha=p.life;
        const eg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*p.life);
        eg.addColorStop(0,'#fff'); eg.addColorStop(0.3,p.col); eg.addColorStop(1,'transparent');
        ctx.fillStyle=eg;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
      } else {
        // Ember
        ctx.globalAlpha=p.life*0.7;
        ctx.fillStyle=p.col+p.life*0.7+')';
        const eg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
        eg.addColorStop(0,p.col+'1)'); eg.addColorStop(1,p.col+'0)');
        ctx.fillStyle=eg;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }

    // Center glow behind logo area
    const cg=ctx.createRadialGradient(W/2,H*0.38,0,W/2,H*0.38,220);
    cg.addColorStop(0,'rgba(255,100,0,0.06)');
    cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
  }

  stop(){ this.running=false; }
}

// ═══════════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════════
class Audio2 {
  constructor(){this.ctx=null;this.muted=false;this.ambiNode=null;this.windNode=null;
    try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  resume(){if(this.ctx?.state==='suspended')this.ctx.resume()}
  _t(f,type,dur,g=0.15,d=0){
    if(this.muted||!this.ctx)return;
    try{
      const o=this.ctx.createOscillator(),gn=this.ctx.createGain();
      o.connect(gn);gn.connect(this.ctx.destination);
      o.type=type;o.frequency.value=f;o.detune.value=d;
      const n=this.ctx.currentTime;
      gn.gain.setValueAtTime(g,n);gn.gain.exponentialRampToValueAtTime(0.001,n+dur);
      o.start(n);o.stop(n+dur);
    }catch(e){}
  }
  _noise(dur,vol=0.06,freq=800){
    if(this.muted||!this.ctx)return;
    try{
      const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*dur,this.ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const src=this.ctx.createBufferSource();
      const filt=this.ctx.createBiquadFilter();
      const gn=this.ctx.createGain();
      src.buffer=buf; filt.frequency.value=freq; filt.type='lowpass';
      src.connect(filt);filt.connect(gn);gn.connect(this.ctx.destination);
      gn.gain.setValueAtTime(vol,this.ctx.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
      src.start();
    }catch(e){}
  }
  jump(){
    this._t(200,'square',.12,.10);
    this._t(320,'square',.09,.08);
    this._noise(.08,.04,600);
  }
  dblJump(){
    this._t(320,'square',.10,.10);
    this._t(440,'square',.08,.08);
    this._t(560,'sine',.06,.05);
  }
  duck(){this._t(110,'triangle',.09,.10);this._noise(.05,.03,200)}
  land(){this._noise(.12,.08,200);this._t(80,'sine',.1,.12)}
  milestone(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this._t(f,'square',.12,.14),i*55))}
  gameOver(){
    [440,330,220,165].forEach((f,i)=>setTimeout(()=>this._t(f,'sawtooth',.14,.16),i*70));
    setTimeout(()=>{this._t(55,'sawtooth',.35,.20);this._noise(.4,.1,80)},200);
  }
  dayNight(){[523,659,784].forEach((f,i)=>setTimeout(()=>this._t(f,'sine',.5,.07),i*80))}
  footstep(){this._noise(.04,.025,300)}
  startAmbience(){
    if(this.muted||!this.ctx)return;
    this._startWind();
  }
  _startWind(){
    if(this.windNode||!this.ctx)return;
    try{
      const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*2,this.ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const src=this.ctx.createBufferSource();
      const f1=this.ctx.createBiquadFilter();
      const f2=this.ctx.createBiquadFilter();
      const gn=this.ctx.createGain();
      src.buffer=buf; src.loop=true;
      f1.type='bandpass'; f1.frequency.value=400; f1.Q.value=0.5;
      f2.type='lowpass'; f2.frequency.value=600;
      src.connect(f1);f1.connect(f2);f2.connect(gn);gn.connect(this.ctx.destination);
      gn.gain.value=this.muted?0:0.03;
      src.start(); this.windNode=gn;
    }catch(e){}
  }
  setWindSpeed(spd){if(this.windNode&&!this.muted)this.windNode.gain.value=clamp((spd/SPDMAX)*0.06,0.01,0.07)}
  toggleMute(){this.muted=!this.muted;if(this.windNode)this.windNode.gain.value=this.muted?0:0.03;return this.muted}
}

// ═══════════════════════════════════════════════════════════════
//  INPUT  — keyboard + mouse + touch
// ═══════════════════════════════════════════════════════════════
class Input {
  constructor(){
    this.onJump=this.onDuck=this.onDuckEnd=this.onStart=this.onRestart=null;
    const k={};
    window.addEventListener('keydown',e=>{
      if(k[e.code])return;k[e.code]=true;
      if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();this.onJump?.();this.onStart?.()}
      if(e.code==='ArrowDown'){e.preventDefault();this.onDuck?.()}
      if(e.code==='KeyR')this.onRestart?.();
    });
    window.addEventListener('keyup',e=>{
      k[e.code]=false;
      if(e.code==='ArrowDown')this.onDuckEnd?.();
    });
    // Mouse controls
    window.addEventListener('mousedown',e=>{
      if(e.button===0){e.preventDefault();this.onJump?.();this.onStart?.();}
      if(e.button===2){e.preventDefault();this.onDuck?.();}
    });
    window.addEventListener('mouseup',e=>{
      if(e.button===2){e.preventDefault();this.onDuckEnd?.();}
    });
    window.addEventListener('contextmenu',e=>e.preventDefault());
    // Touch
    let sy=0;
    window.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;this.onJump?.();this.onStart?.()},{passive:true});
    window.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-sy>40){this.onDuck?.();setTimeout(()=>this.onDuckEnd?.(),500)}},{passive:true});
  }
}

// ═══════════════════════════════════════════════════════════════
//  DAY/NIGHT CYCLE — Cinematic 6-phase system
// ═══════════════════════════════════════════════════════════════
class DayNight {
  constructor(){
    this.phase=0; // 0=dawn 1=morning 2=noon 3=evening 4=sunset 5=night
    this.t=0; this.isNight=false;
    this.transitionT=0; this.inTransition=false;
  }
  // Returns blended sky colors for current state
  getSkyColors(score){
    const phases=[
      {top:'#0a0510',horizon:'#4a1a08',sun:'#ff6600',isN:false},   // dawn
      {top:'#1a4a8a',horizon:'#ffc880',sun:'#ffe060',isN:false},    // morning
      {top:'#4a8ac8',horizon:'#80c4f0',sun:'#fff8e0',isN:false},    // noon
      {top:'#2a5a80',horizon:'#f08040',sun:'#ffd040',isN:false},    // evening
      {top:'#1a0a30',horizon:'#c84020',sun:'#ff6020',isN:false},    // sunset
      {top:'#060412',horizon:'#1a1040',sun:'#8090d0',isN:true},     // night
    ];
    const idx=Math.floor(score/DNI)%6;
    const next=(idx+1)%6;
    const frac=((score/DNI)%1);
    const blend=t=>t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2); // smooth step
    const bf=blend(Math.min(frac*2,1));
    const a=phases[idx], b=phases[next];
    return {
      top:lerpColor(a.top,b.top,bf),
      horizon:lerpColor(a.horizon,b.horizon,bf),
      sun:lerpColor(a.sun,b.sun,bf),
      isNight:score/DNI%1>0.5?b.isN:a.isN,
      nightAlpha:idx===5?1:idx===4?frac:0,
      sunriseAlpha:idx===0?1-frac:idx===5?frac*0.5:0,
      sunY:idx===5?0.2:idx===0?0.35:0.12,
    };
  }
}

function hexToRgb(color){

  if(color.startsWith('rgb')){
    const nums = color.match(/\d+/g).map(Number);
    return [
      nums[0] || 0,
      nums[1] || 0,
      nums[2] || 0
    ];
  }

  if(color.length === 4){
    return [
      parseInt(color[1] + color[1],16),
      parseInt(color[2] + color[2],16),
      parseInt(color[3] + color[3],16)
    ];
  }

  return [
    parseInt(color.slice(1,3),16),
    parseInt(color.slice(3,5),16),
    parseInt(color.slice(5,7),16)
  ];
}

function lerpColor(c1,c2,t){
  const [r1,g1,b1]=hexToRgb(c1),[r2,g2,b2]=hexToRgb(c2);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ═══════════════════════════════════════════════════════════════
//  WEATHER SYSTEM
// ═══════════════════════════════════════════════════════════════
class Weather {
  constructor(){
    this.type='clear'; // clear,rain,mist,dust,storm
    this.intensity=0; this.targetIntensity=0;
    this.timer=8; this.duration=15;
    this.drops=[]; this.dustParticles=[];
    this.lightningT=0; this.lightningFlash=0;
  }
  update(dt,speed){
    this.timer-=dt;
    if(this.timer<=0){
      const r=Math.random();
      if(r<0.4) this.type='clear';
      else if(r<0.6) this.type='mist';
      else if(r<0.75) this.type='rain';
      else if(r<0.88) this.type='dust';
      else this.type='storm';
      this.duration=10+Math.random()*20;
      this.timer=this.duration;
      this.targetIntensity=this.type==='clear'?0:0.4+Math.random()*0.6;
    }
    this.intensity=lerp(this.intensity,this.targetIntensity,dt*0.5);

    // Rain drops
    if(this.type==='rain'||this.type==='storm'){
      const count=Math.floor(this.intensity*(this.type==='storm'?4:2));
      for(let i=0;i<count;i++){
        this.drops.push({x:Math.random()*W+200,y:-5,vx:-speed*0.3-200,vy:600+Math.random()*200,len:8+Math.random()*12,life:1});
      }
    }
    for(const d of this.drops){d.x+=d.vx*dt;d.y+=d.vy*dt;d.life-=dt*3}
    this.drops=this.drops.filter(d=>d.life>0&&d.y<GY&&d.x>-10);

    // Lightning
    if(this.type==='storm'){
      this.lightningT-=dt;
      if(this.lightningT<=0){this.lightningFlash=1;this.lightningT=3+Math.random()*8}
    }
    this.lightningFlash=Math.max(0,this.lightningFlash-dt*6);

    // Dust
    if(this.type==='dust'){
      if(Math.random()<0.3) this.dustParticles.push({x:W,y:40+Math.random()*(GY-60),vx:-speed*0.8-100,vy:(Math.random()-0.5)*20,size:3+Math.random()*8,life:1,alpha:0.1+Math.random()*0.3});
    }
    for(const d of this.dustParticles){d.x+=d.vx*dt;d.y+=d.vy*dt;d.life-=dt*0.8}
    this.dustParticles=this.dustParticles.filter(d=>d.life>0&&d.x>-20);
  }
  draw(ctx){
    // Lightning flash overlay
    if(this.lightningFlash>0){
      ctx.fillStyle=`rgba(200,220,255,${this.lightningFlash*0.15})`;
      ctx.fillRect(0,0,W,H);
    }
    // Mist overlay
    if(this.type==='mist'){
      const mg=ctx.createLinearGradient(0,GY-80,0,GY+20);
      mg.addColorStop(0,'transparent');
      mg.addColorStop(1,`rgba(200,220,240,${this.intensity*0.35})`);
      ctx.fillStyle=mg;ctx.fillRect(0,GY-80,W,100);
      // Mist wisps
      ctx.fillStyle=`rgba(200,215,235,${this.intensity*0.12})`;
      ctx.fillRect(0,GY-30,W,50);
    }
    // Rain
    ctx.strokeStyle=`rgba(160,190,220,${this.intensity*0.6})`;
    ctx.lineWidth=0.8;
    for(const d of this.drops){
      ctx.save();ctx.globalAlpha=d.life*this.intensity*0.7;
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+d.vx*0.012,d.y+d.len);ctx.stroke();
      ctx.restore();
    }
    // Dust
    for(const d of this.dustParticles){
      ctx.save();ctx.globalAlpha=d.life*d.alpha;
      ctx.fillStyle=`rgba(200,150,80,1)`;
      ctx.beginPath();ctx.ellipse(d.x,d.y,d.size*2,d.size*0.7,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    // Storm rain overlay tint
    if(this.type==='storm'&&this.intensity>0.3){
      ctx.fillStyle=`rgba(20,30,50,${(this.intensity-0.3)*0.25})`;
      ctx.fillRect(0,0,W,H);
    }
  }
  getAmbientTint(){
    if(this.type==='storm') return `rgba(20,30,50,${this.intensity*0.2})`;
    if(this.type==='dust') return `rgba(120,80,20,${this.intensity*0.15})`;
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════
//  BACKGROUND PAINTER  — Cinematic 2.5D World
// ═══════════════════════════════════════════════════════════════
class Background {
  constructor(ctx){
    this.ctx=ctx; this.isNight=false;
    this.scroll=[0,0,0,0,0,0];
    // Generate realistic mountain ridges using fractal subdivision
    this.mtnsFar=this._genRealisticMtns(6, 55, 110, W*3, 0);
    this.mtnsMid=this._genRealisticMtns(8, 28, 62, W*2.2, 1);
    this.mtnsNear=this._genRealisticMtns(5, 14, 32, W*1.6, 2);
    this.clouds=this._genVolumeClouds(14);
    this.trees=this._genTrees(28);
    this.stars=Array.from({length:200},()=>({
      x:Math.random()*W, y:Math.random()*H*0.75,
      r:0.4+Math.random()*1.6,
      tw:2.5+Math.random()*5, tp:Math.random()*6,
      col:`hsl(${200+Math.random()*80},${40+Math.random()*40}%,${70+Math.random()*30}%)`
    }));
    // Ground surface details: pebbles, tire tracks, dust accumulation
    this.groundPebbles=Array.from({length:80},()=>({
      x:Math.random()*W*3.5, y:GY+2+Math.random()*18,
      rx:1.5+Math.random()*4.5, ry:0.7+Math.random()*2.2,
      tilt:(Math.random()-0.5)*0.4,
      val:0.55+Math.random()*0.35
    }));
    this.trackLines=Array.from({length:12},()=>({x:Math.random()*W*3.5}));
    this.dn=new DayNight();
    this._sunAngle=0;
  }

  // Fractal midpoint displacement for realistic ridgelines
  _genRealisticMtns(count, minH, maxH, wrap, seed){
    const mtns=[];
    for(let i=0;i<count;i++){
      const w=100+Math.random()*160;
      const h=minH+Math.random()*(maxH-minH);
      // Generate ridge using midpoint displacement
      const pts=this._fractalRidge(w, h, 5+(seed*2));
      const hasSnow=(h>maxH*0.72)&&Math.random()>0.4;
      // Erosion: add small ridges on slope
      const ridges=Array.from({length:3+Math.floor(Math.random()*4)},()=>({
        pos:0.1+Math.random()*0.8, depth:0.05+Math.random()*0.15
      }));
      mtns.push({
        x:(i/count)*wrap+Math.random()*(wrap/count),
        w, h, pts, hasSnow, ridges,
        aspect:0.3+Math.random()*0.5  // left-right asymmetry
      });
    }
    return mtns;
  }

  _fractalRidge(width, height, iterations){
    let pts=[{x:0,y:0},{x:width,y:0}];
    // Add peak
    const peak={x:width*(0.35+Math.random()*0.3), y:height};
    pts=[{x:0,y:0},peak,{x:width,y:0}];
    // Midpoint displacement
    for(let it=0;it<iterations;it++){
      const npts=[];
      for(let i=0;i<pts.length-1;i++){
        npts.push(pts[i]);
        const mx=(pts[i].x+pts[i+1].x)/2;
        const my=(pts[i].y+pts[i+1].y)/2;
        const disp=height*(0.18/(it+1))*(Math.random()*2-1);
        npts.push({x:mx, y:Math.max(0,my+disp)});
      }
      npts.push(pts[pts.length-1]);
      pts=npts;
    }
    return pts;
  }

  _genVolumeClouds(n){
    return Array.from({length:n},()=>{
      // Each cloud has a set of spherical puffs
      const puffCount=3+Math.floor(Math.random()*5);
      const w=90+Math.random()*180;
      const h=28+Math.random()*45;
      const puffs=[];
      for(let i=0;i<puffCount;i++){
        puffs.push({
          ox:(i/(puffCount-1||1))*w*(0.8+Math.random()*0.4)-w*0.1,
          oy:(Math.random()-0.5)*h*0.5,
          rx:w*0.12+Math.random()*w*0.15,
          ry:h*(0.3+Math.random()*0.4),
          alpha:0.65+Math.random()*0.35
        });
      }
      return {
        x:Math.random()*W*2.8, y:12+Math.random()*105,
        w, h, puffs,
        speed:0.18+Math.random()*0.45,
        layer:Math.random()<0.38?0:1,
        opacity:0.5+Math.random()*0.45
      };
    });
  }

  _genTrees(n){
    return Array.from({length:n},(_,i)=>({
      x:(i/n)*W*3+Math.random()*90,
      h:22+Math.random()*42, w:7+Math.random()*11,
      type:Math.floor(Math.random()*3),
      tilt:(Math.random()-0.5)*0.08
    }));
  }

  update(dt,speed){
    this.scroll[0]+=speed*0.035*dt;
    this.scroll[1]+=speed*0.09*dt;
    this.scroll[2]+=speed*0.17*dt;
    this.scroll[3]+=speed*0.38*dt;
    this.scroll[4]+=speed*0.68*dt;
    this.scroll[5]+=speed*1.0*dt;
    this._sunAngle+=dt*0.012;
  }

  draw(t,score){
    const ctx=this.ctx, night=this.isNight;
    const sky=this.dn.getSkyColors(score||0);
    const sunPhase=score/DNI; // 0..6 cycle
    // Sun position: rises from right-ish, sets toward horizon
    const dayFrac=(sunPhase%1);
    const sunX=W*(0.78+Math.sin(dayFrac*Math.PI*0.3)*0.12);
    const sunY=GY*(sky.sunY||0.15);

    // ── Sky gradient with scattering layers ──
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,sky.top);
    sg.addColorStop(0.42,sky.horizon);
    sg.addColorStop(0.78,lerpColor(sky.horizon,sky.sun,0.55));
    sg.addColorStop(1,lerpColor(sky.sun,'#ffcc88',0.35));
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,GY);

    // ── Atmospheric scattering near horizon ──
    if(!sky.isNight){
      const scatH=ctx.createLinearGradient(0,GY-55,0,GY);
      scatH.addColorStop(0,'transparent');
      scatH.addColorStop(1,`rgba(255,220,140,0.22)`);
      ctx.fillStyle=scatH; ctx.fillRect(0,GY-55,W,55);
    }

    // ── Sun ──
    if(!sky.isNight){
      this._drawSun(ctx,sunX,sunY,sky,t);
    } else {
      // Night: stars + moon
      for(const s of this.stars){
        const blink=0.45+0.55*Math.sin((t/s.tw+s.tp)*Math.PI*2);
        ctx.globalAlpha=(0.15+blink*0.85)*Math.min(1,sky.nightAlpha||1);
        ctx.fillStyle=s.col;
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      this._drawMoon(ctx,sunX,sunY,sky,t);
    }

    // ── Far mountains ──
    const atmFar=night?0.6:0.7;
    const atmFarCol=night?'rgba(14,10,32,':'rgba(110,135,168,';
    const atmFarShad=night?'rgba(8,6,22,':'rgba(82,108,140,';
    this._drawRealisticMtns(this.mtnsFar,this.scroll[0],W*3,atmFarCol,atmFarShad,atmFar,sky,sunX,sunY,night,0.85);

    // ── Back clouds ──
    for(const c of this.clouds){
      if(c.layer!==0) continue;
      const cx=((c.x-this.scroll[2]*c.speed*0.55)%(W*2.8)+W*2.8)%(W*2.8)-150;
      if(cx>W+160||cx<-160) continue;
      this._drawVolumetricCloud(ctx,cx,c.y,c.w*0.65,c.h*0.65,c.puffs,night,c.opacity*0.55,sky,sunX,sunY);
    }

    // ── Mid mountains ──
    const atmMid=night?0.82:0.88;
    const atmMidCol=night?'rgba(24,16,52,':'rgba(148,178,200,';
    const atmMidShad=night?'rgba(14,10,38,':'rgba(115,148,174,';
    this._drawRealisticMtns(this.mtnsMid,this.scroll[1],W*2.2,atmMidCol,atmMidShad,atmMid,sky,sunX,sunY,night,0.72);

    // ── Front clouds ──
    for(const c of this.clouds){
      if(c.layer!==1) continue;
      const cx=((c.x-this.scroll[2]*c.speed)%(W*2.8)+W*2.8)%(W*2.8)-150;
      if(cx>W+160||cx<-160) continue;
      this._drawVolumetricCloud(ctx,cx,c.y,c.w,c.h,c.puffs,night,c.opacity*0.92,sky,sunX,sunY);
    }

    // ── Near hills ──
    const atmNear=night?0.92:0.94;
    const atmNearCol=night?'rgba(15,22,15,':'rgba(68,98,58,';
    const atmNearShad=night?'rgba(10,16,10,':'rgba(50,74,42,';
    this._drawRealisticMtns(this.mtnsNear,this.scroll[2],W*1.6,atmNearCol,atmNearShad,atmNear,sky,sunX,sunY,night,0.55);

    // ── Distant trees/forest ──
    this._drawForest(this.scroll[3],night,sky,sunX);

    // ── Ground ──
    this._drawGround(night,sky,sunX,sunY,t);
  }

  _drawSun(ctx,sx,sy,sky,t){
    // Atmospheric lens bloom (outermost, faintest)
    const bloom=ctx.createRadialGradient(sx,sy,0,sx,sy,120);
    bloom.addColorStop(0,`rgba(255,230,150,0.12)`);
    bloom.addColorStop(0.4,`rgba(255,180,80,0.07)`);
    bloom.addColorStop(1,'transparent');
    ctx.fillStyle=bloom; ctx.beginPath();ctx.arc(sx,sy,120,0,Math.PI*2);ctx.fill();

    // Corona
    const corona=ctx.createRadialGradient(sx,sy,16,sx,sy,65);
    corona.addColorStop(0,`rgba(255,220,130,0.28)`);
    corona.addColorStop(0.5,`rgba(255,180,60,0.14)`);
    corona.addColorStop(1,'transparent');
    ctx.fillStyle=corona; ctx.beginPath();ctx.arc(sx,sy,65,0,Math.PI*2);ctx.fill();

    // Solar disc — off-center bright spot simulates limb darkening
    const disc=ctx.createRadialGradient(sx-4,sy-4,0,sx,sy,20);
    disc.addColorStop(0,'#fffae8');
    disc.addColorStop(0.25,sky.sun||'#ffe080');
    disc.addColorStop(0.7,`rgba(255,160,40,0.92)`);
    disc.addColorStop(1,`rgba(255,120,20,0.6)`);
    ctx.fillStyle=disc; ctx.beginPath();ctx.arc(sx,sy,20,0,Math.PI*2);ctx.fill();

    // Subtle volumetric rays (low alpha, wide)
    ctx.save(); ctx.globalAlpha=0.045;
    const rayCount=16;
    for(let i=0;i<rayCount;i++){
      const a=(i/rayCount)*Math.PI*2+t*0.04;
      const len=80+Math.sin(t*0.7+i)*20;
      ctx.fillStyle=sky.sun||'#ffe080';
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.lineTo(sx+Math.cos(a-0.07)*len,sy+Math.sin(a-0.07)*len);
      ctx.lineTo(sx+Math.cos(a+0.07)*len,sy+Math.sin(a+0.07)*len);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  _drawMoon(ctx,mx,my,sky,t){
    // Distant glow halo
    const moonHalo=ctx.createRadialGradient(mx,my,0,mx,my,75);
    moonHalo.addColorStop(0,'rgba(180,195,240,0.13)');
    moonHalo.addColorStop(0.5,'rgba(140,160,210,0.07)');
    moonHalo.addColorStop(1,'transparent');
    ctx.fillStyle=moonHalo; ctx.beginPath();ctx.arc(mx,my,75,0,Math.PI*2);ctx.fill();

    // Moon disc with limb variation
    const moonDisc=ctx.createRadialGradient(mx-6,my-6,0,mx,my,23);
    moonDisc.addColorStop(0,'#fffdf8');
    moonDisc.addColorStop(0.3,'#e8eeff');
    moonDisc.addColorStop(0.7,'#c0ccee');
    moonDisc.addColorStop(1,'#8898cc');
    ctx.fillStyle=moonDisc; ctx.beginPath();ctx.arc(mx,my,23,0,Math.PI*2);ctx.fill();

    // Mare (dark patches — realistic detail)
    const mares=[
      [mx-5,my+4,6.5,4.5],
      [mx+7,my-5,4,3],
      [mx+4,my+9,3.5,2.5],
      [mx-10,my-4,3,2],
    ];
    for(const [cx,cy,rx,ry] of mares){
      ctx.fillStyle='rgba(90,105,150,0.28)';
      ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();
    }

    // Phase shadow (waxing gibbous style)
    ctx.save();
    ctx.globalCompositeOperation='source-atop';
    ctx.fillStyle='rgba(10,16,45,0.42)';
    ctx.beginPath();
    ctx.ellipse(mx+6,my,16,23,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  _drawRealisticMtns(mtns,scroll,wrap,fillPrefix,shadPrefix,alpha,sky,sunX,sunY,night,fogDepth){
    const ctx=this.ctx;
    // Atmospheric fog factor: distant = more faded
    const fogCol=night?`rgba(8,6,22,${fogDepth*0.5})`:`rgba(200,215,230,${fogDepth*0.45})`;

    ctx.globalAlpha=alpha;
    for(const m of mtns){
      const ox=((m.x-scroll)%wrap+wrap)%wrap-m.w*0.5-20;
      if(ox>W+120||ox<-m.w-20) continue;

      const base=GY;
      const pts=m.pts;

      // Main body fill
      const fillG=ctx.createLinearGradient(ox,base-m.h,ox+m.w,base);
      if(night){
        fillG.addColorStop(0,fillPrefix+'0.88)');
        fillG.addColorStop(0.6,fillPrefix+'0.78)');
        fillG.addColorStop(1,shadPrefix+'0.92)');
      } else {
        // Lit from sun direction
        const litSide=sunX>ox+m.w/2?1:0;
        if(litSide){
          fillG.addColorStop(0,fillPrefix+'0.7)');
          fillG.addColorStop(0.4,fillPrefix+'0.82)');
          fillG.addColorStop(1,shadPrefix+'0.9)');
        } else {
          fillG.addColorStop(0,shadPrefix+'0.9)');
          fillG.addColorStop(0.6,fillPrefix+'0.82)');
          fillG.addColorStop(1,fillPrefix+'0.7)');
        }
      }
      ctx.fillStyle=fillG;

      ctx.beginPath();
      ctx.moveTo(ox,base);
      for(const p of pts){
        ctx.lineTo(ox+p.x,base-p.y);
      }
      ctx.lineTo(ox+m.w,base);
      ctx.closePath();
      ctx.fill();

      // Shadow face (right or left depending on sun)
      ctx.fillStyle=night?shadPrefix+'0.55)':shadPrefix+'0.48)';
      const peakPt=pts.reduce((a,b)=>b.y>a.y?b:a,pts[0]);
      ctx.beginPath();
      ctx.moveTo(ox+peakPt.x,base-peakPt.y);
      const fromIdx=pts.indexOf(peakPt);
      // Right slope
      for(let i=fromIdx;i<pts.length;i++) ctx.lineTo(ox+pts[i].x,base-pts[i].y);
      ctx.lineTo(ox+m.w,base);
      ctx.lineTo(ox+peakPt.x,base);
      ctx.closePath(); ctx.fill();

      // Snow cap on high peaks
      if(m.hasSnow && m.h>45){
        const snowLevel=0.78;
        ctx.fillStyle=night?'rgba(200,210,235,0.38)':'rgba(248,252,255,0.72)';
        ctx.beginPath();
        let first=true;
        for(const p of pts){
          if(p.y>=m.h*snowLevel){
            if(first){ctx.moveTo(ox+p.x,base-p.y);first=false;}
            else ctx.lineTo(ox+p.x,base-p.y);
          }
        }
        if(!first){
          // close at snow-level altitude
          const snowY=base-m.h*snowLevel;
          ctx.lineTo(ox+pts[pts.length-1].x+(pts[pts.length-1].y<m.h*snowLevel?0:0),snowY);
          ctx.lineTo(ox+pts[0].x,snowY);
          ctx.closePath();ctx.fill();
        }
      }

      // Atmospheric depth fog overlay
      ctx.fillStyle=fogCol;
      ctx.beginPath();
      ctx.moveTo(ox,base);
      for(const p of pts) ctx.lineTo(ox+p.x,base-p.y);
      ctx.lineTo(ox+m.w,base);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  _drawVolumetricCloud(ctx,bx,by,bw,bh,puffs,night,alpha,sky,sunX,sunY){
    if(alpha<0.02) return;
    ctx.save();
    ctx.globalAlpha=alpha;

    // Determine sun/light direction for edge lighting
    const sunDir=sunX<bx+bw/2?-1:1; // 1=sun from right, -1=from left

    // Shadow base (soft flat shadow under cloud)
    ctx.fillStyle=night?'rgba(40,50,100,0.22)':'rgba(160,170,190,0.25)';
    ctx.beginPath();
    ctx.ellipse(bx+bw*0.5,by+bh+7,bw*0.44,bh*0.18,0,0,Math.PI*2);
    ctx.fill();

    for(const p of puffs){
      const px=bx+p.ox, py=by+p.oy;

      // Inner dark base (shadow interior of puff)
      const shadowG=ctx.createRadialGradient(px+p.rx*0.1,py+p.ry*0.45,p.rx*0.05,px,py,Math.max(p.rx,p.ry));
      if(night){
        shadowG.addColorStop(0,'rgba(195,210,250,0.75)');
        shadowG.addColorStop(0.55,'rgba(130,155,220,0.55)');
        shadowG.addColorStop(1,'rgba(70,90,170,0.08)');
      } else {
        shadowG.addColorStop(0,'rgba(255,255,255,0.96)');
        shadowG.addColorStop(0.4,'rgba(245,248,255,0.85)');
        shadowG.addColorStop(0.75,'rgba(215,222,240,0.55)');
        shadowG.addColorStop(1,'rgba(190,200,225,0.08)');
      }
      ctx.fillStyle=shadowG;
      ctx.beginPath();ctx.ellipse(px,py,p.rx,p.ry,0,0,Math.PI*2);ctx.fill();

      // Lit edge on sun-facing side
      if(!night){
        ctx.globalAlpha=alpha*0.45;
        const litEdgeX=px+sunDir*p.rx*0.7;
        const litG=ctx.createRadialGradient(litEdgeX,py-p.ry*0.4,0,litEdgeX,py-p.ry*0.2,p.rx*0.65);
        litG.addColorStop(0,'rgba(255,255,255,0.9)');
        litG.addColorStop(1,'transparent');
        ctx.fillStyle=litG;
        ctx.beginPath();ctx.ellipse(litEdgeX,py-p.ry*0.3,p.rx*0.55,p.ry*0.45,0,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=alpha;
      }
    }
    ctx.restore();
  }

  _drawForest(scroll,night,sky,sunX){
    const ctx=this.ctx;
    for(const tree of this.trees){
      const wrap=W*3;
      const tx=((tree.x-scroll*0.6)%wrap+wrap)%wrap-30;
      if(tx<-30||tx>W+30) continue;
      const ty=GY;

      // Atmospheric fog on trees
      const fogAmt=0.12;
      const treeCol=night
        ?`rgba(8,14,8,0.92)`
        :`rgba(${32+Math.floor(fogAmt*80)},${58+Math.floor(fogAmt*60)},${25+Math.floor(fogAmt*50)},0.82)`;
      ctx.fillStyle=treeCol;

      ctx.save();
      ctx.translate(tx,ty);ctx.rotate(tree.tilt||0);

      if(tree.type===0){
        // Realistic pine: layered tiers
        for(let tier=0;tier<3;tier++){
          const tw2=tree.w*(0.85-tier*0.18);
          const th2=tree.h*(0.4-tier*0.06);
          const ty2=-tree.h*(0.35+tier*0.28);
          ctx.beginPath();ctx.moveTo(0,ty2-th2);ctx.lineTo(-tw2/2,ty2);ctx.lineTo(tw2/2,ty2);ctx.closePath();ctx.fill();
        }
        // Trunk
        ctx.fillStyle=night?'rgba(15,10,8,0.7)':'rgba(50,30,15,0.65)';
        ctx.fillRect(-tree.w*0.08,0,tree.w*0.16,-tree.h*0.2);
      } else if(tree.type===1){
        // Broadleaf with canopy variation
        const jitter=(Math.sin(tree.x)*0.5+0.5);
        ctx.beginPath();ctx.ellipse(0,-tree.h*0.55,tree.w*0.5*(0.9+jitter*0.2),tree.h*0.45,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(-tree.w*0.22,-tree.h*0.5,tree.w*0.35,tree.h*0.35,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(tree.w*0.2,-tree.h*0.48,tree.w*0.32,tree.h*0.33,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=night?'rgba(10,8,5,0.5)':'rgba(38,22,10,0.55)';
        ctx.fillRect(-tree.w*0.1,0,tree.w*0.2,-tree.h*0.28);
      } else {
        // Desert scrub / cactus silhouette
        ctx.fillRect(-3,-tree.h,6,tree.h);
        ctx.fillRect(-12,-tree.h*0.6,12,4);
        ctx.fillRect(-12,-tree.h*0.6-7,4,9);
        ctx.fillRect(3,-tree.h*0.52,11,4);
        ctx.fillRect(10,-tree.h*0.52-6,4,8);
      }
      ctx.restore();
    }
  }

  _drawGround(night,sky,sunX,sunY,t){
    const ctx=this.ctx;

    // --- Base soil color with natural variation ---
    const horizonY=GY;
    const gBot=H;

    if(night){
      const gg=ctx.createLinearGradient(0,horizonY,0,gBot);
      gg.addColorStop(0,'#1a2436'); gg.addColorStop(0.22,'#131c2c'); gg.addColorStop(0.6,'#0e1520'); gg.addColorStop(1,'#08101a');
      ctx.fillStyle=gg; ctx.fillRect(0,horizonY,W,gBot-horizonY);
    } else {
      // Day: warm desert earth with color variation
      const gg=ctx.createLinearGradient(0,horizonY,0,gBot);
      gg.addColorStop(0,'#c8a468'); gg.addColorStop(0.15,'#b89252'); gg.addColorStop(0.4,'#a87c3e'); gg.addColorStop(0.8,'#8e6830'); gg.addColorStop(1,'#7a5828');
      ctx.fillStyle=gg; ctx.fillRect(0,horizonY,W,gBot-horizonY);

      // Lateral color bands (soil variation)
      ctx.globalAlpha=0.06;
      for(let i=0;i<3;i++){
        const bx=(this.scroll[5]*0.3+i*330)%(W+200)-100;
        const bw=120+i*60;
        const bg=ctx.createLinearGradient(bx,0,bx+bw,0);
        bg.addColorStop(0,'transparent');
        bg.addColorStop(0.5,'rgba(160,100,40,1)');
        bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg; ctx.fillRect(bx,horizonY,bw,gBot-horizonY);
      }
      ctx.globalAlpha=1;
    }

    // --- Contact line: lit edge at horizon ---
    const edgeG=ctx.createLinearGradient(0,horizonY-3,0,horizonY+6);
    edgeG.addColorStop(0,night?'rgba(80,130,220,0.5)':'rgba(255,230,140,0.6)');
    edgeG.addColorStop(0.45,night?'rgba(60,100,180,0.18)':'rgba(200,160,60,0.22)');
    edgeG.addColorStop(1,'transparent');
    ctx.fillStyle=edgeG; ctx.fillRect(0,horizonY-3,W,9);

    // --- Ground surface line ---
    ctx.strokeStyle=night?'rgba(38,60,90,0.9)':'rgba(100,72,30,0.85)';
    ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(0,horizonY);ctx.lineTo(W,horizonY);ctx.stroke();

    // --- Tire / track lines (perspective-converging) ---
    // Two parallel tracks that converge toward horizon using perspective
    const vp={x:W*0.5,y:horizonY}; // vanishing point at center horizon
    const trackOffsets=[-22,22]; // ground width of tracks
    ctx.globalAlpha=0.14;
    ctx.strokeStyle=night?'rgba(30,50,80,1)':'rgba(80,55,20,1)';
    for(const off of trackOffsets){
      // At screen bottom, track is wider apart; converges at horizon
      const nearX=vp.x+off*3.5;
      const farX=vp.x+off*0.22;
      const tScroll=(this.scroll[5]*0.65)%(W*2);
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(nearX-tScroll%80,gBot);
      ctx.lineTo(farX,horizonY+2);
      ctx.stroke();
      // Dashes in track
      for(let d=0;d<8;d++){
        const df=d/8;
        const dashX=lerp(nearX,farX,df)-tScroll*(1-df)*0.12;
        const dashY=lerp(gBot,horizonY+3,df);
        const dashW=lerp(18,3,df);
        ctx.lineWidth=lerp(1.4,0.5,df);
        ctx.beginPath();ctx.moveTo(dashX,dashY);ctx.lineTo(dashX+dashW,dashY);ctx.stroke();
      }
    }
    ctx.globalAlpha=1;

    // --- Pebbles / ground debris with perspective scaling ---
    for(const p of this.groundPebbles){
      const wrap=W*3.5;
      const px=((p.x-this.scroll[5]*0.95)%wrap+wrap)%wrap-20;
      if(px<-15||px>W+15) continue;
      // Perspective: objects further up (closer to GY) are smaller
      const depthT=clamp((p.y-GY)/(H-GY),0,1);
      const scale=lerp(0.2,1.0,depthT);
      const pyReal=p.y;
      const brightness=night?(0.22+p.val*0.18):(0.55+p.val*0.3);
      const rCol=night?`rgba(${Math.floor(38*brightness)},${Math.floor(58*brightness)},${Math.floor(88*brightness)},0.7)`
                      :`rgba(${Math.floor(170*brightness)},${Math.floor(138*brightness)},${Math.floor(92*brightness)},0.72)`;
      ctx.fillStyle=rCol;
      ctx.beginPath();ctx.ellipse(px,pyReal,p.rx*scale,p.ry*scale,p.tilt,0,Math.PI*2);ctx.fill();
      // Highlight facet
      ctx.fillStyle=night?'rgba(90,130,200,0.12)':'rgba(255,255,220,0.22)';
      ctx.beginPath();ctx.ellipse(px-p.rx*scale*0.2,pyReal-p.ry*scale*0.25,p.rx*scale*0.45,p.ry*scale*0.3,p.tilt,0,Math.PI*2);ctx.fill();
      // Contact shadow below pebble
      ctx.fillStyle='rgba(0,0,0,0.11)';
      ctx.beginPath();ctx.ellipse(px,pyReal+p.ry*scale*0.7,p.rx*scale*0.8,p.ry*scale*0.18,0,0,Math.PI*2);ctx.fill();
    }

    // --- Distant ground haze / atmospheric perspective ---
    const groundHaze=ctx.createLinearGradient(0,horizonY,0,horizonY+30);
    groundHaze.addColorStop(0,night?'rgba(14,20,40,0.55)':'rgba(210,190,140,0.42)');
    groundHaze.addColorStop(1,'transparent');
    ctx.fillStyle=groundHaze; ctx.fillRect(0,horizonY,W,30);

    // --- Shadow from sun cast across ground plane ---
    if(!night){
      // Long ground shadow going left (sun from right)
      const shadowG=ctx.createLinearGradient(W*0.45,horizonY,0,horizonY+GH*0.5);
      shadowG.addColorStop(0,'transparent');
      shadowG.addColorStop(0.5,'rgba(0,0,0,0.05)');
      shadowG.addColorStop(1,'transparent');
      ctx.fillStyle=shadowG;
      ctx.fillRect(0,horizonY,W*0.6,GH*0.5);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  GROUND DETAILS — Perspective-accurate surface layer
// ═══════════════════════════════════════════════════════════════
class GroundDetails {
  constructor(ctx){
    this.ctx=ctx; this.scrollX=0;
    // Ground surface markings near the dino's plane
    this.details=Array.from({length:100},()=>({
      x:Math.random()*W*3,
      type:Math.floor(Math.random()*5),
      s:0.6+Math.random()*2.8,
      h:0.8+Math.random()*2.2,
      depth:0.05+Math.random()*0.7  // 0=near horizon,1=near camera
    }));
    this.rocks=Array.from({length:28},()=>({
      x:Math.random()*W*3,
      w:4+Math.random()*12,
      h:2.5+Math.random()*6,
      depth:0.1+Math.random()*0.85,
      tilt:(Math.random()-0.5)*0.25,
      val:0.5+Math.random()*0.45
    }));
    // Dust accumulation patches near ground line
    this.dustPatches=Array.from({length:20},()=>({
      x:Math.random()*W*3,
      rx:12+Math.random()*35,
      ry:2+Math.random()*4,
      alpha:0.04+Math.random()*0.12
    }));
  }
  update(dt,speed){this.scrollX=(this.scrollX+speed*dt)%(W*3)}
  draw(isNight){
    const ctx=this.ctx;
    const horizonY=GY;

    // --- Ground markings scaled by depth / perspective ---
    for(const d of this.details){
      const wrap=W*3;
      const dx=((d.x-this.scrollX)%wrap+wrap)%wrap-40;
      if(dx<-25||dx>W+25) continue;
      // Perspective: depth 0 = near horizon (small), depth 1 = near camera (full size)
      const scale=lerp(0.08,1.0,d.depth);
      const dy=lerp(horizonY+1,GY+GH-8,d.depth);
      const col=isNight?`rgba(42,62,88,${0.4*scale+0.1})`:`rgba(138,104,56,${0.5*scale+0.1})`;
      ctx.fillStyle=col;
      ctx.strokeStyle=col;
      ctx.globalAlpha=Math.min(1,0.45*scale+0.12);
      switch(d.type){
        case 0: // pebble cluster
          ctx.beginPath();ctx.ellipse(dx,dy,d.s*scale*1.4,d.s*scale*0.55,0,0,Math.PI*2);ctx.fill();
          break;
        case 1: // crack line
          ctx.lineWidth=0.7*scale;
          ctx.beginPath();ctx.moveTo(dx,dy);ctx.lineTo(dx+d.s*3*scale,dy+d.h*2*scale);ctx.lineTo(dx+d.s*5*scale,dy+d.h*0.8*scale);ctx.stroke();
          break;
        case 2: // dry grass tuft
          ctx.lineWidth=1.0*scale;
          for(let i=0;i<3;i++){
            ctx.beginPath();ctx.moveTo(dx+i*3*scale,dy);
            ctx.bezierCurveTo(dx+i*3*scale-2*scale,dy-4*scale,dx+i*3*scale-1*scale,dy-7*scale,dx+i*3*scale+1*scale,dy-8*scale);
            ctx.stroke();
          }
          break;
        case 3: // flat dust line
          ctx.globalAlpha=0.18*scale;
          ctx.lineWidth=0.8*scale;
          ctx.beginPath();ctx.moveTo(dx,dy+1);ctx.lineTo(dx+d.s*7*scale,dy+1);ctx.stroke();
          break;
        case 4: // embedded stone
          ctx.beginPath();ctx.ellipse(dx,dy+d.s*0.3*scale,d.s*scale*2,d.s*scale*0.65,0,0,Math.PI*2);ctx.fill();
          ctx.fillStyle=isNight?'rgba(80,120,180,0.12)':'rgba(255,240,200,0.18)';
          ctx.beginPath();ctx.ellipse(dx-d.s*0.2*scale,dy-d.s*0.2*scale,d.s*scale*0.85,d.s*scale*0.35,0,0,Math.PI*2);ctx.fill();
          break;
      }
      ctx.globalAlpha=1;
    }

    // --- Rocks with perspective, specular, shadow ---
    for(const r of this.rocks){
      const wrap=W*3;
      const rx=((r.x-this.scrollX*0.85)%wrap+wrap)%wrap-40;
      if(rx<-25||rx>W+25) continue;
      const scale=lerp(0.07,1.0,r.depth);
      const ry=lerp(GY+2,GY+GH*0.75,r.depth);
      const rw=r.w*scale, rh=r.h*scale;

      // Contact shadow (flat ellipse below rock)
      ctx.fillStyle='rgba(0,0,0,0.14)';
      ctx.beginPath();ctx.ellipse(rx,ry+rh*0.7,rw*0.85,rh*0.22,0,0,Math.PI*2);ctx.fill();

      // Rock body gradient
      const rg=ctx.createRadialGradient(rx-rw*0.2,ry-rh*0.25,0,rx,ry,Math.max(rw,rh));
      if(isNight){
        rg.addColorStop(0,`rgba(${Math.floor(55*r.val)},${Math.floor(75*r.val)},${Math.floor(110*r.val)},0.9)`);
        rg.addColorStop(0.65,`rgba(${Math.floor(30*r.val)},${Math.floor(46*r.val)},${Math.floor(72*r.val)},0.88)`);
        rg.addColorStop(1,`rgba(14,22,38,0.85)`);
      } else {
        rg.addColorStop(0,`rgba(${Math.floor(190*r.val)},${Math.floor(160*r.val)},${Math.floor(120*r.val)},0.92)`);
        rg.addColorStop(0.6,`rgba(${Math.floor(148*r.val)},${Math.floor(118*r.val)},${Math.floor(82*r.val)},0.88)`);
        rg.addColorStop(1,`rgba(90,68,42,0.85)`);
      }
      ctx.fillStyle=rg;
      ctx.beginPath();ctx.ellipse(rx,ry,rw,rh,r.tilt,0,Math.PI*2);ctx.fill();

      // Specular highlight facet
      ctx.fillStyle=isNight?'rgba(110,155,220,0.22)':'rgba(255,248,220,0.3)';
      ctx.beginPath();ctx.ellipse(rx-rw*0.22,ry-rh*0.28,rw*0.32,rh*0.22,r.tilt,0,Math.PI*2);ctx.fill();
    }

    // --- Dust accumulation near ground line ---
    for(const d of this.dustPatches){
      const wrap=W*3;
      const px=((d.x-this.scrollX*0.9)%wrap+wrap)%wrap-50;
      if(px<-60||px>W+60) continue;
      ctx.fillStyle=isNight?`rgba(50,70,110,${d.alpha})`:`rgba(180,148,88,${d.alpha})`;
      ctx.beginPath();ctx.ellipse(px,GY+1.5,d.rx,d.ry,0,0,Math.PI*2);ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM — Extended
// ═══════════════════════════════════════════════════════════════
class Particles {
  constructor(ctx){this.ctx=ctx;this.p=[];this.ambientP=[];this.ambientT=0}
  spawnFootDust(x,y,col){
    for(let i=0;i<6;i++) this.p.push({x,y,vx:(Math.random()-0.7)*70,vy:-(Math.random()*55+12),life:1,size:2.5+Math.random()*4.5,col,type:'dust',rot:Math.random()*Math.PI*2});
  }
  spawnLandDust(x,y,col){
    for(let i=0;i<18;i++){
      const a=Math.PI+(Math.random()-0.5)*Math.PI*1.2,sp=55+Math.random()*140;
      this.p.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp*0.5-24,life:1,size:3+Math.random()*7,col,type:'dust',rot:Math.random()*Math.PI*2});
    }
  }
  spawnSpeedLine(x,y,col){
    this.p.push({x,y,vx:-580-Math.random()*280,vy:(Math.random()-0.5)*10,life:1,size:0.7+Math.random()*1.6,col,type:'speed',len:28+Math.random()*55});
  }
  spawnExplosion(x,y,night){
    for(let i=0;i<42;i++){
      const a=(Math.PI*2*i/42)+Math.random()*0.5,sp=80+Math.random()*280;
      const cols=night?['#40a8f8','#80d4ff','#b0e8ff','#60c8ff']:['#ff7030','#ffb040','#fff060','#ff4020','#ffdd88'];
      this.p.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,size:2.5+Math.random()*9,col:cols[Math.floor(Math.random()*cols.length)],type:'explode'});
    }
    this.p.push({x,y,vx:0,vy:0,life:1,size:80,col:night?'rgba(100,200,255,0.55)':'rgba(255,180,50,0.55)',type:'flash'});
    // Shockwave ring
    for(let i=0;i<3;i++){
      this.p.push({x,y,vx:0,vy:0,life:1,size:i*10,col:night?'rgba(100,200,255,0.4)':'rgba(255,200,100,0.4)',type:'ring',speed:i*0.3+0.8});
    }
  }
  spawnJumpRing(x,y,night){
    this.p.push({x,y,vx:0,vy:0,life:1,size:0,col:night?'rgba(100,200,255,0.7)':'rgba(180,255,150,0.7)',type:'ring',speed:1});
  }
  spawnImpactSpark(x,y,night){
    for(let i=0;i<8;i++){
      const a=-Math.PI/2+(Math.random()-0.5)*Math.PI;
      this.p.push({x,y,vx:Math.cos(a)*120,vy:Math.sin(a)*120,life:1,size:1+Math.random()*2.5,col:night?'#80d4ff':'#ffd060',type:'spark'});
    }
  }
  updateAmbient(dt,night){
    this.ambientT-=dt;
    if(this.ambientT<=0){
      this.ambientT=0.3+Math.random()*0.8;
      const col=night?`rgba(80,${160+Math.floor(Math.random()*80)},255,`:`rgba(255,${180+Math.floor(Math.random()*60)},60,`;
      this.ambientP.push({x:W*0.3+Math.random()*W*0.6,y:GY*0.3+Math.random()*GY*0.5,vx:(Math.random()-0.5)*12,vy:-8-Math.random()*20,life:1,size:0.8+Math.random()*2,col});
    }
    for(const p of this.ambientP){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*0.55}
    this.ambientP=this.ambientP.filter(p=>p.life>0);
  }
  update(dt){
    for(const p of this.p){
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      if(p.type==='dust'||p.type==='explode'||p.type==='spark') p.vy+=480*dt;
      p.life-=dt*(p.type==='speed'?3.4:p.type==='flash'?5:p.type==='ring'?2.2:p.type==='spark'?4:1.8);
      if(p.type==='ring') p.size=lerp(p.size,(p.speed||1)*60,1-Math.pow(0.001,dt));
    }
    this.p=this.p.filter(p=>p.life>0);
  }
  draw(){
    const ctx=this.ctx;
    // Ambient
    for(const p of this.ambientP){
      ctx.save();ctx.globalAlpha=p.life*0.4;
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2);
      g.addColorStop(0,p.col+'1)');g.addColorStop(1,p.col+'0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*2,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    for(const p of this.p){
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.life*(p.type==='speed'?0.55:p.type==='ring'?1:0.88));
      switch(p.type){
        case 'dust':
          ctx.translate(p.x,p.y);ctx.rotate(p.rot+(1-p.life)*2.2);
          ctx.fillStyle=p.col;
          ctx.beginPath();ctx.ellipse(0,0,p.size*p.life+0.5,p.size*p.life*0.52,0,0,Math.PI*2);ctx.fill();
          break;
        case 'speed':{
          const alpha=p.life*0.55;
          ctx.save();ctx.globalAlpha=alpha;
          const grad=ctx.createLinearGradient(p.x,p.y,p.x+p.len*p.life,p.y);
          grad.addColorStop(0,'transparent');grad.addColorStop(1,p.col);
          ctx.strokeStyle=grad;ctx.lineWidth=p.size;ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.len*p.life,p.y);ctx.stroke();
          ctx.restore();break;}
        case 'explode':{
          const eg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*p.life);
          eg.addColorStop(0,p.col);eg.addColorStop(0.5,p.col);eg.addColorStop(1,'transparent');
          ctx.fillStyle=eg;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();break;}
        case 'flash':
          ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();break;
        case 'ring':{
          const rw=3.5*(1-p.size/70+0.1)*p.life;
          ctx.strokeStyle=p.col;ctx.lineWidth=Math.max(0.3,rw);
          ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.stroke();break;}
        case 'spark':{
          ctx.strokeStyle=p.col;ctx.lineWidth=p.size;ctx.lineCap='round';
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.vx*0.04,p.y+p.vy*0.04);ctx.stroke();break;}
      }
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA SHAKE
// ═══════════════════════════════════════════════════════════════
class Camera {
  constructor(){this.sx=0;this.sy=0;this.trauma=0;this.t=0}
  shake(amount){this.trauma=Math.min(1,this.trauma+amount)}
  update(dt){
    this.trauma=Math.max(0,this.trauma-dt*2.2);
    this.t+=dt*60;
    const s=this.trauma*this.trauma;
    this.sx=s*12*Math.sin(this.t*0.83);
    this.sy=s*8*Math.cos(this.t*1.1);
  }
  apply(ctx){ctx.translate(this.sx,this.sy)}
}

// ═══════════════════════════════════════════════════════════════
//  DINO  — Fully articulated skeleton, richly painted
// ═══════════════════════════════════════════════════════════════
class Dino {
  constructor(ctx){
    this.ctx=ctx;this.isNight=false;
    this.x=DINO_X;this.y=GY-DINO_H;
    this.vy=0;this.onGround=true;this.isDuck=false;this.jumps=0;
    this.cycle=0;this.sqY=1;this.stX=1;this.bob=0;
    this.blinkT=0;this.eyeOpen=true;this.eyeX=0;
    this.prevLF=false;this.prevRF=false;this.LF=false;this.RF=false;
    this.trail=[];this.breathT=0;
    this.landShake=0;this.rimFlash=0;
  }
  get W(){return this.isDuck?DUCK_W:DINO_W}
  get H(){return this.isDuck?DUCK_H:DINO_H}
  get hitbox(){const p=9;return{x:this.x+p,y:this.y+p,w:this.W-p*2,h:this.H-p*2}}

  jump(audio){
    if(this.isDuck){this.isDuck=false;return}
    if(this.onGround){this.vy=JVEL;this.onGround=false;this.jumps=1;this.sqY=0.58;this.stX=1.45;audio.jump();this.rimFlash=1}
    else if(this.jumps===1){this.vy=JVEL*0.78;this.jumps=2;this.sqY=0.72;this.stX=1.32;audio.dblJump();this.rimFlash=1}
  }
  duck(on,audio){
    if(on&&!this.isDuck){
      audio.duck();
      this.isDuck=true;
      // Fast-fall: if in air, slam downward
      if(!this.onGround){
        this.vy=Math.max(this.vy,680); // strong downward impulse
      }
    } else if(!on){
      this.isDuck=false;
    }
  }

  update(dt,speed){
    const wasOn=this.onGround;
    if(!this.onGround){this.vy+=GRAV*dt;this.y+=this.vy*dt}
    const floor=GY-this.H;
    if(this.y>=floor){
      if(!wasOn){this.sqY=1.42;this.stX=0.65;this.landShake=1}
      this.y=floor;this.vy=0;this.onGround=true;this.jumps=0;
    }
    this.landShake=Math.max(0,this.landShake-dt*5);
    this.rimFlash=Math.max(0,this.rimFlash-dt*4);
    this.sqY=lerp(this.sqY,1,1-Math.pow(0.00006,dt));
    this.stX=lerp(this.stX,1,1-Math.pow(0.00006,dt));
    const cps=this.isDuck?12:clamp(speed/70,3.5,16);
    if(this.onGround) this.cycle=(this.cycle+cps*dt)%1;
    else this.cycle=lerp(this.cycle,0.25,dt*5);
    this.bob=this.onGround?Math.abs(Math.sin(this.cycle*Math.PI*2))*3.8:0;
    this.breathT+=dt;
    this.blinkT+=dt;
    if(this.blinkT>3.8){this.eyeOpen=false;if(this.blinkT>3.96){this.eyeOpen=true;this.blinkT=0;this.eyeX=(Math.random()-0.5)*1.5}}
    this.prevLF=this.LF;this.prevRF=this.RF;
    const p=this.cycle;
    this.LF=this.onGround&&p>0.5&&p<1.0;
    this.RF=this.onGround&&p<0.5;
    if(speed>680){
      this.trail.push({x:this.x,y:this.y,a:0.28,s:this.sqY,sx:this.stX});
      if(this.trail.length>9)this.trail.shift();
      this.trail.forEach(f=>f.a*=0.80);
    } else this.trail=[];
  }

  draw(){
    const ctx=this.ctx,night=this.isNight;
    const C={
      body  :night?'#3a8abf':'#2e6838',
      bodyL :night?'#6ac8ef':'#4e9858',
      bodyD :night?'#1a5080':'#1a3a20',
      belly :night?'#82ceff':'#78b848',
      scale :night?'#2a78b0':'#246228',
      claw  :night?'#0e3060':'#121c10',
      eye   :night?'#061828':'#06120a',
      iris  :night?'#1080ff':'#186828',
      rimL  :night?'rgba(60,190,255,0.55)':'rgba(140,240,100,0.55)',
    };

    const bx=this.x, by=this.y;
    const bw=this.W, bh=this.H;
    const t=this.cycle;
    const air=!this.onGround;

    // --- Ground shadow ---
    const shadowW=bw*(air?0.24:0.52);
    const shadowH=air?2:4.5;
    const shadowDx=air?clamp((GY-by-bh)*0.18,0,22):0;
    const shadowAlpha=air?(night?0.1:0.09):(night?0.22:0.19);
    const sg=ctx.createRadialGradient(
      bx+bw/2+shadowDx,GY+3,0,
      bx+bw/2+shadowDx,GY+3,shadowW+8
    );
    sg.addColorStop(0,night?`rgba(5,15,50,${shadowAlpha})`:`rgba(0,0,0,${shadowAlpha})`);
    sg.addColorStop(0.6,night?`rgba(5,15,50,${shadowAlpha*0.4})`:`rgba(0,0,0,${shadowAlpha*0.4})`);
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(bx+bw/2+shadowDx,GY+3,shadowW+8,shadowH,0,0,Math.PI*2);ctx.fill();

    // --- Rim flash on jump ---
    if(this.rimFlash>0){
      ctx.save();ctx.globalAlpha=this.rimFlash*0.35;
      const rg=ctx.createRadialGradient(bx+bw/2,by+bh/2,0,bx+bw/2,by+bh/2,bw*0.9);
      rg.addColorStop(0,'transparent');rg.addColorStop(0.7,'transparent');
      rg.addColorStop(1,C.rimL);
      ctx.fillStyle=rg;ctx.fillRect(bx-10,by-10,bw+20,bh+20);
      ctx.restore();
    }

    // --- Motion ghost trail ---
    for(const f of this.trail){
      ctx.save();ctx.globalAlpha=f.a*0.45;
      ctx.translate(f.x+DINO_W/2,f.y+DINO_H*0.65);
      ctx.scale(f.sx||1,f.s||1);
      ctx.translate(-(f.x+DINO_W/2),-(f.y+DINO_H*0.65));
      ctx.fillStyle=night?'rgba(40,140,220,0.45)':'rgba(50,110,50,0.38)';
      ctx.beginPath();
      ctx.ellipse(f.x+bw*0.45,f.y+bh*0.42,bw*0.32,bh*0.38,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    if(this.isDuck) this._drawDuck(C);
    else            this._drawRun(C);
    ctx.restore();
  }

  // ── HELPERS ────────────────────────────────────────────────────
  _path(pts){
    const ctx=this.ctx;
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.closePath();
  }
  _bezPath(pts){
    const ctx=this.ctx;
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i+=3)
      ctx.bezierCurveTo(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1],pts[i+2][0],pts[i+2][1]);
    ctx.closePath();
  }

  // ── RUNNING POSE ──────────────────────────────────────────────
  _drawRun(C){
    const ctx=this.ctx;
    const x=this.x, t=this.cycle;
    const air=!this.onGround;

    // Body center reference
    const hipX=x+32, hipY=this.y+DINO_H-26+this.bob;
    const torsoY=this.y+DINO_H*0.38;

    // Squash/stretch pivot
    ctx.save();
    ctx.translate(hipX,hipY);ctx.scale(this.stX,this.sqY);ctx.translate(-hipX,-hipY);

    // ── TAIL (drawn behind body) ──────────────────────────────
    this._drawTailArticulated(x,hipY,t,C,air);

    // ── BACK LEG (behind body, lower alpha) ──────────────────
    ctx.restore();
    this._drawLegArticulated(x,hipY,(t+0.5)%1,C,true);
    ctx.save();
    ctx.translate(hipX,hipY);ctx.scale(this.stX,this.sqY);ctx.translate(-hipX,-hipY);

    // ── TORSO / RIBCAGE / ABDOMEN ─────────────────────────────
    this._drawTorso(x,this.y,C);

    // ── SMALL FOREARM ─────────────────────────────────────────
    this._drawForearm(x+41,hipY-24,Math.sin(((t+0.5)%1)*Math.PI*2)*24,C);

    // ── HEAD + NECK ───────────────────────────────────────────
    const nodDeg=air
      ? (this.vy<0?-14:8)                            // airborne tilt
      : Math.sin(t*Math.PI*4)*3.5+this.bob*0.4;      // running nod
    this._drawNeckHead(x,this.y,nodDeg,C);

    ctx.restore();

    // ── FRONT LEG (on top) ────────────────────────────────────
    this._drawLegArticulated(x,hipY,t,C,false);
  }

  // ── ARTICULATED TAIL ──────────────────────────────────────────
  _drawTailArticulated(x,hipY,t,C,air){
    const ctx=this.ctx;
    // Tail attaches at posterior of body
    const tx0=x+6, ty0=hipY-4;
    // Inertia: tail lags behind body motion
    const baseSwing=air?Math.sin(t*Math.PI*2)*6:Math.sin(t*Math.PI*2)*18;
    const mid1Swing=baseSwing*1.4;
    const tipSwing=baseSwing*1.9;
    const baseAngle=(baseSwing)*Math.PI/180-0.18;
    const tailLen1=22, tailLen2=18, tailLen3=14;

    // Compute chain joints
    const j0={x:tx0,y:ty0};
    const j1={x:j0.x+Math.cos(Math.PI+baseAngle)*tailLen1, y:j0.y+Math.sin(Math.PI+baseAngle)*(tailLen1*0.5)-2+mid1Swing*0.28};
    const j2={x:j1.x+Math.cos(Math.PI+baseAngle*1.3)*tailLen2, y:j1.y+Math.sin(Math.PI+baseAngle*1.1)*(tailLen2*0.45)-1+tipSwing*0.35};
    const j3={x:j2.x+Math.cos(Math.PI+baseAngle*1.6)*tailLen3, y:j2.y+Math.sin(Math.PI+baseAngle*1.4)*(tailLen3*0.38)+tipSwing*0.4};

    // Draw tail as tapered ribbon
    const segs=[[j0,j1,8,5],[j1,j2,5,3.5],[j2,j3,3.5,1.8]];
    for(let s=0;s<segs.length;s++){
      const [a,b,w0,w1]=segs[s];
      const dx=b.x-a.x, dy=b.y-a.y;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=dy/len, ny=-dx/len;
      ctx.beginPath();
      ctx.moveTo(a.x+nx*w0, a.y+ny*w0);
      ctx.lineTo(b.x+nx*w1, b.y+ny*w1);
      ctx.lineTo(b.x-nx*w1, b.y-ny*w1);
      ctx.lineTo(a.x-nx*w0, a.y-ny*w0);
      ctx.closePath();
      const tg=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      const frac=s/segs.length;
      tg.addColorStop(0,s===0?C.body:s===1?C.body:C.bodyD);
      tg.addColorStop(1,s===0?C.bodyD:C.bodyD);
      ctx.fillStyle=tg; ctx.fill();
      // Highlight stripe
      ctx.strokeStyle=C.bodyL; ctx.lineWidth=0.8; ctx.globalAlpha=0.22;
      ctx.beginPath();ctx.moveTo(a.x+nx*(w0*0.35),a.y+ny*(w0*0.35));ctx.lineTo(b.x+nx*(w1*0.3),b.y+ny*(w1*0.3));ctx.stroke();
      ctx.globalAlpha=1;
    }
    // Tail tip decoration
    ctx.fillStyle=C.bodyD;
    ctx.beginPath();ctx.ellipse(j3.x,j3.y,2.2,1.4,Math.atan2(j3.y-j2.y,j3.x-j2.x),0,Math.PI*2);ctx.fill();
    // Dorsal ridge spines on tail
    ctx.fillStyle=C.bodyD;
    const spineSegs=[[j0,j1],[j1,j2]];
    spineSegs.forEach(([a,b],si)=>{
      for(let i=0;i<2;i++){
        const frac=(i+0.4)/(2);
        const sx=lerp(a.x,b.x,frac), sy=lerp(a.y,b.y,frac);
        const dx=b.x-a.x, dy=b.y-a.y;
        const len=Math.sqrt(dx*dx+dy*dy)||1;
        const perpX=-dy/len, perpY=dx/len;
        const h=5.5-si*1.5-i*0.8;
        ctx.beginPath();ctx.moveTo(sx,sy);
        ctx.lineTo(sx+perpX*h-1.5,sy+perpY*h);
        ctx.lineTo(sx+perpX*h+1.5,sy+perpY*h);
        ctx.closePath();ctx.fill();
      }
    });
  }

  // ── TORSO (ribcage + abdomen) ──────────────────────────────────
  _drawTorso(x,y,C){
    const ctx=this.ctx;
    const breathScale=1+Math.sin(this.breathT*0.75)*0.013;
    ctx.save();
    ctx.translate(x+28,y+36);ctx.scale(1,breathScale);ctx.translate(-(x+28),-(y+36));

    // Abdomen (lower, wider)
    const abdG=ctx.createLinearGradient(x+6,y+36,x+52,y+58);
    abdG.addColorStop(0,C.bodyL);abdG.addColorStop(0.5,C.body);abdG.addColorStop(1,C.bodyD);
    ctx.fillStyle=abdG;
    ctx.beginPath();
    ctx.moveTo(x+8,y+54);
    ctx.bezierCurveTo(x+8,y+62,x+16,y+66,x+28,y+66);
    ctx.bezierCurveTo(x+40,y+66,x+48,y+62,x+48,y+54);
    ctx.bezierCurveTo(x+48,y+44,x+42,y+38,x+38,y+36);
    ctx.bezierCurveTo(x+30,y+34,x+18,y+34,x+12,y+36);
    ctx.bezierCurveTo(x+8,y+38,x+8,y+44,x+8,y+54);
    ctx.closePath();ctx.fill();

    // Ribcage (upper, narrower, more muscular)
    const ribG=ctx.createLinearGradient(x+12,y+14,x+50,y+42);
    ribG.addColorStop(0,C.bodyL);ribG.addColorStop(0.45,C.body);ribG.addColorStop(1,C.bodyD);
    ctx.fillStyle=ribG;
    ctx.beginPath();
    ctx.moveTo(x+12,y+38);
    ctx.bezierCurveTo(x+8,y+36,x+10,y+22,x+16,y+16);
    ctx.bezierCurveTo(x+20,y+12,x+30,y+10,x+38,y+14);
    ctx.bezierCurveTo(x+46,y+18,x+48,y+30,x+46,y+38);
    ctx.bezierCurveTo(x+40,y+36,x+20,y+36,x+12,y+38);
    ctx.closePath();ctx.fill();

    // Belly highlight
    const bellyG=ctx.createLinearGradient(x+14,y+40,x+14,y+62);
    bellyG.addColorStop(0,C.belly);bellyG.addColorStop(1,'transparent');
    ctx.fillStyle=bellyG;ctx.globalAlpha=0.55;
    ctx.beginPath();
    ctx.ellipse(x+26,y+52,14,10,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Muscle groove lines on ribcage
    ctx.strokeStyle=C.bodyD;ctx.lineWidth=0.8;ctx.globalAlpha=0.22;
    [[x+18,y+22,x+16,y+32],[x+24,y+18,x+22,y+30],[x+30,y+16,x+30,y+28]].forEach(([ax,ay,bx2,by2])=>{
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo((ax+bx2)/2-3,(ay+by2)/2,bx2,by2);ctx.stroke();
    });
    ctx.globalAlpha=1;

    for(let row=0;row<3;row++) for(let col=0;col<4;col++){
      ctx.beginPath();ctx.ellipse(x+14+col*8+(row%2)*4,y+28+row*7,3,2.2,0.18,0,Math.PI*2);ctx.fill();

      ctx.beginPath();ctx.ellipse(x+13+col*8+(row%2)*4,y+27+row*7,1.3,0.9,0.18,0,Math.PI*2);ctx.fill();

      ctx.fillStyle=spg;
      ctx.beginPath();
      ctx.moveTo(sx-2.5,sy);
      ctx.lineTo(sx+0.5,sy-spH);
      ctx.lineTo(sx+3,sy);

    ctx.beginPath();
    ctx.moveTo(x+12,y+38);
    ctx.bezierCurveTo(x+8,y+36,x+10,y+22,x+16,y+16);
    ctx.bezierCurveTo(x+20,y+12,x+30,y+10,x+38,y+14);

  }

  // ── NECK + HEAD ────────────────────────────────────────────────
  _drawNeckHead(x,y,nodDeg,C){
    const ctx=this.ctx;
    const npx=x+36, npy=y+24;
    ctx.save();
    ctx.translate(npx,npy);ctx.rotate(nodDeg*Math.PI/180);ctx.translate(-npx,-npy);

    // ── Neck ──

    const neckG=ctx.createLinearGradient(x+26,y+34,x+46,y+8);
    neckG.addColorStop(0,C.body);neckG.addColorStop(0.5,C.bodyL);neckG.addColorStop(1,C.body);
    ctx.fillStyle=neckG;
    ctx.beginPath();
    ctx.moveTo(x+24,y+34);
    ctx.bezierCurveTo(x+24,y+28,x+30,y+14,x+34,y+8);
    ctx.bezierCurveTo(x+36,y+6,x+42,y+8,x+46,y+12);
    ctx.bezierCurveTo(x+48,y+18,x+42,y+30,x+38,y+34);
    ctx.closePath();ctx.fill();
    // Neck shadow side
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.28;
    ctx.beginPath();
    ctx.moveTo(x+24,y+34);ctx.bezierCurveTo(x+24,y+28,x+28,y+16,x+32,y+10);
    ctx.bezierCurveTo(x+33,y+8,x+35,y+8,x+34,y+8);
    ctx.bezierCurveTo(x+30,y+14,x+24,y+28,x+24,y+34);
    ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // Neck muscle ridge
    ctx.strokeStyle=C.bodyL;ctx.lineWidth=1.2;ctx.globalAlpha=0.22;
    ctx.beginPath();ctx.moveTo(x+36,y+32);ctx.bezierCurveTo(x+38,y+24,x+43,y+16,x+44,y+12);ctx.stroke();
    ctx.globalAlpha=1;

    // ── Skull shape ──
    // Main cranium
    const craniumG=ctx.createLinearGradient(x+28,y-4,x+66,y+20);
    craniumG.addColorStop(0,C.bodyL);craniumG.addColorStop(0.55,C.body);craniumG.addColorStop(1,C.bodyD);
    ctx.fillStyle=craniumG;
    ctx.beginPath();
    // top arc of skull
    ctx.moveTo(x+32,y+4);
    ctx.bezierCurveTo(x+30,y-2,x+36,y-6,x+44,y-5);
    ctx.bezierCurveTo(x+52,y-4,x+58,y,x+60,y+6);
    // jaw transition
    ctx.bezierCurveTo(x+62,y+10,x+62,y+16,x+60,y+18);
    ctx.bezierCurveTo(x+56,y+22,x+44,y+22,x+34,y+20);
    // back of skull
    ctx.bezierCurveTo(x+28,y+18,x+28,y+12,x+32,y+4);
    ctx.closePath();ctx.fill();

    // ── Snout / muzzle ──
    const snoutG=ctx.createLinearGradient(x+46,y+2,x+72,y+18);
    snoutG.addColorStop(0,C.body);snoutG.addColorStop(1,C.bodyD);
    ctx.fillStyle=snoutG;
    ctx.beginPath();
    ctx.moveTo(x+52,y+1);
    ctx.bezierCurveTo(x+58,y-1,x+70,y+2,x+72,y+8);
    ctx.bezierCurveTo(x+73,y+13,x+68,y+18,x+62,y+19);
    ctx.bezierCurveTo(x+56,y+20,x+50,y+18,x+48,y+16);
    ctx.bezierCurveTo(x+46,y+13,x+47,y+5,x+52,y+1);
    ctx.closePath();ctx.fill();
    // Snout underside lighter
    ctx.fillStyle=C.belly;ctx.globalAlpha=0.42;
    ctx.beginPath();
    ctx.ellipse(x+62,y+16,9,3.5,0.1,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Subtle brow ridge
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.35;
    ctx.beginPath();
    ctx.moveTo(x+32,y+2);ctx.bezierCurveTo(x+38,y-4,x+50,y-4,x+56,y+1);ctx.stroke && null;
    ctx.ellipse(x+44,y,14,3.5,0.05,0,Math.PI,true);ctx.fill();
    ctx.globalAlpha=1;

    // ── Nostril ──
    ctx.fillStyle=C.bodyD;
    ctx.beginPath();ctx.ellipse(x+67,y+7,2.5,1.8,0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.ellipse(x+67,y+7,1.5,1,0.4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── Jaw ──
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.3;
    ctx.beginPath();
    ctx.moveTo(x+48,y+18);ctx.bezierCurveTo(x+50,y+22,x+62,y+23,x+68,y+19);
    ctx.bezierCurveTo(x+72,y+17,x+73,y+13,x+72,y+11);
    ctx.bezierCurveTo(x+71,y+14,x+68,y+19,x+62,y+21);
    ctx.bezierCurveTo(x+56,y+22,x+50,y+22,x+48,y+18);
    ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // Mouth line
    ctx.strokeStyle=C.bodyD;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(x+50,y+18);ctx.bezierCurveTo(x+58,y+20,x+66,y+20,x+70,y+17);ctx.stroke();
    // Teeth
    ctx.fillStyle='rgba(248,246,226,0.88)';
    [[x+54,y+18,2.2,3.5,0.1],[x+59,y+18.5,1.8,3,0.05],[x+64,y+18,1.6,2.8,-0.1]].forEach(([tx,ty,tw2,th,ang])=>{
      ctx.beginPath();ctx.ellipse(tx,ty,tw2,th,ang,0,Math.PI);ctx.fill();
    });

    // ── Eye socket ──
    ctx.fillStyle=C.bodyD;ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.ellipse(x+42,y+8,10,8.5,-0.1,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Eye white/sclera
    ctx.fillStyle=C.eye;
    ctx.beginPath();ctx.arc(x+42,y+7,7.5,0,Math.PI*2);ctx.fill();
    if(this.eyeOpen){
      // Iris
      const ig=ctx.createRadialGradient(x+41,y+6,0,x+42,y+7,6);
      ig.addColorStop(0,'rgba(160,255,120,0.9)');
      ig.addColorStop(0.25,C.iris);
      ig.addColorStop(0.7,'rgba(0,30,10,0.95)');
      ig.addColorStop(1,'rgba(0,20,5,1)');
      ctx.fillStyle=ig;ctx.beginPath();ctx.arc(x+42,y+7,6,0,Math.PI*2);ctx.fill();
      // Pupil
      ctx.fillStyle='#000805';
      ctx.beginPath();ctx.ellipse(x+42.5+this.eyeX,y+7,2.8,3.2,-0.1,0,Math.PI*2);ctx.fill();
      // Specular highlights
      ctx.fillStyle='rgba(255,255,255,0.96)';ctx.beginPath();ctx.arc(x+44+this.eyeX,y+5,1.8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.48)';ctx.beginPath();ctx.arc(x+40+this.eyeX,y+9.5,0.9,0,Math.PI*2);ctx.fill();
    } else {
      // Blink
      ctx.strokeStyle=C.bodyD;ctx.lineWidth=1.8;
      ctx.beginPath();ctx.moveTo(x+36,y+7);ctx.quadraticCurveTo(x+42,y+12,x+48,y+7);ctx.stroke();
    }
    // Brow ridge highlight
    ctx.strokeStyle=C.bodyL;ctx.lineWidth=1;ctx.globalAlpha=0.22;
    ctx.beginPath();ctx.moveTo(x+34,y+2);ctx.bezierCurveTo(x+38,y-2,x+46,y-2,x+52,y+2);ctx.stroke();
    ctx.globalAlpha=1;
    // Skull rim light
    ctx.strokeStyle=C.bodyL;ctx.lineWidth=1;ctx.globalAlpha=0.18;
    ctx.beginPath();
    ctx.moveTo(x+32,y+4);ctx.bezierCurveTo(x+30,y-2,x+36,y-6,x+44,y-5);
    ctx.bezierCurveTo(x+52,y-4,x+58,y,x+60,y+6);ctx.stroke();
    ctx.globalAlpha=1;

    ctx.restore();
  }

  // ── FOREARM (vestigial arm) ────────────────────────────────────
  _drawForearm(ax,ay,swingDeg,C){
    const ctx=this.ctx;
