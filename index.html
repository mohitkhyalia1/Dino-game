  // ── ARTICULATED LEG ───────────────────────────────────────────
  _drawLegArticulated(x,hipY,phase,C,isBack){
    const ctx=this.ctx;
    const hipX=isBack?x+22:x+34;
    const p=phase*Math.PI*2;

    // Three-segment IK-style leg
    const thighAng = Math.sin(p)*30 * (isBack?0.85:1);
    const shinBend  = Math.max(0, Math.sin(p+Math.PI*0.6))*48;
    const ankleAng  = -thighAng*0.3 + shinBend*0.22;
    const toeAng    = -shinBend*0.15 + (this.onGround?8:0);

    const thighL=22, shinL=19, footL=14;

    ctx.save();
    if(isBack) ctx.globalAlpha=0.6;
    ctx.translate(hipX,hipY);

    // ── Thigh ──
    ctx.save();ctx.rotate(thighAng*Math.PI/180);
    const thighG=ctx.createLinearGradient(isBack?-5:-7,0,isBack?5:7,thighL);
    thighG.addColorStop(0,isBack?C.bodyD:C.bodyL);
    thighG.addColorStop(0.5,C.body);
    thighG.addColorStop(1,isBack?C.bodyD:C.bodyD);
    ctx.fillStyle=thighG;
    ctx.beginPath();
    ctx.moveTo(-(isBack?4.5:6.5),0);
    ctx.bezierCurveTo(-(isBack?5:7),thighL*0.3,-(isBack?4:5.5),thighL*0.7,-(isBack?3.5:4.5),thighL);
    ctx.bezierCurveTo(-(isBack?1:2),thighL+1,(isBack?1:2.5),thighL+1,(isBack?3.5:5),thighL);
    ctx.bezierCurveTo((isBack?4.5:6),thighL*0.7,(isBack?5.5:7),thighL*0.3,(isBack?5:7),0);
    ctx.closePath();ctx.fill();
    // Thigh muscle line
    ctx.strokeStyle=C.bodyL;ctx.lineWidth=0.9;ctx.globalAlpha=isBack?0.1:0.22;
    ctx.beginPath();ctx.moveTo(isBack?1:2,2);ctx.bezierCurveTo(isBack?1:3,thighL*0.4,isBack?2:4,thighL*0.7,isBack?2:3,thighL-2);ctx.stroke();
    ctx.globalAlpha=isBack?0.6:1;

    // ── Knee joint ──
    const kneG=ctx.createRadialGradient(0,thighL,0,0,thighL,isBack?4:5.5);
    kneG.addColorStop(0,C.bodyL);kneG.addColorStop(1,C.bodyD);
    ctx.fillStyle=kneG;ctx.beginPath();ctx.arc(0,thighL,isBack?4:5,0,Math.PI*2);ctx.fill();

    ctx.translate(0,thighL);

    // ── Shin ──
    ctx.save();ctx.rotate(shinBend*Math.PI/180);
    const shinG=ctx.createLinearGradient(isBack?-4:-5.5,0,isBack?4:5.5,shinL);
    shinG.addColorStop(0,isBack?C.bodyD:C.body);
    shinG.addColorStop(1,isBack?C.bodyD:C.bodyD);
    ctx.fillStyle=shinG;
    ctx.beginPath();
    ctx.moveTo(-(isBack?3.8:5),0);
    ctx.bezierCurveTo(-(isBack?4.2:5.5),shinL*0.4,-(isBack?3:4),shinL*0.75,-(isBack?2.8:3.5),shinL);
    ctx.bezierCurveTo(-(isBack?0.5:1),shinL+1,(isBack?1.5:3),shinL+1,(isBack?3.5:4.5),shinL);
    ctx.bezierCurveTo((isBack?4:5.2),shinL*0.75,(isBack?4.2:5.5),shinL*0.4,(isBack?3.8:5),0);
    ctx.closePath();ctx.fill();

    // ── Ankle joint ──
    ctx.fillStyle=C.bodyD;ctx.beginPath();ctx.arc(0,shinL,isBack?3:4,0,Math.PI*2);ctx.fill();
    ctx.translate(0,shinL);

    // ── Foot ──
    ctx.save();ctx.rotate(ankleAng*Math.PI/180);
    const footG=ctx.createLinearGradient(0,0,footL+4,6);
    footG.addColorStop(0,C.body);footG.addColorStop(1,C.bodyD);
    ctx.fillStyle=footG;
    ctx.beginPath();
    ctx.moveTo(-2,-1);
    ctx.bezierCurveTo(2,-4,footL+2,-2,footL+5,1);
    ctx.bezierCurveTo(footL+6,4,footL+4,7,footL+1,7);
    ctx.bezierCurveTo(footL-2,8,2,6,-2,4);
    ctx.bezierCurveTo(-4,3,-4,1,-2,-1);
    ctx.closePath();ctx.fill();
    // Ankle scale
    ctx.fillStyle=C.bodyL;ctx.globalAlpha=isBack?0.15:0.28;
    ctx.beginPath();ctx.ellipse(4,2,4,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=isBack?0.6:1;
    // Claws
    ctx.fillStyle=C.claw;
    [2,footL*0.45,footL*0.88].forEach((tx,ci)=>{
      ctx.beginPath();ctx.moveTo(tx,5);ctx.lineTo(tx-2.5,12);ctx.lineTo(tx+3.5,9.5);ctx.closePath();ctx.fill();
      // Claw highlight
      ctx.fillStyle=C.body;ctx.globalAlpha=isBack?0.12:0.25;
      ctx.beginPath();ctx.moveTo(tx,5);ctx.lineTo(tx-1,8);ctx.lineTo(tx+1,7.5);ctx.closePath();ctx.fill();
      ctx.fillStyle=C.claw;ctx.globalAlpha=isBack?0.6:1;
    });
    ctx.restore(); // foot
    ctx.restore(); // shin
    ctx.restore(); // thigh
    ctx.restore(); // leg
  }

  // ── DUCK POSE ─────────────────────────────────────────────────
  _drawDuck(C){
    const ctx=this.ctx,x=this.x,y=this.y,t=this.cycle;

    // Duck silhouette - proper crouching body
    const bg=ctx.createLinearGradient(x+2,y+2,x+DUCK_W-2,y+DUCK_H-2);
    bg.addColorStop(0,C.bodyL);bg.addColorStop(0.5,C.body);bg.addColorStop(1,C.bodyD);
    ctx.fillStyle=bg;
    ctx.beginPath();
    // Low crouching body shape
    ctx.moveTo(x+10,y+DUCK_H-2);
    ctx.bezierCurveTo(x+4,y+DUCK_H,x+2,y+DUCK_H-6,x+2,y+DUCK_H-10);
    ctx.bezierCurveTo(x+2,y+DUCK_H-18,x+6,y+DUCK_H-26,x+10,y+DUCK_H-28);
    ctx.bezierCurveTo(x+14,y+2,x+28,y+0,x+40,y+2);
    ctx.bezierCurveTo(x+54,y+4,x+DUCK_W-2,y+10,x+DUCK_W-2,y+DUCK_H-14);
    ctx.bezierCurveTo(x+DUCK_W-2,y+DUCK_H-6,x+DUCK_W-6,y+DUCK_H,x+DUCK_W-10,y+DUCK_H-2);
    ctx.closePath();ctx.fill();

    // Belly
    const bellyG=ctx.createRadialGradient(x+38,y+DUCK_H*0.55,1,x+38,y+DUCK_H*0.55,16);
    bellyG.addColorStop(0,C.belly);bellyG.addColorStop(1,'transparent');
    ctx.fillStyle=bellyG;ctx.globalAlpha=0.52;
    ctx.beginPath();ctx.ellipse(x+38,y+DUCK_H*0.55,18,9,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Scale row
    ctx.fillStyle=C.scale;ctx.globalAlpha=0.75;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(x+14+i*11,y+12,3,2,0.15,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;
    // Dorsal spines (flat, tucked)
    ctx.fillStyle=C.bodyD;
    for(let i=0;i<4;i++){
      ctx.beginPath();ctx.ellipse(x+20+i*10,y+3,2.2,4,-0.12,0,Math.PI*2);ctx.fill();
    }

    // Duck tail (tucked)
    const hx=x+4;
    ctx.save();
    ctx.translate(hx,y+DUCK_H*0.35);
    const tdG=ctx.createLinearGradient(-6,0,0,12);
    tdG.addColorStop(0,C.body);tdG.addColorStop(1,C.bodyD);
    ctx.fillStyle=tdG;
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-8,4,-16,10,-14,18);ctx.bezierCurveTo(-8,12,-2,6,0,0);ctx.closePath();ctx.fill();
    ctx.restore();

    // Head (low forward position)
    const headX=x+DUCK_W-34;
    const hg2=ctx.createLinearGradient(headX,y-4,headX+32,y+18);
    hg2.addColorStop(0,C.bodyL);hg2.addColorStop(0.55,C.body);hg2.addColorStop(1,C.bodyD);
    ctx.fillStyle=hg2;
    ctx.beginPath();
    ctx.moveTo(headX+4,y+2);
    ctx.bezierCurveTo(headX+2,y-4,headX+10,y-6,headX+18,y-4);
    ctx.bezierCurveTo(headX+26,y-2,headX+30,y+4,headX+30,y+10);
    ctx.bezierCurveTo(headX+30,y+16,headX+24,y+19,headX+16,y+19);
    ctx.bezierCurveTo(headX+8,y+18,headX+2,y+12,headX+4,y+2);
    ctx.closePath();ctx.fill();
    // Duck head snout
    ctx.fillStyle=C.body;
    ctx.beginPath();
    ctx.moveTo(headX+22,y+2);ctx.bezierCurveTo(headX+28,y,headX+36,y+4,headX+36,y+9);
    ctx.bezierCurveTo(headX+36,y+13,headX+30,y+15,headX+24,y+14);ctx.bezierCurveTo(headX+20,y+13,headX+20,y+8,headX+22,y+2);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=C.bodyD;ctx.beginPath();ctx.ellipse(headX+33,y+6,1.8,1.2,0.3,0,Math.PI*2);ctx.fill();
    // Duck mouth
    ctx.strokeStyle=C.bodyD;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(headX+24,y+13);ctx.quadraticCurveTo(headX+30,y+14,headX+35,y+11);ctx.stroke();

    // Eye
    ctx.fillStyle=C.eye;ctx.beginPath();ctx.arc(headX+11,y+7,7,0,Math.PI*2);ctx.fill();
    if(this.eyeOpen){
      const ig=ctx.createRadialGradient(headX+10,y+6,0,headX+11,y+7,5.5);
      ig.addColorStop(0,'rgba(160,255,120,0.9)');ig.addColorStop(0.3,C.iris);ig.addColorStop(1,'rgba(0,25,8,1)');
      ctx.fillStyle=ig;ctx.beginPath();ctx.arc(headX+11,y+7,5.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000605';ctx.beginPath();ctx.ellipse(headX+11.5,y+7,2.5,3,-0.1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.94)';ctx.beginPath();ctx.arc(headX+13,y+5,1.6,0,Math.PI*2);ctx.fill();
    }

    // Duck legs (crouched bent position)
    const dHip=y+DUCK_H-2;
    this._drawLegArticulated(x+18,dHip,(t+0.5)%1,C,true);
    this._drawLegArticulated(x+30,dHip,t,C,false);
  }
}

// ═══════════════════════════════════════════════════════════════
//  CACTUS  — Organic procedural generation, no rectangles
// ═══════════════════════════════════════════════════════════════
class Cactus {
  constructor(x,ctx,variant,isNight){
    this.x=x;this.ctx=ctx;this.dead=false;this.isNight=isNight;
    const configs=[
      {w:28,h:60,arms:0},   // single tall trunk
      {w:52,h:66,arms:1},   // one arm
      {w:74,h:72,arms:2},   // two arms
    ];
    const cfg=configs[Math.min(variant,2)];
    this.width=cfg.w; this.height=cfg.h;
    this.y=GY-this.height;
    // Procedural geometry seed
    this.seed=Math.random()*1000;
    this.armCount=cfg.arms;
    this._buildGeometry();
  }

  _rng(n){return Math.abs(Math.sin(this.seed+n)*43758.5453)%1}

  _buildGeometry(){
    // Main trunk profile points (left and right silhouette with natural variation)
    const h=this.height, w=10+this._rng(0)*4;
    const baseW=w+2+this._rng(1)*3; // slightly wider at base
    const segments=8;
    this.trunkPts={left:[],right:[]};
    for(let i=0;i<=segments;i++){
      const t=i/segments;
      const y=GY-h*(1-t);
      // Width tapers toward top with slight organic wobble
      const halfW=lerp(baseW,w*0.45,t)*(1+this._rng(i+10)*0.12-0.06);
      // Add imperfection bumps
      const bumpL=this._rng(i+20)*2.5*(1-t);
      const bumpR=this._rng(i+30)*2.5*(1-t);
      this.trunkPts.left.push({x:-halfW-bumpL, y:y-GY});
      this.trunkPts.right.push({x:halfW+bumpR, y:y-GY});
    }

    // Ridges (vertical ribs)
    this.ridges=[];
    const ridgeCount=6+Math.floor(this._rng(5)*3);
    for(let r=0;r<ridgeCount;r++){
      const xOff=(r/(ridgeCount-1)-0.5)*(w*2+2);
      this.ridges.push({x:xOff, depth:0.5+this._rng(r+40)*0.5});
    }

    // Arms
    this.arms=[];
    const armSides=this.armCount>=2?[-1,1]:this.armCount===1?[this._rng(8)>0.5?-1:1]:[];
    armSides.forEach((side,ai)=>{
      const attachT=0.35+this._rng(ai+50)*0.25; // 35-60% up the trunk
      const armH=h*(0.22+this._rng(ai+60)*0.18);
      const armW=w*0.62+this._rng(ai+70)*3;
      const bendX=side*(22+this._rng(ai+80)*14); // how far the arm extends
      const elbowT=0.55+this._rng(ai+90)*0.2; // where arm bends
      // Generate arm profile
      const armPts={left:[],right:[]};
      const armSegs=6;
      for(let i=0;i<=armSegs;i++){
        const t=i/armSegs;
        const hw=lerp(armW,armW*0.35,t)*(1+this._rng(ai*10+i+100)*0.1-0.05);
        let ax,ay;
        if(t<=elbowT){
          // going sideways
          ax=side*lerp(0,bendX,t/elbowT);
          ay=-lerp(0,4,t/elbowT); // slight droop then rise
        } else {
          // going up
          const tt=(t-elbowT)/(1-elbowT);
          ax=lerp(side*bendX,side*(bendX-3),tt);
          ay=-lerp(4,-armH,tt);
        }
        armPts.left.push({x:ax-hw,y:ay});
        armPts.right.push({x:ax+hw,y:ay});
      }
      this.arms.push({side,attachT,armPts,armH,armW,bendX,elbowT,ridgeCount:4+Math.floor(this._rng(ai+110)*2)});
    });

    // Spines (clusters at ridges)
    this.spines=[];
    for(let r=0;r<this.ridges.length;r+=2){
      const spineCount=4+Math.floor(this._rng(r+200)*4);
      for(let s=0;s<spineCount;s++){
        const t=(s+0.3)/(spineCount-0.4);
        const y=(GY-h*(1-t))-GY;
        const side=r%4<2?-1:1;
        const halfW=lerp(baseW,w*0.45,t)+this._rng(r+s+300)*1.5;
        this.spines.push({
          x:side*(halfW+1)+this.ridges[r].x*0.3,
          y,
          angle:side*(-(0.3+this._rng(r+s+400)*0.5)),
          length:3.5+this._rng(r+s+500)*5,
        });
      }
    }
  }

  update(dt,speed){this.x-=speed*dt;if(this.x+this.width<-80)this.dead=true}
  get hitbox(){return{x:this.x+5,y:this.y+4,w:this.width-10,h:this.height-4}}

  draw(){
    const ctx=this.ctx, n=this.isNight;
    const cx=this.x+this.width/2; // center X
    const main=n?'#1e5a8a':'#226020';
    const light=n?'#4898c8':'#3e8832';
    const dark=n?'#0c2e4a':'#142e10';
    const highlight=n?'#72b8e0':'#70c450';

    // ── Ground shadow ──
    const shadowW=this.width*0.85+6;
    const sg=ctx.createRadialGradient(cx,GY+2,0,cx,GY+2,shadowW*0.72);
    sg.addColorStop(0,n?'rgba(4,12,40,0.35)':'rgba(0,0,0,0.30)');
    sg.addColorStop(0.65,n?'rgba(4,12,40,0.14)':'rgba(0,0,0,0.12)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(cx,GY+3,shadowW,5.5,0,0,Math.PI*2);ctx.fill();

    // ── Cast shadow (long, angled leftward from sun) ──
    if(!n){
      ctx.save();ctx.globalAlpha=0.09;
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.moveTo(cx-8,GY);ctx.lineTo(cx+8,GY);
      ctx.lineTo(cx+8-this.height*0.6,GY+10);
      ctx.lineTo(cx-8-this.height*0.6,GY+10);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }

    // ── Soil embed at base ──
    ctx.fillStyle=n?'rgba(8,18,36,0.5)':'rgba(36,20,6,0.42)';
    ctx.beginPath();ctx.ellipse(cx,GY,12,4,0,0,Math.PI*2);ctx.fill();

    // Draw arms (behind trunk)
    this.arms.forEach((arm,ai)=>{
      if(arm.side<0) this._drawArm(ctx,cx,arm,main,light,dark,highlight,n);
    });

    // ── Main trunk ──
    this._drawTrunk(ctx,cx,main,light,dark,highlight,n,this.trunkPts,this.ridges,0,this.height);

    // Draw arms (in front of trunk for right side)
    this.arms.forEach((arm,ai)=>{
      if(arm.side>0) this._drawArm(ctx,cx,arm,main,light,dark,highlight,n);
    });

    // ── Spines ──
    ctx.save();
    ctx.strokeStyle=n?'rgba(180,210,240,0.75)':'rgba(230,240,200,0.8)';
    ctx.lineWidth=0.7;
    this.spines.forEach(sp=>{
      const wx=cx+sp.x, wy=GY+sp.y;
      ctx.save();ctx.translate(wx,wy);ctx.rotate(sp.angle);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sp.length,0);ctx.stroke();
      // spine tip dot
      ctx.fillStyle=n?'rgba(180,210,240,0.5)':'rgba(240,248,210,0.6)';
      ctx.beginPath();ctx.arc(sp.length,0,0.7,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    ctx.restore();

    // ── Top cap (rounded crown) ──
    const topG=ctx.createRadialGradient(cx-2,GY-this.height+4,1,cx,GY-this.height+6,9);
    topG.addColorStop(0,highlight);topG.addColorStop(0.5,light);topG.addColorStop(1,main);
    ctx.fillStyle=topG;
    ctx.beginPath();ctx.ellipse(cx,GY-this.height+5,7,6,0,0,Math.PI*2);ctx.fill();
  }

  _drawTrunk(ctx,cx,main,light,dark,highlight,n,pts,ridges,yOff,h){
    const leftPts=pts.left, rightPts=pts.right;
    // Main body gradient (lit from upper right)
    const bodyG=ctx.createLinearGradient(cx-14,GY-h,cx+14,GY);
    bodyG.addColorStop(0,light);bodyG.addColorStop(0.3,main);bodyG.addColorStop(0.7,main);bodyG.addColorStop(1,dark);
    ctx.fillStyle=bodyG;
    // Build silhouette from profile points
    ctx.beginPath();
    ctx.moveTo(cx+leftPts[0].x, GY+leftPts[0].y+yOff);
    leftPts.forEach((p,i)=>{
      if(i>0){
        const prev=leftPts[i-1];
        const mx=(prev.x+p.x)/2, my=(prev.y+p.y)/2;
        ctx.quadraticCurveTo(cx+prev.x,GY+prev.y+yOff,cx+mx,GY+my+yOff);
      }
    });
    ctx.lineTo(cx+leftPts[leftPts.length-1].x,GY+leftPts[leftPts.length-1].y+yOff);
    // right side reversed
    for(let i=rightPts.length-1;i>=0;i--){
      const p=rightPts[i];
      if(i<rightPts.length-1){
        const next=rightPts[i+1];
        const mx=(next.x+p.x)/2, my=(next.y+p.y)/2;
        ctx.quadraticCurveTo(cx+next.x,GY+next.y+yOff,cx+mx,GY+my+yOff);
      }
    }
    ctx.closePath();ctx.fill();

    // Shadow face (right side darker)
    const shadowG=ctx.createLinearGradient(cx,GY-h,cx+16,GY);
    shadowG.addColorStop(0,'transparent');shadowG.addColorStop(0.5,dark+'88');shadowG.addColorStop(1,dark);
    ctx.fillStyle=shadowG;
    ctx.beginPath();
    const midPts=leftPts.map((p,i)=>({x:(p.x+rightPts[i].x)/2+(rightPts[i].x-p.x)*0.05, y:p.y}));
    ctx.moveTo(cx+midPts[0].x,GY+midPts[0].y+yOff);
    midPts.forEach((p,i)=>{if(i>0) ctx.lineTo(cx+p.x,GY+p.y+yOff);});
    rightPts.slice().reverse().forEach(p=>ctx.lineTo(cx+p.x,GY+p.y+yOff));
    ctx.closePath();ctx.fill();

    // Vertical ridge grooves
    ctx.strokeStyle=dark; ctx.lineWidth=0.6; ctx.globalAlpha=0.25;
    ridges.forEach(r=>{
      const rx=cx+r.x;
      // Clip-style groove from base to near top
      ctx.beginPath();
      ctx.moveTo(rx,GY+yOff);
      ctx.bezierCurveTo(rx+r.depth,GY-h*0.25+yOff,rx-r.depth,GY-h*0.55+yOff,rx,GY-h*0.88+yOff);
      ctx.stroke();
    });
    ctx.globalAlpha=1;

    // Scars/damage patches
    for(let s=0;s<2;s++){
      const sy=GY-(this._rng(s+600)*0.7+0.15)*h+yOff;
      const sx=cx+(this._rng(s+610)-0.5)*14;
      ctx.fillStyle=n?'rgba(8,30,55,0.22)':'rgba(10,28,8,0.18)';
      ctx.beginPath();ctx.ellipse(sx,sy,5+this._rng(s+620)*4,2.5+this._rng(s+630)*2,this._rng(s+640)*0.6-0.3,0,Math.PI*2);ctx.fill();
    }

    // Highlight stripe (lit edge)
    ctx.strokeStyle=highlight; ctx.lineWidth=1.4; ctx.globalAlpha=0.22;
    ctx.beginPath();
    leftPts.forEach((p,i)=>{
      const x2=cx+p.x+3, y2=GY+p.y+yOff;
      if(i===0) ctx.moveTo(x2,y2); else ctx.lineTo(x2,y2);
    });
    ctx.stroke();
    ctx.globalAlpha=1;
  }

  _drawArm(ctx,cx,arm,main,light,dark,highlight,n){
    const aY=GY-(arm.attachT)*this.height;
    const pts=arm.armPts;
    const lp=pts.left, rp=pts.right;

    // Arm body
    const armG=ctx.createLinearGradient(cx+arm.side*arm.bendX*0.3,aY-4,cx+arm.side*arm.bendX,aY-arm.armH);
    armG.addColorStop(0,main);armG.addColorStop(0.4,light);armG.addColorStop(1,main);
    ctx.fillStyle=armG;
    ctx.beginPath();
    ctx.moveTo(cx+lp[0].x,aY+lp[0].y);
    lp.forEach((p,i)=>{if(i>0) ctx.lineTo(cx+p.x,aY+p.y);});
    ctx.lineTo(cx+rp[rp.length-1].x,aY+rp[rp.length-1].y);
    for(let i=rp.length-1;i>=0;i--) ctx.lineTo(cx+rp[i].x,aY+rp[i].y);
    ctx.closePath();ctx.fill();

    // Arm shadow
    const shadG=ctx.createLinearGradient(cx,aY,cx+arm.side*arm.bendX,aY-arm.armH*0.5);
    shadG.addColorStop(0,dark+'60');shadG.addColorStop(1,'transparent');
    ctx.fillStyle=shadG;
    ctx.beginPath();
    const midL=lp.map((p,i)=>({x:(p.x+rp[i].x)/2+rp[i].x*0.08,y:p.y}));
    ctx.moveTo(cx+midL[0].x,aY+midL[0].y);
    midL.forEach((p,i)=>{if(i>0)ctx.lineTo(cx+p.x,aY+p.y);});
    for(let i=rp.length-1;i>=0;i--)ctx.lineTo(cx+rp[i].x,aY+rp[i].y);
    ctx.closePath();ctx.fill();

    // Arm ridges
    ctx.strokeStyle=dark;ctx.lineWidth=0.5;ctx.globalAlpha=0.22;
    for(let r=0;r<arm.ridgeCount;r++){
      const t=(r+0.5)/arm.ridgeCount;
      const ax=cx+lerp(lp[0].x,lp[lp.length-1].x,t);
      const ay=aY+lerp(0,lp[lp.length-1].y,t);
      ctx.beginPath();ctx.moveTo(ax,ay-6);ctx.lineTo(ax,ay+6);ctx.stroke();
    }
    ctx.globalAlpha=1;

    // Arm top cap
    const tipX=cx+lp[lp.length-1].x+(rp[rp.length-1].x-lp[lp.length-1].x)*0.5;
    const tipY=aY+lp[lp.length-1].y;
    const armCapG=ctx.createRadialGradient(tipX-1,tipY-2,0,tipX,tipY,5);
    armCapG.addColorStop(0,highlight);armCapG.addColorStop(1,main);
    ctx.fillStyle=armCapG;
    ctx.beginPath();ctx.ellipse(tipX,tipY,4.5,4,0,0,Math.PI*2);ctx.fill();

    // Arm spines
    ctx.strokeStyle=n?'rgba(180,210,240,0.7)':'rgba(230,240,200,0.75)';ctx.lineWidth=0.65;
    for(let s=0;s<5;s++){
      const t=(s+0.5)/5;
      const ax=cx+lerp(lp[0].x,lp[lp.length-1].x,t);
      const ay=aY+lerp(lp[0].y,lp[lp.length-1].y,t);
      const aw=lerp(lp[0].x-rp[0].x,lp[lp.length-1].x-rp[lp.length-1].x,t)*0.5;
      const sideSign=s%2===0?-1:1;
      ctx.beginPath();ctx.moveTo(ax+aw*0.5*sideSign,ay);ctx.lineTo(ax+aw*0.5*sideSign+sideSign*4.5,ay-2);ctx.stroke();
    }
  }

  _rr(x,y,w,h,r){
    const ctx=this.ctx;r=Math.min(r,w/2,h/2);
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  }
}

// ═══════════════════════════════════════════════════════════════
//  BIRD  — Realistic anatomy: wing-bone structure, primary/secondary feathers
// ═══════════════════════════════════════════════════════════════
class Bird {
  constructor(x,ctx,level,isNight){
    this.x=x;this.ctx=ctx;this.dead=false;this.isNight=isNight;
    this.width=64;this.height=34;
    const hs=[GY-DUCK_H-16,GY-DINO_H-24,GY-DINO_H-94];
    this.y=hs[Math.min(level,2)];
    this.wc=Math.random(); // wing cycle
    this.bodyBob=Math.random()*Math.PI*2;
    this.tailWag=Math.random()*Math.PI*2;
    this.eyeBlink=0;
  }
  update(dt,speed){
    this.x-=speed*dt;if(this.x+this.width<-80)this.dead=true;
    this.wc=(this.wc+3.2*dt)%1;
    this.bodyBob+=dt*2.4;
    this.tailWag+=dt*3.8;
    this.eyeBlink+=dt;
    if(this.eyeBlink>4.2) this.eyeBlink=0;
  }
  get hitbox(){return{x:this.x+8,y:this.y+5,w:this.width-16,h:this.height-10}}

  draw(){
    const ctx=this.ctx, n=this.isNight;
    // Color palette
    const body =n?'#3a6ea0':'#4a3020';
    const bodyL=n?'#6898c8':'#6e5030';
    const bodyD=n?'#1e4070':'#281408';
    const wing =n?'#2e5888':'#3c2416';
    const wingL=n?'#5a88c0':'#584030';
    const beak ='#d8a020';
    const beakD='#a07010';
    const cx=this.x+this.width/2;
    const cy=this.y+this.height/2+3+Math.sin(this.bodyBob)*2.2;

    // Wing flap angle — full sine cycle, maps to anatomically plausible range
    const flapT=this.wc*Math.PI*2;
    const flapAngle=Math.sin(flapT)*0.72; // radians, -0.72 to 0.72

    // ── Ground shadow ──
    const altFactor=clamp(1-(this.y+DINO_H*0.5-GY+120)/200,0,1);
    const bSW=26*(0.5+altFactor*0.5);
    const bsg=ctx.createRadialGradient(cx,GY+3,0,cx,GY+3,bSW+6);
    bsg.addColorStop(0,n?`rgba(4,16,50,${0.20*altFactor})`:`rgba(0,0,0,${0.18*altFactor})`);
    bsg.addColorStop(1,'transparent');
    ctx.fillStyle=bsg;ctx.beginPath();ctx.ellipse(cx,GY+3,bSW+6,4,0,0,Math.PI*2);ctx.fill();

    ctx.save();ctx.translate(cx,cy);

    // ── BACK WING (behind body, slightly smaller, lower alpha) ──
    ctx.save();ctx.globalAlpha=0.62;
    this._drawWing(ctx,flapAngle+0.15,1,wing,wingL,bodyD,n,true);
    ctx.restore();

    // ── BODY ──
    // Torso - egg shaped, wider at chest
    const bodyG=ctx.createLinearGradient(-16,-9,16,9);
    bodyG.addColorStop(0,bodyL);bodyG.addColorStop(0.45,body);bodyG.addColorStop(1,bodyD);
    ctx.fillStyle=bodyG;
    ctx.beginPath();
    ctx.moveTo(-12,0);
    ctx.bezierCurveTo(-14,-9,-4,-12,5,-10);
    ctx.bezierCurveTo(14,-8,17,-2,16,4);
    ctx.bezierCurveTo(15,10,8,12,-2,11);
    ctx.bezierCurveTo(-10,10,-12,6,-12,0);
    ctx.closePath();ctx.fill();
    // Chest highlight
    ctx.fillStyle=bodyL;ctx.globalAlpha=0.32;
    ctx.beginPath();ctx.ellipse(3,-5,7,4.5,0.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Wing shoulder bump
    ctx.fillStyle=bodyD;ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.ellipse(-5,-7,5,3.5,-0.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── TAIL FEATHERS ──
    const tailWagAngle=Math.sin(this.tailWag)*0.12;
    ctx.save();ctx.rotate(tailWagAngle);
    // Primary tail fan
    const tailColors=[bodyD,wing,bodyD,body];
    for(let f=0;f<4;f++){
      const fa=(f-1.5)*0.14;
      const fl=12+f*0.8;
      ctx.save();ctx.rotate(fa);
      const tfG=ctx.createLinearGradient(-14,-2,-14-fl,4+f);
      tfG.addColorStop(0,body);tfG.addColorStop(1,tailColors[f]);
      ctx.fillStyle=tfG;
      ctx.beginPath();
      ctx.moveTo(-12,1);
      ctx.bezierCurveTo(-12-fl*0.4,2-f*0.5,-12-fl*0.8,3+f*0.3,-12-fl,2+f*0.8);
      ctx.bezierCurveTo(-12-fl*0.8,3.5+f,-12-fl*0.4,3,- 12,2);
      ctx.closePath();ctx.fill();
      // Feather shaft
      ctx.strokeStyle=bodyD;ctx.lineWidth=0.5;ctx.globalAlpha=0.35;
      ctx.beginPath();ctx.moveTo(-12,1.5);ctx.lineTo(-12-fl*0.9,2.5+f*0.6);ctx.stroke();
      ctx.globalAlpha=1;
      ctx.restore();
    }
    ctx.restore();

    // ── NECK / HEAD ──
    // Neck
    const neckG=ctx.createLinearGradient(8,-8,18,-18);
    neckG.addColorStop(0,body);neckG.addColorStop(1,bodyL);
    ctx.fillStyle=neckG;
    ctx.beginPath();
    ctx.moveTo(9,-7);
    ctx.bezierCurveTo(10,-12,14,-18,18,-20);
    ctx.bezierCurveTo(22,-22,25,-18,22,-14);
    ctx.bezierCurveTo(20,-10,14,-8,11,-6);
    ctx.closePath();ctx.fill();

    // Skull / head
    const headG=ctx.createRadialGradient(18,-21,0,18,-20,10);
    headG.addColorStop(0,bodyL);headG.addColorStop(0.5,body);headG.addColorStop(1,bodyD);
    ctx.fillStyle=headG;
    ctx.beginPath();
    ctx.moveTo(12,-16);
    ctx.bezierCurveTo(10,-24,18,-28,26,-24);
    ctx.bezierCurveTo(32,-20,30,-14,26,-12);
    ctx.bezierCurveTo(22,-10,14,-12,12,-16);
    ctx.closePath();ctx.fill();
    // Head highlight
    ctx.fillStyle=bodyL;ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.ellipse(19,-22,5.5,3.5,0.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // ── BEAK ──
    // Upper mandible
    ctx.fillStyle=beak;
    ctx.beginPath();
    ctx.moveTo(25,-16);ctx.bezierCurveTo(30,-16,38,-14,38,-12);
    ctx.bezierCurveTo(38,-10,31,-11,25,-14);ctx.closePath();ctx.fill();
    // Lower mandible
    ctx.fillStyle=beakD;
    ctx.beginPath();
    ctx.moveTo(25,-14);ctx.bezierCurveTo(30,-14,36,-12,37,-11);
    ctx.bezierCurveTo(36,-9,29,-10,25,-12);ctx.closePath();ctx.fill();
    // Beak ridge line
    ctx.strokeStyle=beakD;ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(25,-14);ctx.lineTo(37,-12);ctx.stroke();
    // Mouth crease
    ctx.strokeStyle=bodyD;ctx.lineWidth=0.8;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.moveTo(25,-14);ctx.lineTo(34,-13);ctx.stroke();
    ctx.globalAlpha=1;

    // ── EYE ──
    const eyeOpen=this.eyeBlink<3.8||this.eyeBlink>4.1;
    ctx.fillStyle='rgba(240,235,210,0.95)';
    ctx.beginPath();ctx.ellipse(20,-20,4,3.2,0.1,0,Math.PI*2);ctx.fill();
    if(eyeOpen){
      // Iris
      const eyeG=ctx.createRadialGradient(19.5,-20.5,0,20,-20,3);
      eyeG.addColorStop(0,n?'rgba(30,100,200,0.95)':'rgba(60,30,8,0.95)');
      eyeG.addColorStop(0.6,n?'rgba(10,50,120,1)':'rgba(25,12,4,1)');
      eyeG.addColorStop(1,'rgba(0,0,0,1)');
      ctx.fillStyle=eyeG;ctx.beginPath();ctx.ellipse(20,-20,3,2.5,0.1,0,Math.PI*2);ctx.fill();
      // Pupil
      ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(20.5,-20,1.5,1.8,0.1,0,Math.PI*2);ctx.fill();
      // Specular
      ctx.fillStyle='rgba(255,255,255,0.95)';ctx.beginPath();ctx.arc(21.5,-21.5,1.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(19,-19.5,0.6,0,Math.PI*2);ctx.fill();
    } else {
      ctx.strokeStyle=bodyD;ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(17,-20);ctx.quadraticCurveTo(20,-17.5,23,-20);ctx.stroke();
    }
    // Eye ring
    ctx.strokeStyle=bodyD;ctx.lineWidth=0.8;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.ellipse(20,-20,4,3.2,0.1,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;

    // ── FRONT WING (on top of body) ──
    this._drawWing(ctx,flapAngle,1,wing,wingL,bodyD,n,false);

    // ── FEET ──
    const flapAmt=Math.abs(Math.sin(flapT));
    const footDrop=4+flapAmt*5;
    ctx.strokeStyle=beak;ctx.lineWidth=1.4;
    [[2,8],[10,8]].forEach(([fx,fy])=>{
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx,fy+footDrop);ctx.stroke();
      // Toes
      [[-3,2],[0,3],[3,2]].forEach(([tx,ty])=>{
        ctx.beginPath();ctx.moveTo(fx,fy+footDrop);ctx.lineTo(fx+tx,fy+footDrop+ty);ctx.stroke();
      });
    });

    ctx.restore();
  }

  _drawWing(ctx,angle,dir,wing,wingL,wingD,n,isBack){
    ctx.save();
    ctx.rotate(angle * dir);

    // Humerus line (upper arm bone direction)
    const humerusL=18;
    const radiusL=15;
    const handL=10;

    // Approximate anatomical wing positions
    const hx2=-2+humerusL*Math.cos(-0.35);
    const hy2=-7+humerusL*Math.sin(-0.35);
    const rx2=hx2+radiusL*Math.cos(0.5+angle*0.3);
    const ry2=hy2+radiusL*Math.sin(0.5+angle*0.3);

    // Secondary feathers (arm coverts)
    const secCount=7;
    for(let f=0;f<secCount;f++){
      const t=f/(secCount-1);
      const sx=lerp(-2,hx2,t), sy=lerp(-7,hy2,t);
      const nx=lerp(hx2,rx2,t)-sx, ny=lerp(hy2,ry2,t)-sy;
      const len=Math.sqrt(nx*nx+ny*ny)||1;
      const perpX=-ny/len, perpY=nx/len;
      const fLen=10+Math.sin(t*Math.PI)*4;
      const fAngle=-0.5+angle*0.15;
      const wG=ctx.createLinearGradient(sx,sy,sx+perpX*fLen*0.8,sy+perpY*fLen*0.8);
      wG.addColorStop(0,t<0.5?wingL:wing);wG.addColorStop(1,wingD);
      ctx.fillStyle=wG;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.bezierCurveTo(
        sx+perpX*fLen*0.3-nx/len*2,sy+perpY*fLen*0.3-ny/len*2,
        sx+perpX*fLen*0.8,sy+perpY*fLen*0.8,
        sx+perpX*fLen,sy+perpY*fLen
      );
      ctx.bezierCurveTo(
        sx+perpX*(fLen-2)+nx/len*3,sy+perpY*(fLen-2)+ny/len*3,
        sx+nx/len*3+perpX*2,sy+ny/len*3+perpY*2,
        sx,sy
      );
      ctx.closePath();ctx.fill();
      // Feather quill
      if(!isBack){
        ctx.strokeStyle=wingD;ctx.lineWidth=0.5;ctx.globalAlpha=0.35;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+perpX*fLen*0.85,sy+perpY*fLen*0.85);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    // Primary feathers (hand/manus)
    const primCount=6;
    for(let f=0;f<primCount;f++){
      const t=f/(primCount-1);
      const sx=lerp(hx2,rx2,t*0.6+0.4), sy=lerp(hy2,ry2,t*0.6+0.4);
      const angOff=angle*0.4+t*0.6+0.3;
      const fLen=12+f*1.2;
      const px=Math.cos(angOff)*fLen, py=Math.sin(angOff)*fLen;
      const wG=ctx.createLinearGradient(sx,sy,sx+px,sy+py);
      wG.addColorStop(0,wing);wG.addColorStop(1,wingD);
      ctx.fillStyle=wG;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.bezierCurveTo(sx+px*0.3-py*0.15,sy+py*0.3+px*0.15,sx+px*0.8,sy+py*0.8,sx+px,sy+py);
      ctx.bezierCurveTo(sx+px*0.7+py*0.1,sy+py*0.7-px*0.1,sx+px*0.2+py*0.12,sy+py*0.2-px*0.12,sx,sy);
      ctx.closePath();ctx.fill();
      // Quill
      if(!isBack){
        ctx.strokeStyle=wingD;ctx.lineWidth=0.5;ctx.globalAlpha=0.3;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+px*0.9,sy+py*0.9);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    // Wing covert fill (smooth upper surface)
    const covertG=ctx.createLinearGradient(-2,-7,hx2,hy2);
    covertG.addColorStop(0,wingL);covertG.addColorStop(0.5,wing);covertG.addColorStop(1,wingD);
    ctx.fillStyle=covertG;ctx.globalAlpha=0.5;
    ctx.beginPath();
    ctx.moveTo(-4,-5);ctx.bezierCurveTo(-2,-9,hx2-4,hy2-2,hx2,hy2);
    ctx.bezierCurveTo(hx2+4,hy2+2,-1,-4,-4,-3);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════════
function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

// ═══════════════════════════════════════════════════════════════
//  GAME
// ═══════════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);

class Game {
  constructor(){
    this.canvas=$('gc');this.ctx=this.canvas.getContext('2d');
    this._resize();window.addEventListener('resize',()=>this._resize());
    this.audio=new Audio2();this.input=new Input();
    this.bg=new Background(this.ctx);
    this.gd=new GroundDetails(this.ctx);
    this.particles=new Particles(this.ctx);
    this.dino=new Dino(this.ctx);
    this.camera=new Camera();
    this.weather=new Weather();
    this.state='start';this.score=0;
    this.hi=parseInt(localStorage.getItem('dr3hi')||'0',10);
    this.speed=SPD0;this.obs=[];this.nextObs=W+220;
    this.isNight=false;this.lastT=null;this.fid=null;
    this.slt=0;this.muted=false;this.t=0;
    this.deathT=0;this.slowmo=1;
    this.motionBlur=0;

    this.gos=$('gos');this.hud=$('hud');
    this.svEl=$('sv');this.bvEl=$('bv');
    this.finalEl=$('finalScore');this.hiEl=$('hiDisp');
    this.bdEl=$('bestDisp');this.newBR=$('newBest');this.prevBR=$('prevBest');
    this.sfEl=$('sf');this.mbEl=$('mb');
    this.wrap=$('wrap');

    // Intro
    const introCanvas=$('intro-canvas');
    this.introEngine=new IntroEngine(introCanvas);
    this._updBest();

    $('start-btn').addEventListener('click',()=>this.startGame());
    $('restartBtn').addEventListener('click',()=>this.restart());
    this.mbEl.addEventListener('click',()=>this._mute());

    this.input.onStart=()=>{if(this.state==='start')this.startGame()};
    this.input.onJump=()=>{
      if(this.state==='playing'){
        const wasOn=this.dino.onGround;
        this.dino.jump(this.audio);
        if(wasOn){
          this.particles.spawnLandDust(this.dino.x+DINO_W/2,GY,this.isNight?'rgba(100,180,255,0.55)':'rgba(185,155,85,0.6)');
          this.particles.spawnJumpRing(this.dino.x+DINO_W/2,GY,this.isNight);
          this.camera.shake(0.12);
        }
      } else if(this.state==='dead') this.restart();
    };
    this.input.onDuck=()=>{if(this.state==='playing')this.dino.duck(true,this.audio)};
    this.input.onDuckEnd=()=>{if(this.state==='playing')this.dino.duck(false,this.audio)};
    this.input.onRestart=()=>{if(this.state==='dead')this.restart()};

    this._drawIdle();
  }

  _resize(){
    const wr=$('wrap').getBoundingClientRect();
    this.canvas.width=W;this.canvas.height=H;
    const s=Math.min(wr.width/W,wr.height/H);
    this.canvas.style.width=`${W*s}px`;this.canvas.style.height=`${H*s}px`;
    this.canvas.style.left=`${(wr.width-W*s)/2}px`;this.canvas.style.top=`${(wr.height-H*s)/2}px`;
  }
  _showGO(){this.gos.classList.add('on')}
  _hideGO(){this.gos.classList.remove('on')}
  _updBest(){
    const f=String(this.hi).padStart(5,'0');
    this.bvEl.textContent=f;
    const hi=$('intro-hi');
    if(hi&&this.hi>0) hi.textContent=`🏆 Best: ${f}`;
  }
  _mute(){this.muted=this.audio.toggleMute();this.mbEl.textContent=this.muted?'🔇':'🔊'}

  startGame(){
    this.audio.resume();this._hideGO();
    // Cinematic transition
    const intro=$('intro');
    intro.style.transition='opacity 1s ease';
    intro.style.opacity='0';
    setTimeout(()=>intro.style.display='none',1000);
    document.body.classList.add('playing');
    this.hud.style.display='flex';this.state='playing';this._reset();
    this.audio.startAmbience();
    this._loop();
  }
  restart(){
    this.audio.resume();this._hideGO();
    this.hud.style.display='flex';this.state='playing';this._reset();
    if(this.fid)cancelAnimationFrame(this.fid);this._loop();
  }
  _reset(){
    this.score=0;this.speed=SPD0;this.obs=[];this.nextObs=W+300;
    this.isNight=false;this.lastT=null;this.t=0;this.slt=0;
    this.bg.isNight=false;this.slowmo=1;this.deathT=0;this.motionBlur=0;
    this.dino=new Dino(this.ctx);this.dino.isNight=false;
    this.gd.scrollX=0;this.particles.p=[];this.particles.ambientP=[];
    this.camera=new Camera();
    this.svEl.textContent='00000';this._updBest();
  }
  _gameOver(){
    this.state='dead';this.audio.gameOver();
    this.camera.shake(1.0);
    this.slowmo=0.12;
    this.particles.spawnExplosion(this.dino.x+this.dino.W/2,this.dino.y+this.dino.H/2,this.isNight);
    const isNew=this.score>this.hi;
    if(isNew){this.hi=this.score;localStorage.setItem('dr3hi',String(this.hi))}
    const pad=n=>String(Math.floor(n)).padStart(5,'0');
    this.finalEl.textContent=pad(this.score);
    this.hiEl.textContent=pad(this.hi);
    this.bdEl.textContent=pad(this.hi);
    this.newBR.style.display=isNew?'flex':'none';
    this.prevBR.style.display=isNew?'none':'flex';
    setTimeout(()=>this._showGO(),680);
  }
  _spawnObs(){
    const sv=Math.floor(this.score);
    const bc=sv>=BIRD_MIN?Math.min(0.40,(sv-500)/2800):0;
    if(Math.random()<bc) this.obs.push(new Bird(W+70,this.ctx,Math.floor(Math.random()*3),this.isNight));
    else this.obs.push(new Cactus(W+70,this.ctx,Math.floor(Math.random()*3),this.isNight));
    const gf=Math.max(0.48,1-this.score/5000);
    this.nextObs=MINGAP+Math.random()*(MAXGAP-MINGAP)*gf;
  }
  _checkDN(s){
    const n=Math.floor(s/DNI)%2===1;
    if(n!==this.isNight){
      this.isNight=n;this.bg.isNight=n;this.dino.isNight=n;
      this.audio.dayNight();
    }
  }

  _loop(){
    const tick=ts=>{
      if(this.state!=='playing'&&this.state!=='dead')return;
      if(!this.lastT)this.lastT=ts;
      const rawDt=Math.min((ts-this.lastT)/1000,MAXDT);
      const dt=rawDt*this.slowmo;
      this.lastT=ts;this.t+=rawDt;
      // Restore slowmo
      if(this.state==='dead'&&this.slowmo<1){this.slowmo=lerp(this.slowmo,1,rawDt*1.2);if(this.slowmo>0.98)this.slowmo=1}
      if(this.state==='playing') this._update(dt,rawDt);
      this._draw();
      this.fid=requestAnimationFrame(tick);
    };
    this.fid=requestAnimationFrame(tick);
  }

  _update(dt,rawDt){
    this.speed=Math.min(SPDMAX,this.speed+SPDINC*dt);
    const prev=Math.floor(this.score);
    this.score+=this.speed*dt*0.015;
    const now=Math.floor(this.score);
    if(Math.floor(now/MILESTONE)>Math.floor(prev/MILESTONE)){
      const ms=now-(now%MILESTONE);
      this.sfEl.textContent=ms>=2000?`⚡ SPEED ${ms}`:`✦ ${ms}`;
      this.sfEl.classList.remove('fa');void this.sfEl.offsetWidth;this.sfEl.classList.add('fa');
      this.audio.milestone();
    }
    const pad=String(now).padStart(5,'0');
    if(this.svEl.textContent!==pad){
      this.svEl.textContent=pad;
      if(now%100===0&&now>0){this.svEl.classList.remove('sp');void this.svEl.offsetWidth;this.svEl.classList.add('sp')}
    }
    this._checkDN(now);
    this.bg.update(dt,this.speed);
    this.gd.update(dt,this.speed);
    this.dino.update(dt,this.speed);
    this.camera.update(rawDt);
    this.weather.update(rawDt,this.speed);
    this.audio.setWindSpeed(this.speed);

    // Landing shake
    if(this.dino.landShake>0.8){
      this.camera.shake(0.25);
      this.particles.spawnImpactSpark(this.dino.x+DINO_W/2,GY,this.isNight);
      this.audio.land();
      this.dino.landShake=0;
    }

    // Foot dust
    const dustCol=this.isNight?'rgba(100,180,255,0.48)':'rgba(192,162,90,0.58)';
    if(this.dino.LF&&!this.dino.prevLF){
      this.particles.spawnFootDust(this.dino.x+22,GY,dustCol);
      if(this.speed>400) this.audio.footstep();
    }
    if(this.dino.RF&&!this.dino.prevRF){
      this.particles.spawnFootDust(this.dino.x+38,GY,dustCol);
      if(this.speed>400) this.audio.footstep();
    }

    // Speed lines
    if(this.speed>530){
      this.slt-=dt;
      if(this.slt<=0){
        const fr=clamp((this.speed-530)/380,0,1);this.slt=lerp(0.2,0.038,fr);
        const lc=this.isNight?'rgba(100,200,255,0.32)':'rgba(255,225,170,0.32)';
        for(let i=0;i<3;i++) this.particles.spawnSpeedLine(W*0.45+Math.random()*W*0.55,this.dino.y+Math.random()*DINO_H,lc);
      }
    }
    // Speed camera shake
    if(this.speed>900&&Math.random()<0.02) this.camera.shake(0.04);

    // Motion blur intensity
    this.motionBlur=clamp((this.speed-600)/400,0,0.6);

    this.nextObs-=this.speed*dt;
    if(this.nextObs<=0)this._spawnObs();
    for(const o of this.obs)o.update(dt,this.speed);
    this.obs=this.obs.filter(o=>!o.dead);

    const db=this.dino.hitbox;
    for(const o of this.obs){if(hits(db,o.hitbox)){this._gameOver();return}}
    this.particles.update(dt);
    this.particles.updateAmbient(rawDt,this.isNight);
  }

  _draw(){
    const ctx=this.ctx;
    // Motion blur via semi-transparent overlay
    if(this.motionBlur>0&&this.state==='playing'){
      ctx.fillStyle=`rgba(0,0,0,${this.motionBlur*0.18})`;
      ctx.fillRect(0,0,W,H);
    } else {
      ctx.clearRect(0,0,W,H);
    }

    ctx.save();
    this.camera.apply(ctx);

    this.bg.draw(this.t,this.score);
    this.gd.draw(this.isNight);
    this.weather.draw(ctx);
    this.particles.draw();
    for(const o of this.obs)o.draw();
    this.dino.draw();

    // Speed distortion lines near dino at high speed
    if(this.speed>800&&this.state==='playing'){
      const fr=clamp((this.speed-800)/300,0,1);
      ctx.save();ctx.globalAlpha=fr*0.12;
      for(let i=0;i<4;i++){
        const ly=this.dino.y+8+i*18;
        const grad=ctx.createLinearGradient(0,ly,DINO_X,ly);
        grad.addColorStop(0,'transparent');
        grad.addColorStop(1,this.isNight?'rgba(100,200,255,0.8)':'rgba(255,220,120,0.8)');
        ctx.strokeStyle=grad;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(DINO_X,ly);ctx.stroke();
      }
      ctx.restore();
    }

    ctx.restore();

    // Cinematic vignette
    const vg=ctx.createRadialGradient(W/2,H*0.5,H*0.22,W/2,H*0.5,H*0.82);
    vg.addColorStop(0,'transparent');
    vg.addColorStop(1,'rgba(0,0,0,0.3)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

    // Top gradient bar (subtle)
    const tg=ctx.createLinearGradient(0,0,0,28);
    tg.addColorStop(0,'rgba(0,0,0,0.2)');
    tg.addColorStop(1,'transparent');
    ctx.fillStyle=tg;ctx.fillRect(0,0,W,28);

    // Ground depth gradient
    const gbot=ctx.createLinearGradient(0,GY+60,0,H);
    gbot.addColorStop(0,'transparent');
    gbot.addColorStop(1,'rgba(0,0,0,0.25)');
    ctx.fillStyle=gbot;ctx.fillRect(0,GY+60,W,H-GY-60);

    // Death flash
    if(this.state==='dead'&&this.slowmo<0.5){
      ctx.fillStyle=`rgba(255,120,0,${(1-this.slowmo*2)*0.12})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  _drawIdle(){
    this.ctx.clearRect(0,0,W,H);
    this.bg.draw(0,0);this.gd.draw(false);this.dino.draw();
    // Vignette
    const vg=this.ctx.createRadialGradient(W/2,H*0.5,H*0.22,W/2,H*0.5,H*0.82);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.3)');
    this.ctx.fillStyle=vg;this.ctx.fillRect(0,0,W,H);
  }
}

document.addEventListener('DOMContentLoaded',()=>window.__g=new Game());
</script>
